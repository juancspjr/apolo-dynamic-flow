- type: python
  path: scripts/python/integration_validation.py
  title: integration_validation
  docstring: "integration_validation.py — Validación de integración REAL del pipeline\
    \ (v2.8.1).\n\nEste script responde a la pregunta del usuario:\n  \"Ejecuta un\
    \ flow completo desde apolo.flow.init hasta al menos la fase\n   verdad o plan-indice,\
    \ usando datos reales del propio repositorio como\n   objetivo, e invoca explícitamente\
    \ index_codebase.py, score_evidence.py\n   y predict_impact.py durante el proceso\
    \ — no los asumas ejecutados,\n   córrelos y muéstrame sus outputs reales en YAML.\"\
    \n\nEjecuta el flow completo y genera un reporte HONESTO con:\n  1. Outputs YAML\
    \ reales de cada script invocado\n  2. Verificación de que scaffold_impl.py produce\
    \ un andamio concreto\n  3. Verificación de que telemetry.jsonl registra cada\
    \ decisión\n  4. Análisis de qué scripts son automáticos vs manuales\n  5. Análisis\
    \ de si los tests validan contratos de integración\n  6. Veredicto final: dónde\
    \ se pierde control, dónde el agente decide sin evidencia\n\nUso:\n  python3 integration_validation.py\
    \ --repo-root . \\\n      --output INTEGRA"
  examples:
  - "python3 integration_validation.py --repo-root . \\\\\n      --output INTEGRATION-VALIDATION-REPORT.yaml\
    \ \\\\\n      [--flowid APOLO-INTEG-TEST] \\\\\n      [--verbose]\n\nSalida:\n\
    \  - Reporte YAML con todos los outputs reales\n  - Resumen JSON en stdout\n \
    \ - Veredicto en stderr"
