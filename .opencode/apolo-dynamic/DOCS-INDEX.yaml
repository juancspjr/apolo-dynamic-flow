- type: markdown
  path: .specwright/skills/sw-design/SKILL.md
  title: SKILL
  docstring: "---\nname: sw-design\ndescription: >-\n  Autonomous solution architecture.\
    \ Researches the codebase, designs a\n  solution, challenges it adversarially,\
    \ and produces design artifacts.\nargument-hint: \"[what you want to build or\
    \ change]\"\nallowed-tools:\n  - read\n  - write\n  - edit\n  - bash\n  - glob\n\
    \  - grep\n  - Task\n---\n\n# Specwright Design\n\n## Goal\n\nResearch the codebase,\
    \ design a solution, challenge it adversarially, and produce\ndesign artifacts.\
    \ Output is a design — not specs, not code. Operates autonomously\nbetween research\
    \ and gate handoff, applying `.specwright/protocols/decision.md` for all decisions.\n\
    \n## Inputs\n\n- The user's request (argument or conversation)\n- `{projectArtifactsRoot}/CONSTITUTION.md`\
    \ -- practices to follow\n- `{projectArtifactsRoot}/CHARTER.md` -- vision and\
    \ invariants\n- `{projectArtifactsRoot}/config.json` -- project configuration\n\
    - `{worktreeStateRoot}/session.json` -- current worktree attachment, when present\n\
    - `{repoStateRoot}/work/*/workflow.json` -- other active "
  sections:
  - heading: Specwright Design
    body: ''
  - heading: Goal
    body: '

      Research the codebase, design a solution, challenge it adversarially, and produce

      design artifacts. Output is a design — not specs, not code. Operates autonomously

      between research and gate handoff, applying `.specwright/protocols/decision.md`
      for all decisions.

      '
  - heading: Inputs
    body: '

      - The user''s request (argument or conversation)

      - `{projectArtifactsRoot}/CONSTITUTION.md` -- practices to follow

      - `{projectArtifactsRoot}/CHARTER.md` -- vision and invariants

      - `{projectArtifactsRoot}/config.json` -- project configuration

      - `{worktreeStateRoot}/session.json` -- current worktree attachment, when present

      - `{repoStateRoot}/work/*/workflow.json` -- other active works for collision
      checks

      - The codebase itself

      '
  - heading: Outputs
    body: "\nWhen complete, runtime and auditable artifacts exist in both locations:\n\
      \n- `{repoStateRoot}/work/{id}/stage-report.md` -- runtime-local design handoff\
      \ digest with attention-required at the top\n- `{workArtifactsRoot}/{id}/design.md`\
      \ -- solution overview, approach, integration points, risk assessment\n  - Required\
      \ section: `## Blast Radius` listing: modules/files the design touches, failure\
      \ propagation scope for each (local/adjacent/systemic), and what the design\
      \ does NOT change.\n- `{workArtifacts"
  - heading: Constraints
    body: "\n**Stage boundary (LOW freedom):**\nFollow `.specwright/protocols/stage-boundary.md`.\
      \ Produce design artifacts and research context.\nNEVER write specs, decompose,\
      \ implement, branch, or test. After gate handoff, STOP.\n\n**Ownership guard\
      \ (LOW freedom):**\n- When the current worktree session is already attached\
      \ to an existing work,\n  resolve live ownership from `session.json`, not from\
      \ branch names alone.\n- If another live top-level worktree owns that work,\
      \ STOP and point the\n  operator to the explic"
  - heading: Protocol References
    body: '

      - `.specwright/protocols/stage-boundary.md` -- scope, termination, and handoff

      - `.specwright/protocols/decision.md` -- autonomous decision framework, gate
      handoff, convergence loop, assumption lifecycle

      - `.specwright/protocols/state.md` -- workflow state updates and locking

      - `.specwright/protocols/context.md` -- anchor doc and config loading

      - `.specwright/protocols/delegation.md` -- agent delegation for research and
      critic

      - `.specwright/protocols/recovery.md` -- compaction recovery

      - `.spe'
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |-----------|--------|

      | Request too vague | Apply DISAMBIGUATION from codebase + charter context.
      Record interpretation. If undetermined, surface at gate. |

      | Active work in progress | Apply DISAMBIGUATION: if argument provided, start
      new. If no argument, continue existing. Record choice. |

      | Selected work owned by another live top-level worktree | STOP with explicit
      `/sw-adopt` guidance |

      | `design.md` exists, no argument | Apply DISAMBIGUATION: if user''s message
      implie'
