- type: python
  path: scripts/python/context_query.py
  title: context_query
  docstring: "context_query.py — Implementa apolo.context.query(phase, question).\n\
    \nConvierte al sistema de pasivo (el agente lee YAMLs) a activo (el sistema\n\
    responde consultas del agente usando telemetría + flow state).\n\nResponde preguntas\
    \ del agente como:\n  - \"¿qué fase sigue?\" -> lee FLOW-STATE.yaml y devuelve\
    \ siguiente fase\n  - \"¿qué bloqueos activos hay?\" -> lee BLOCK-LOG.yaml\n \
    \ - \"¿qué eventos recientes?\" -> lee telemetry.jsonl\n  - \"¿qué tools disponibles?\"\
    \ -> lee TOOL-REGISTRY.yaml\n  - \"¿qué evidence tengo?\" -> lee EVIDENCE-PACK.yaml\
    \ + EVIDENCE-SCORE.yaml\n  - \"¿qué código toca este MP?\" -> lee CODE-INDEX.yaml\
    \ + DYNAMIC-PLAN.yaml\n  - \"¿qué predicciones de impacto hay?\" -> lee IMPACT-PREDICTION.yaml\n\
    \  - \"¿qué andamio sigo?\" -> lee IMPL-SCAFFOLD-*.yaml\n\nUso:\n  python3 context_query.py\
    \ \\\n    --flowid APOLO-20260620-MI \\\n    --repo-root /path \\\n    --phase\
    \ implementation \\\n    --question \"qué archivos debo tocar para U-01?\""
  examples:
  - "python3 context_query.py \\\\\n    --flowid APOLO-20260620-MI \\\\\n    --repo-root\
    \ /path \\\\\n    --phase implementation \\\\\n    --question \"qué archivos debo\
    \ tocar para U-01?\""
