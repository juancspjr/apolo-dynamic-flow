- type: python
  path: scripts/python/evidence_visual_diff.py
  title: evidence_visual_diff
  docstring: "evidence_visual_diff.py — Evidencia visual comparativa con diff (v3.1.0).\n\
    \nCierra el GAP #4 del INTEGRATION-VERDICT.md:\n  \"Evidencia visual comparativa\
    \ (baseline vs roto vs post-fix) con diff\"\n\nCaptura snapshots de archivos en\
    \ 3 momentos criticos:\n  1. baseline: antes de implementar (fase reanclaje inicio)\n\
    \  2. broken: despues de un test failure (cuando algo se rompe)\n  3. post_fix:\
    \ despues de la fix exitosa\n\nGenera diffs unificados entre los 3 estados para\
    \ que el agente pueda ver\nexactamente que cambio, cuando se rompio, y como se\
    \ arreglo.\n\nCLI:\n  # Capturar snapshot en un momento\n  python3 evidence_visual_diff.py\
    \ capture --flowid X --phase baseline --files file1.ts,file2.ts\n  python3 evidence_visual_diff.py\
    \ capture --flowid X --phase broken --files file1.ts\n  python3 evidence_visual_diff.py\
    \ capture --flowid X --phase post-fix --files file1.ts\n\n  # Generar diff entre\
    \ dos fases\n  python3 evidence_visual_diff.py diff --flowid X --from baseline\
    \ --to broken\n  python3 evidence_visual_diff."
