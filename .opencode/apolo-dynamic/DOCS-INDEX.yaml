  path: scripts/python/code_generator.py
  title: code_generator
  docstring: "code_generator.py — Generación automática de código (v2.7.0).\n\nEscribe\
    \ funciones/classes completas desde especificaciones.\n\nSi LLM disponible: usa\
    \ llm_bridge para generar código significativo.\nSi no: usa plantillas deterministas\
    \ por lenguaje.\n\nUso:\n  python3 code_generator.py --language python --type\
    \ function --name \"calculate_tax\" --args \"amount,rate\" --description \"Calculate\
    \ tax on amount\"\n  python3 code_generator.py --language typescript --type class\
    \ --name \"UserService\" --methods \"getUser,createUser\"\n  python3 code_generator.py\
    \ --language go --type function --name \"CalculateTax\" --args \"amount float64,\
    \ rate float64\""
  examples:
  - "python3 code_generator.py --language python --type function --name \"calculate_tax\"\
    \ --args \"amount,rate\" --description \"Calculate tax on amount\"\n  python3\
    \ code_generator.py --language typescript --type class --name \"UserService\"\
    \ --methods \"getUser,createUser\"\n  python3 code_generator.py --language go\
    \ --type function --name \"CalculateTax\" --args \"amount float64, rate float64\""
