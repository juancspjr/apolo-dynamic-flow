  path: .specwright/skills/sw-debug/SKILL.md
  title: SKILL
  docstring: "---\nname: sw-debug\ndescription: >-\n  Investigation-first debugging\
    \ workflow. Scopes the problem, delegates root\n  cause analysis, produces a diagnosis\
    \ report, and applies fix/log/defer autonomously.\nargument-hint: \"[problem description]\"\
    \nallowed-tools:\n  - read\n  - write\n  - bash\n  - glob\n  - grep\n  - Task\n\
    ---\n\n# Specwright Debug\n\n## Goal\n\nFirst-class debugging path. Scope the\
    \ problem, investigate concurrently,\ndiagnose with evidence, then decide: fix\
    \ it now, log it, or defer. Operates\nautonomously, applying `.specwright/protocols/decision.md`\
    \ for the fix/log/defer decision.\n\n## Inputs\n\n- Problem description (argument\
    \ or recent error context)\n- Initial evidence: error messages, logs, failing\
    \ test output\n- `{projectArtifactsRoot}/config.json` — `backlog.type` and `backlog.label`\n\
    - Codebase files — read during investigation\n\n## Outputs\n\n- `diagnosis.md`\
    \ at `{workArtifactsRoot}/{id}/diagnosis.md` — always produced\n- `spec.md` at\
    \ `{workArtifactsRoot}/{id}/spec.md` — Fix path only (2-3 acce"
  sections:
  - heading: Specwright Debug
    body: ''
  - heading: Goal
    body: '

      First-class debugging path. Scope the problem, investigate concurrently,

      diagnose with evidence, then decide: fix it now, log it, or defer. Operates

      autonomously, applying `.specwright/protocols/decision.md` for the fix/log/defer
      decision.

      '
  - heading: Inputs
    body: '

      - Problem description (argument or recent error context)

      - Initial evidence: error messages, logs, failing test output

      - `{projectArtifactsRoot}/config.json` — `backlog.type` and `backlog.label`

      - Codebase files — read during investigation

      '
  - heading: Outputs
    body: '

      - `diagnosis.md` at `{workArtifactsRoot}/{id}/diagnosis.md` — always produced

      - `spec.md` at `{workArtifactsRoot}/{id}/spec.md` — Fix path only (2-3 acceptance
      criteria)

      - `decisions.md` at `{workArtifactsRoot}/{id}/decisions.md` — fix/log/defer
      decision recorded per `.specwright/protocols/decision.md`

      '
  - heading: Constraints
    body: "\n**Stage boundary (LOW freedom):**\nFollow `.specwright/protocols/stage-boundary.md`.\
      \ Investigate and diagnose. NEVER write code,\nrun tests, branch, or commit.\
      \ Fix path: produce spec.md, handoff to `/sw-build`.\n\n**Scope (MEDIUM freedom):**\n\
      - If argument provided, use it. If no argument, infer from recent error context\n\
      \  (last failed command, error output in conversation). If genuinely undetermined,\n\
      \  apply DISAMBIGUATION: choose the most likely problem from available context.\n\
      - Collect evidence: "
  - heading: Protocol References
    body: '

      - `.specwright/protocols/stage-boundary.md` -- scope and handoff

      - `.specwright/protocols/decision.md` -- autonomous decision framework (fix/log/defer)

      - `.specwright/protocols/state.md` -- workflow state updates

      - `.specwright/protocols/delegation.md` -- concurrent delegation

      - `.specwright/protocols/backlog.md` -- backlog items

      '
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |-----------|--------|

      | No problem description or context | Apply DISAMBIGUATION from conversation
      history. Record interpretation. |

      | Agents return no evidence | Low-confidence diagnosis. Apply fix/log/defer
      per reversibility. |

      | Fix is architectural (>3 files) | Halt. Recommend `/sw-design`. |

      | Compaction during investigation | Re-run investigation; diagnosis.md rebuilt
      from scratch |

      '
