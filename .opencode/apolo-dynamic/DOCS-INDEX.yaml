  path: scripts/python/onboarding.py
  title: onboarding
  docstring: "onboarding.py — Onboarding guiado interactivo (v2.7.0).\n\nGuía al usuario\
    \ paso a paso en la configuración inicial del plugin:\n  1. Verifica prerrequisitos\n\
    \  2. Pregunta tipo de proyecto\n  3. Sugiere MCPs y skills según tipo\n  4. Configura\
    \ opencode.json\n  5. Crea flow de ejemplo\n  6. Genera plantilla de proyecto\
    \ si se solicita\n\nUso:\n  python3 onboarding.py --repo-root .\n  python3 onboarding.py\
    \ --repo-root . --non-interactive  # modo automático"
  examples:
  - "python3 onboarding.py --repo-root .\n  python3 onboarding.py --repo-root . --non-interactive\
    \  # modo automático"
