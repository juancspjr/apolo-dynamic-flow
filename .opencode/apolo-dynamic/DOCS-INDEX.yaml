- type: python
  path: scripts/python/multi_agent_coordinator.py
  title: multi_agent_coordinator
  docstring: "multi_agent_coordinator.py — Coordina 2+ agentes en paralelo sobre el\
    \ mismo MP (v3.4.0).\n\nCierra el GAP: \"Multi-agent coordination: 2+ agentes\
    \ en paralelo sobre el mismo MP\"\n\nPermite que multiples agentes trabajen en\
    \ paralelo sobre diferentes unidades (MPs)\ndel mismo plan, coordinandose via\
    \ un archivo de lock compartido y merging results.\n\nCLI:\n  # Registrar un agente\
    \ para trabajar en una unidad\n  python3 multi_agent_coordinator.py register --flowid\
    \ X --agent-id agent-1 --unit-id U-01\n\n  # Ver que agentes estan trabajando\n\
    \  python3 multi_agent_coordinator.py status --flowid X\n\n  # Marcar unidad como\
    \ completada\n  python3 multi_agent_coordinator.py complete --flowid X --agent-id\
    \ agent-1 --unit-id U-01 --result-json '{\"success\":true}'\n\n  # Ver conflicts\
    \ (si 2 agentes tocaron los mismos archivos)\n  python3 multi_agent_coordinator.py\
    \ conflicts --flowid X\n\n  # Merge results de todos los agentes\n  python3 multi_agent_coordinator.py\
    \ merge --flowid X"
