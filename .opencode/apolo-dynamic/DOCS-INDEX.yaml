- type: python
  path: scripts/python/apolo_config.py
  title: apolo_config
  docstring: "apolo_config.py — Configuracion centralizada de thresholds (v3.1.0).\n\
    \nCierra el GAP #5.4 del INTEGRATION-VERDICT.md:\n  \"Thresholds hardcoded en\
    \ gates — los thresholds de score_evidence\n   (e.g., >= 0.6 para avanzar) estan\
    \ hardcoded en TS, no son ajustables\n   por flow ni por proyecto.\"\n\nEste modulo\
    \ carga `apolo-config.yaml` y expone thresholds configurables\nque cualquier script\
    \ Python puede consultar:\n\n  from apolo_config import get_config, get_threshold\n\
    \  cfg = get_config(repo_root)\n  min_score = get_threshold(cfg, \"gates.verdad.min_score\"\
    , default=0.6)\n\nCLI:\n  init                          Crea apolo-config.yaml\
    \ con defaults\n  show                          Muestra configuracion actual\n\
    \  get --key <path>              Obtiene un valor especifico\n  set --key <path>\
    \ --value <v>  Establece un valor (persiste)\n  validate                     \
    \ Valida contra schema interno"
