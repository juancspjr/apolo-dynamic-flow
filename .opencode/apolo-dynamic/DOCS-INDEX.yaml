- type: markdown
  path: .specwright/protocols/state.md
  title: state
  docstring: '# State Management Protocol


    ## Logical Roots


    State is resolved through logical Git roots, not checkout-local path literals.


    | Root | Resolution | Purpose |

    |---|---|---|

    | `projectRoot` | `git rev-parse --show-toplevel` | Source tree and user-facing
    command cwd |

    | `projectArtifactsRoot` | `{projectRoot}/.specwright` | Tracked project artifacts
    and guidance |

    | `repoStateRoot` | `git rev-parse --git-common-dir` + `/specwright` | Shared
    clone-local runtime state |

    | `worktreeStateRoot` | `git rev-parse --git-dir` + `/specwright` | Per-worktree
    runtime session state |

    | `workArtifactsRoot` | `{repoStateRoot}/work` by default; tracked root from `config.git.workArtifacts`
    when configured | Auditable work artifacts |


    Callers must not treat `cwd/.specwright/...` as authoritative once the new

    layout exists. Legacy working-tree `.specwright/` remains a migration fallback

    only.


    ## State Files And Ownership


    Two state files now exist:


    | File | Owner | Scope | Mutable by |

    |---|---|---|---|'
  sections:
  - heading: State Management Protocol
    body: ''
  - heading: Logical Roots
    body: '

      State is resolved through logical Git roots, not checkout-local path literals.


      | Root | Resolution | Purpose |

      |---|---|---|

      | `projectRoot` | `git rev-parse --show-toplevel` | Source tree and user-facing
      command cwd |

      | `projectArtifactsRoot` | `{projectRoot}/.specwright` | Tracked project artifacts
      and guidance |

      | `repoStateRoot` | `git rev-parse --git-common-dir` + `/specwright` | Shared
      clone-local runtime state |

      | `worktreeStateRoot` | `git rev-parse --git-dir` + `/specwright` | Per-wor'
  - heading: State Files And Ownership
    body: '

      Two state files now exist:


      | File | Owner | Scope | Mutable by |

      |---|---|---|---|

      | `{repoStateRoot}/work/{workId}/workflow.json` | one work | lifecycle, units,
      gates, task progress, attachment, lock | skills operating on that selected work
      |

      | `{worktreeStateRoot}/session.json` | one worktree | local work selection and
      session mode | skills running in that worktree |


      For live ownership, `{worktreeStateRoot}/session.json` is the live ownership

      truth for that worktree. `workflow.json.attachme'
  - heading: Workflow Schema
    body: "\nEach top-level work owns its own workflow file.\n\nThe schema below shows\
      \ the populated v3 shape. Legacy workflow files may omit\n`targetRef`, `freshness`,\
      \ `prNumber`, or `prMergedAt` until migration or later\nstages populate them.\n\
      \n```json\n{\n  \"version\": \"3.0\",\n  \"id\": \"string, kebab-case\",\n \
      \ \"description\": \"string\",\n  \"status\": \"designing | planning | building\
      \ | verifying | shipping | shipped | abandoned\",\n  \"workDir\": \"relative\
      \ path under workArtifactsRoot/{workId} (legacy work/{workId}/... allo"
  - heading: Workflow Notes
    body: "\n- `gates`, `tasksCompleted`, `workUnits`, and `lock` belong to the work,\
      \ not\n  to the current terminal session.\n- `attachment` records the current\
      \ owner of the work. It replaces the old\n  repo-global `currentWork`.\n- `targetRef`\
      \ is work-level state for the selected work, not a repo-global\n  singleton.\
      \ `sw-design` records the concrete remote, branch, role, and\n  resolution source\
      \ once so later stages stop guessing what the work targets.\n- `targetRef.resolvedBy`\
      \ is descriptive provenance such as "
  - heading: Session Schema
    body: "\nEach worktree owns its own session file.\n\n```json\n{\n  \"version\"\
      : \"3.0\",\n  \"worktreeId\": \"string\",\n  \"worktreePath\": \"absolute path\"\
      ,\n  \"branch\": \"string | null\",\n  \"attachedWorkId\": \"string | null\"\
      ,\n  \"mode\": \"top-level | subordinate\",\n  \"lastSeenAt\": \"ISO timestamp\"\
      \n}\n```\n"
  - heading: Session Rules
    body: "\n- A top-level session is created for a normal user-facing worktree.\n\
      - A subordinate session is created only for orchestrated helper worktrees such\n\
      \  as `parallel-build`.\n- A top-level session may attach to zero or one work.\n\
      - A work may have zero or one top-level attachment.\n- A subordinate session\
      \ may reference a parent work, but it never becomes the\n  authoritative owner\
      \ of that work.\n"
  - heading: Work Selection
    body: '

      State-aware callers resolve the selected work in this order:


      1. explicit work selector, if the skill supports one

      2. `{worktreeStateRoot}/session.json.attachedWorkId`

      3. legacy fallback during migration only


      If no work resolves and the operation requires one, STOP with the same

      guidance as today:


      > "Run /sw-design first."

      '
  - heading: Attachment Ownership
    body: "\nAttaching a top-level session to a work must validate all of the following:\n\
      \n1. the target work exists under `{repoStateRoot}/work/{workId}`\n2. no other\
      \ live top-level session already owns that work\n3. the current branch is consistent\
      \ with the work's recorded branch when the\n   work is already in `building`,\
      \ `verifying`, or `shipping`\n4. same-work continuation into a different top-level\
      \ worktree is being\n   requested explicitly via `/sw-adopt`\n\nIf validation\
      \ fails, STOP with explicit adopt/take"
  - heading: Subordinate Sessions
    body: "\nSubordinate sessions are allowed only as controlled helper contexts.\n\
      \nThey may:\n\n- read the parent work's shared artifacts\n- keep local continuation\
      \ or scratch context under `worktreeStateRoot`\n- report completion back to\
      \ the parent orchestrator\n\nThey must not:\n\n- create a new top-level `workId`\n\
      - rewrite another worktree's `session.json`\n- claim top-level ownership in\
      \ `workflow.json.attachment`\n- ship, verify, run `/sw-adopt`, or otherwise\
      \ mutate shared workflow state directly outside the\n  pa"
  - heading: State Transitions
    body: '

      Valid lifecycle transitions are enforced per selected work:


      | From | To | Triggered by |

      |---|---|---|

      | (none) | `designing` | sw-design creates a new work and attaches the current
      session |

      | `designing` | `planning` | sw-plan |

      | `planning` | `building` | sw-plan or sw-build or sw-pivot (work-pivot) |

      | `building` | `verifying` | sw-verify |

      | `verifying` | `building` | fix after failed verify |

      | `verifying` | `shipping` | sw-ship |

      | `shipping` | `shipped` | sw-ship |

      | `shipping` | `veri'
  - heading: Pivoted Re-entry
    body: "\n`sw-pivot` is not a new persisted workflow status. It operates inside\n\
      `planning`, `building`, and `verifying`.\n\n- `task-pivot` keeps the active\
      \ status unchanged when the active unit still\n  holds (`building` or `verifying`\
      \ as appropriate)\n- `unit-pivot` or `work-pivot` may return the touched work\
      \ to `building` when\n  active or affected unit artifacts change\n- `sw-pivot`\
      \ must preserve shipped units as shipped baseline scope rather than\n  rewriting\
      \ them\n- no `pivoting` status is added to `workflo"
  - heading: Enumeration Model
    body: '

      Known works are discovered by enumerating:


      - `{repoStateRoot}/work/*/workflow.json`


      Live worktree attachments are discovered by:


      1. `git worktree list --porcelain`

      2. resolving each listed worktree''s Git admin dir

      3. reading its `{worktreeStateRoot}/session.json` when present


      No repo-global active-work registry is required in the first version.

      '
  - heading: Path Resolution Convention
    body: '

      Four artifact scopes remain:


      | Scope | How to resolve | Contains |

      |---|---|---|

      | Project-level tracked | `{projectArtifactsRoot}/` | `config.json`, anchor
      docs, research, learnings |

      | Work-level auditable | `{workArtifactsRoot}/{workId}/` | `design.md`, `context.md`,
      `decisions.md`, `assumptions.md`, `approvals.md`, `integration-criteria.md`
      |

      | Unit-local auditable | `workflow.workDir` under `{workArtifactsRoot}` | `spec.md`,
      `plan.md`, `context.md`, `implementation-rationale.md`, `review-'
  - heading: Read-Modify-Write Sequence
    body: "\nThis is the most fragile operation. Follow exactly.\n\n1. Resolve logical\
      \ roots.\n2. Read the current session file if the operation is session-aware.\n\
      3. Read the selected work's `workflow.json` if the operation is work-aware.\n\
      4. Parse the full JSON document(s). If parse fails, STOP with diagnostics.\n\
      5. Apply only the intended mutation.\n6. Write back the full object(s) with\
      \ `JSON.stringify(state, null, 2)`.\n7. Always refresh `lastUpdated` on `workflow.json`\
      \ and `lastSeenAt` on\n   `session.json` whe"
  - heading: Lock Protocol
    body: "\nBefore mutating a work:\n\n- read that work's `workflow.json.lock`\n\
      - if a lock exists and is younger than 30 minutes and `lock.worktreeId` does\n\
      \  not match the current worktree, STOP with lock info\n\nAcquire:\n\n- set\
      \ `lock = { \"skill\": \"{name}\", \"since\": \"{ISO}\", \"worktreeId\": \"\
      {currentWorktreeId}\" }`\n  before other mutations to that work\n\nRelease:\n\
      \n- set `lock: null` after the mutation batch completes\n\nStale locks:\n\n\
      - locks older than 30 minutes may be auto-cleared with a warning\n- stale lock\
      \ repa"
  - heading: Legacy Compatibility
    body: '

      During migration, callers may still read legacy checkout-local `.specwright/`

      artifacts only when the new layout is absent. Once the new roots exist, writes

      go only to their authoritative surface. Mixed writes are forbidden.

      '
  - heading: Critical Rules
    body: "\n- **NEVER** treat one repo-global `workflow.json` as the source of truth\
      \ in the\n  new model\n- **ALWAYS** resolve paths through the documented logical\
      \ roots instead of\n  concatenating checkout-local literals\n- **NEVER** let\
      \ subordinate sessions claim top-level ownership\n- **ALWAYS** preserve existing\
      \ fields not being changed\n- **NEVER** partially update a JSON state file\n"
