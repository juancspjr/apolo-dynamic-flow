  docstring: "self_healing.py — Engine de auto-curación (v2.6.0).\n\nAprende de fallos\
    \ pasados analizando telemetry.jsonl y ajusta routing\nautomáticamente cuando\
    \ un agente falla consistentemente en una fase.\n\nSi LLM disponible (llm_bridge),\
    \ usa análisis inteligente de razones de fallo.\nSi no, usa heurísticas estadísticas\
    \ puras (100% determinista).\n\nUso:\n  python3 self_healing.py --repo-root .\
    \ --flowid APOLO-TEST --output LEARNING-STATE.yaml\n  python3 self_healing.py\
    \ --repo-root . --apply  # aplicar ajustes a routing-rules.json"
