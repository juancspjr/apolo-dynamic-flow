    body: "\n**Tiered Execution (LOW freedom):**\n\nRun tiers in execution order:\
      \ `commands.build` → `commands.test` →\n`commands.test:integration` → `commands.test:smoke`.\
      \ Each tier runs only if the\nprevious tier passes (any tier failure stops further\
