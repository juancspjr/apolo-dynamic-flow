- type: python
  path: scripts/python/doc_generator.py
  title: doc_generator
  docstring: "doc_generator.py — Generación automática de documentación (v2.7.0).\n\
    \nGenera:\n  - Docstrings para funciones/classes sin documentación\n  - Secciones\
    \ de README (instalación, uso, API)\n  - API docs (OpenAPI/Swagger para REST,\
    \ JSDoc para TS)\n  - CHANGELOG entries desde git log\n\nSi LLM disponible: genera\
    \ documentación inteligente.\nSi no: usa heurísticas deterministas (firmas, nombres,\
    \ patrones).\n\nUso:\n  python3 doc_generator.py --repo-root . --code-index .opencode/apolo-dynamic/CODE-INDEX.yaml\
    \ --type docstrings\n  python3 doc_generator.py --repo-root . --type readme-section\
    \ --section \"Installation\"\n  python3 doc_generator.py --repo-root . --type\
    \ api-docs"
  examples:
  - "python3 doc_generator.py --repo-root . --code-index .opencode/apolo-dynamic/CODE-INDEX.yaml\
    \ --type docstrings\n  python3 doc_generator.py --repo-root . --type readme-section\
    \ --section \"Installation\"\n  python3 doc_generator.py --repo-root . --type\
    \ api-docs"
