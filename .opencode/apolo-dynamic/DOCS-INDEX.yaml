  docstring: "---\nname: sw-adopt\ndescription: >-\n  Explicitly adopt an existing\
    \ work into the current worktree after validating\n  live ownership, stale sessions,\
    \ and branch consistency.\nargument-hint: \"<work-id>\"\nallowed-tools:\n  - read\n\
