- type: python
  path: scripts/python/post_script_gates.py
  title: post_script_gates
  docstring: "post_script_gates.py — Gates que validan contenido YAML, no solo exit\
    \ code (v2.9.0).\n\nCierra el GAP #5.3 \"Silent failures en scripts Python\" del\
    \ INTEGRATION-VERDICT.md:\nsi un script retorna YAML vacío pero exit code 0, el\
    \ loop engine puede avanzar\nde fase sin evidencia real. Este gate valida contenido\
    \ post-script.\n\nDefine reglas en `apolo-post-script-gates.yaml`:\n  - script:\
    \ collect_evidence.py\n    require:\n      - path: items          # debe existir\
    \ esta key\n        type: list\n        min_length: 1        # al menos 1 item\n\
    \      - path: hash_chain\n        type: string\n        min_length: 64      \
    \ # SHA-256\n    on_fail: block           # block | warn | continue\n\n  - script:\
    \ score_evidence.py\n    require:\n      - path: score\n        type: number\n\
    \        min: 0.4             # score mínimo\n    on_fail: block\n\n  - script:\
    \ generate_plan.py\n    require:\n      - path: unidades\n        type: list\n\
    \        min_length: 1\n    on_fail: block\n\n  - script: scaffold_impl.py\n \
    \   require:\n      - path:"
  examples: []
