  path: scripts/python/vulnerability_scanner.py
  title: vulnerability_scanner
  docstring: "vulnerability_scanner.py — Escaneo de vulnerabilidades CVE (v2.8.0).\n\
    \nIntegra múltiples herramientas de escaneo de vulnerabilidades:\n  - Python:\
    \ safety, bandit (security), pip-audit\n  - Node.js: npm audit\n  - Go: govulncheck\n\
    \  - Rust: cargo audit\n  - PHP: composer audit\n  - Java: dependency-check\n\n\
