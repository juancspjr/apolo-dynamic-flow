- type: python
  path: scripts/python/debug_mode.py
  title: debug_mode
  docstring: "debug_mode.py — Modo debug paso a paso con breakpoints en el state machine\
    \ (v2.8.1).\n\nCierra el GAP #12: \"Modo debug paso a paso (breakpoints en el\
    \ state machine)\".\n\nPermite al usuario inspeccionar el estado del flow en cualquier\
    \ momento y poner\nbreakpoints en fases específicas del state machine. Cuando\
    \ el loop engine\nalcanza un breakpoint, registra el estado completo en DEBUG-TRACE.jsonl\
    \ y\npermite al usuario inspeccionar variables, evidencia acumulada, y decisiones\n\
    previas antes de continuar.\n\nFunciona en 3 modos:\n\n1. **breakpoint set**:\
    \ Define breakpoints por fase\n   python3 debug_mode.py set --flowid X --phase\
    \ reanclaje\n   python3 debug_mode.py set --flowid X --phase reanclaje,verdad\n\
    \n2. **trace inspect**: Lista todas las transiciones del state machine\n   python3\
    \ debug_mode.py trace --flowid X\n   python3 debug_mode.py trace --flowid X --from-phase\
    \ verdad --to-phase reanclaje\n\n3. **step**: Avanza un solo paso (simulado —\
    \ el loop engine real respeta los breakpoints)\n   python3 debug_m"
