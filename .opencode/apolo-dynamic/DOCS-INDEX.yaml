- type: python
  path: scripts/python/cross_language_analyzer.py
  title: cross_language_analyzer
  docstring: "cross_language_analyzer.py — Análisis de dependencias cross-lenguaje\
    \ (v2.6.6).\n\nDetecta cuando un lenguaje llama a otro:\n  - Python → Go (subprocess,\
    \ gRPC)\n  - JS/TS → Go/Python (fetch, axios, HTTP)\n  - Python → C/C++/Rust (ctypes,\
    \ cffi, FFI)\n  - Shell → cualquier binario\n  - gRPC (.proto) → clientes/servidores\n\
    \  - Any → REST API endpoints\n\nGenera CROSS-LANGUAGE-MAP.yaml con el mapa de\
    \ dependencias inter-lenguaje.\n\nUso:\n  python3 cross_language_analyzer.py --repo-root\
    \ . --code-index .opencode/apolo-dynamic/CODE-INDEX.yaml"
