- type: markdown
  path: .specwright/skills/sw-build/SKILL.md
  title: SKILL
  docstring: "---\nname: sw-build\ndescription: >-\n  TDD implementation of one work\
    \ unit. Delegates test writing to the tester\n  agent and implementation to the\
    \ executor agent. Commits per task.\nargument-hint: \"[work-id] [task-id]\"\n\
    allowed-tools:\n  - read\n  - write\n  - edit\n  - bash\n  - glob\n  - grep\n\
    \  - Task\n  - question\n---\n\n# Specwright Build\n\n## Goal\n\nImplement the\
    \ current work unit with TDD. The per-task loop is RED → GREEN → REFACTOR; end-of-unit\
    \ integration and regression checks live in one optional after-build phase.\n\n\
    ## Inputs\n\n- `{worktreeStateRoot}/session.json` -- selected work for this worktree\n\
    - `{repoStateRoot}/work/{selectedWork.id}/workflow.json`, `{workDir}/spec.md`,\
    \ `{workDir}/plan.md`\n- `{workArtifactsRoot}/{selectedWork.id}/design.md`, `{workDir}/context.md`\n\
    - `{workArtifactsRoot}/{selectedWork.id}/approvals.md` -- durable design and unit\
    \ approval ledger when present\n- `{projectArtifactsRoot}/CONSTITUTION.md`, `{projectArtifactsRoot}/config.json`\n\
    \n## Outputs\n\n- After each task: fa"
  sections:
  - heading: Specwright Build
    body: ''
  - heading: Goal
    body: '

      Implement the current work unit with TDD. The per-task loop is RED → GREEN →
      REFACTOR; end-of-unit integration and regression checks live in one optional
      after-build phase.

      '
  - heading: Inputs
    body: '

      - `{worktreeStateRoot}/session.json` -- selected work for this worktree

      - `{repoStateRoot}/work/{selectedWork.id}/workflow.json`, `{workDir}/spec.md`,
      `{workDir}/plan.md`

      - `{workArtifactsRoot}/{selectedWork.id}/design.md`, `{workDir}/context.md`

      - `{workArtifactsRoot}/{selectedWork.id}/approvals.md` -- durable design and
      unit approval ledger when present

      - `{projectArtifactsRoot}/CONSTITUTION.md`, `{projectArtifactsRoot}/config.json`

      '
  - heading: Outputs
    body: '

      - After each task: failing tests, passing implementation, task commit, workflow
      progress, updated `{workDir}/implementation-rationale.md`, refreshed `{repoStateRoot}/work/{selectedWork.id}/units/{selectedWork.unitId}/stage-report.md`

      - After all tasks: as-built notes in `plan.md`, three-line handoff to `/sw-verify`,
      ready-to-verify build state; the handoff points at `Artifacts: {repoStateRoot}/work/{selectedWork.id}/units/{selectedWork.unitId}/stage-report.md`

      '
  - heading: Constraints
    body: '

      **Execution model (LOW freedom):** Run in the foreground in the current turn.
      "Autonomous" means unattended decisions inside this build, not background execution.


      **Stage boundary (LOW freedom):** Follow `.specwright/protocols/stage-boundary.md`.
      Implement only the active unit; never create pull requests, run `gh pr create`,
      or invoke `/sw-ship`. Before the terminal handoff, write `{repoStateRoot}/work/{selectedWork.id}/units/{selectedWork.unitId}/stage-report.md`;
      the handoff points at it and'
  - heading: Protocol References
    body: '

      - `.specwright/protocols/stage-boundary.md` -- scope and final handoff

      - `.specwright/protocols/git.md` -- branch lifecycle and commit discipline

      - `.specwright/protocols/git-freshness.md` -- build-entry freshness checkpoint

      - `.specwright/protocols/git-reconcile.md` -- lifecycle-owned branch reconcile

      - `.specwright/protocols/approvals.md` -- spec approval capture and validation

      - `.specwright/protocols/review-packet.md` -- rationale artifact contract consumed
      by the reviewer packet

      - `.specwr'
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |-----------|--------|

      | No active work unit | STOP: "Run /sw-design and /sw-plan first" |

      | Selected work owned by another live top-level worktree | STOP with explicit
      `/sw-adopt` guidance |

      | Build/test command not configured | STOP: "Configure commands in config.json
      or run /sw-init" |

      | Build freshness reconcile under branch-head `require` + `rebase` or `merge`
      fails | STOP and surface the reconcile failure; keep the recorded target/freshness
      metadata intact. |

      | Buil'
