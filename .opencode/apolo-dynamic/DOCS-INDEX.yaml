- type: markdown
  path: .specwright/protocols/repo-map.md
  title: repo-map
  docstring: '# Repo Map Protocol


    Lightweight codebase context map for build-time agent delegation.


    ## Format


    Markdown with file paths as H3 headers and indented symbol signatures as list
    items:


    ```markdown

    ### src/handlers/auth.ts

    - `export function authenticate(req: Request): Promise<User>`

    - `export function validateToken(token: string): boolean`

    - `export class AuthMiddleware`


    ### src/models/user.ts (dependent)

    - `export interface User`

    - `export function findById(id: string): Promise<User | null>`

    ```


    Changed files appear first (no label). Direct dependents are labeled `(dependent)`.


    ## Generation Method


    Use ast-grep `kind` rules to match definition nodes per language:


    **JavaScript / TypeScript:**

    - `kind: function_declaration`, `kind: class_declaration`, `kind: export_statement`

    - `kind: interface_declaration`, `kind: type_alias_declaration`


    **Python:**

    - `kind: function_definition`, `kind: class_definition`


    **Go:**

    - `kind: function_declaration`, `kind: type_declaration`, `kind: me'
  sections:
  - heading: Repo Map Protocol
    body: '

      Lightweight codebase context map for build-time agent delegation.

      '
  - heading: Format
    body: '

      Markdown with file paths as H3 headers and indented symbol signatures as list
      items:


      ```markdown'
  - heading: src/handlers/auth.ts
    body: '- `export function authenticate(req: Request): Promise<User>`

      - `export function validateToken(token: string): boolean`

      - `export class AuthMiddleware`

      '
  - heading: src/models/user.ts (dependent)
    body: '- `export interface User`

      - `export function findById(id: string): Promise<User | null>`

      ```


      Changed files appear first (no label). Direct dependents are labeled `(dependent)`.

      '
  - heading: Generation Method
    body: '

      Use ast-grep `kind` rules to match definition nodes per language:


      **JavaScript / TypeScript:**

      - `kind: function_declaration`, `kind: class_declaration`, `kind: export_statement`

      - `kind: interface_declaration`, `kind: type_alias_declaration`


      **Python:**

      - `kind: function_definition`, `kind: class_definition`


      **Go:**

      - `kind: function_declaration`, `kind: type_declaration`, `kind: method_declaration`


      **Rust:**

      - `kind: function_item`, `kind: impl_item`, `kind: struct_item`, `kind: trait_ite'
  - heading: Scope
    body: "\n1. **Changed files**: read from the plan's file change map (`plan.md`\
      \ File Change Map\n   table). These are the files the current work unit will\
      \ modify.\n2. **Direct dependents**: files that import/require/use the changed\
      \ files. Detected by\n   grepping the codebase for import patterns referencing\
      \ changed file paths.\n\n**Import patterns per language:**\n- ES6: `import ...\
      \ from '<path>'` or `import '<path>'`\n- CommonJS: `require('<path>')`\n- Python:\
      \ `import <module>` or `from <module> import ...`\n- G"
  - heading: Token Budget
    body: '

      Default: 1024 tokens. Configurable via `config.context.repoMapTokens`.


      Token estimation: `Math.ceil(wordCount * 1.3)`.

      '
  - heading: Truncation
    body: "\nWhen the map exceeds the token budget:\n1. Remove symbols from dependent\
      \ files first (before changed-file symbols).\n2. Within dependents, remove deeper-nested\
      \ symbols before top-level symbols.\n3. If still over budget after removing\
      \ all dependents, truncate changed-file symbols\n   starting from the file with\
      \ the fewest imports from other changed files (least\n   coupled to the changeset).\
      \ Tie-break: alphabetical order. The ordering is a\n   heuristic — some information\
      \ loss is acceptable since file"
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |-----------|--------|

      | ast-grep (`sg`) absent | Degrade to file listing (paths only, no signatures)
      |

      | ast-grep exits with nonzero code | Treat as absent — degrade to file listing,
      log WARN |

      | No changed files in plan | Produce empty map (empty file or header only) |

      | Dependency detection misses a file | Map is incomplete but not incorrect —
      no error |

      | Token budget exceeded after truncation | Truncate to budget strictly; never
      exceed |

      '
  - heading: Lifecycle
    body: '

      - Generated once per build (before the first task in sw-build).

      - Stored at `{currentWork.workDir}/repo-map.md`.

      - Ephemeral — not persisted across builds.

      - Consumed by: context envelope (prompt injection), SubagentStart hook (backup).

      '
