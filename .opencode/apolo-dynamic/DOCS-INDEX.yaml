- type: python
  path: scripts/python/script_generator.py
  title: script_generator
  docstring: "script_generator.py — Permite al agente crear scripts nuevos (v3.2.0).\n\
    \nRESPONDE a la intencion del usuario:\n  \"si el agente debe elaborar script\
    \ para no solo los que estan sino el\n   sistema de promover que el agente mejore\"\
    \n\nEl agente puede proponer un script nuevo cuando los existentes no cubren\n\
    la necesidad. El sistema:\n  1. Valida que el script no duplica uno existente\
    \ (similarity check)\n  2. Genera el template con la estructura estandar (shebang,\
    \ docstring, imports, common.py)\n  3. Lo guarda en scripts/python/ con nombre\
    \ descriptivo\n  4. Lo registra en TOOL-REGISTRY.yaml automaticamente\n  5. Crea\
    \ un test skeleton en tests/\n  6. Actualiza auto_hooks con un trigger opcional\n\
    \nCLI:\n  # Agente propone un script nuevo\n  python3 script_generator.py create\
    \ \\\n      --name \"jwt_validator\" \\\n      --description \"Valida tokens JWT\
    \ firmados\" \\\n      --purpose \"security\" \\\n      --inputs \"token:string,secret:string\"\
    \ \\\n      --outputs \"valid:bool,payload:dict\" \\\n      --repo-root .\n\n\
    \  # Listar "
  examples:
  - python3 {name}.py {usage_args}
