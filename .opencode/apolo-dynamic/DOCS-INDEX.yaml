  path: .specwright/skills/sw-review/SKILL.md
  title: SKILL
  docstring: "---\nname: sw-review\ndescription: Fetches and displays PR review comments\
    \ from GitHub, grouped by priority, and allows the user to reply to or resolve\
    \ individual threads.\nargument-hint: \"[pr-number]\"\nallowed-tools:\n  - read\n\
    \  - bash\n  - grep\n  - question\n---\n\n# Specwright Review\n\n## Goal\n\nSurface\
    \ PR review comments, triage autonomously per Google severity framework\n(`.specwright/protocols/decision.md`),\
    \ draft replies, and present for approval before\nposting. When the associated\
    \ Specwright work can be resolved safely, use\n`review-packet.md`, `approvals.md`,\
    \ and unit evidence as the primary reply\ncontext instead of reasoning from the\
    \ diff alone. Stateless with respect to\nSpecwright state — never modifies workflow.json.\n\
    \nFetch all comment types, group by status, apply autonomous triage:\n- Functional\
    \ issues (API misuse, missing validation): fix code and draft reply\n- Nits (style,\
    \ naming): acknowledge, apply if <2 minutes\n- Suggestions: apply if they improve\
    \ code health, push back with reaso"
  sections:
  - heading: Specwright Review
    body: ''
  - heading: Goal
    body: '

      Surface PR review comments, triage autonomously per Google severity framework

      (`.specwright/protocols/decision.md`), draft replies, and present for approval
      before

      posting. When the associated Specwright work can be resolved safely, use

      `review-packet.md`, `approvals.md`, and unit evidence as the primary reply

      context instead of reasoning from the diff alone. Stateless with respect to

      Specwright state — never modifies workflow.json.


      Fetch all comment types, group by status, apply autonomous tr'
  - heading: Inputs
    body: "\n- `{projectArtifactsRoot}/config.json` — `git.prTool` and `git.baseBranch`\
      \ settings\n- Current branch: detected via `git branch --show-current`\n- GitHub\
      \ PR: discovered via `gh pr list --head {branch}`\n- PR comments fetched via\
      \ `gh api` REST and GraphQL endpoints\n- Associated Specwright work when it\
      \ can be matched safely from PR number or branch:\n  - `{repoStateRoot}/work/*/workflow.json`\n\
      \  - `{workDir}/review-packet.md`\n  - `{workArtifactsRoot}/{workId}/approvals.md`\n\
      \  - `{workDir}/evidence/*.md"
  - heading: Outputs
    body: "\n- Grouped display of all PR comments by status and type:\n  - Unresolved\
      \ threads (highest priority, shown first)\n  - Open issue comments (general\
      \ PR conversation)\n  - Resolved or addressed threads (shown last)\n- Each comment\
      \ shows: author, timestamp, file path, line number (where applicable), and body\n\
      - When associated work is available, replies and findings use the review packet,\n\
      \  approval lineage, and evidence as first-class context\n- User responses posted\
      \ via `gh api` POST to the appropriate"
  - heading: Constraints
    body: "\n**PR detection (MEDIUM freedom):**\n- Detect the current branch with\
      \ `git branch --show-current`. If the result\n  is empty or HEAD is detached,\
      \ report the detached HEAD condition and stop.\n- Discover the associated PR\
      \ using `gh pr list --head {branch} --json number,title,url`.\n  If no open\
      \ PR is found, retry with `--state merged` as a fallback for merged PRs.\n-\
      \ If multiple PRs are returned and interactive questioning is available, use\n\
      \  AskUserQuestion to disambiguate. In headless mode, use the "
  - heading: Protocol References
    body: '

      - `.specwright/protocols/decision.md` — autonomous decision framework (Google
      severity triage, external reply gate)

      - `.specwright/protocols/git.md` — PR operations, remote URL conventions, gh
      CLI patterns

      - `.specwright/protocols/evidence.md` — gate evidence as canonical detail

      - `.specwright/protocols/approvals.md` — approval lineage contract

      - `.specwright/protocols/review-packet.md` — reviewer packet contract for reply
      context

      - `.specwright/protocols/headless.md` — non-interactive executio'
  - heading: Failure Modes
    body: "\n- **Detached HEAD** — `git branch --show-current` returns empty. Report\
      \ \"Cannot\n  detect branch: HEAD is detached. Check out a branch and try again.\"\
      \ Do not proceed.\n- **No PR found** — `gh pr list --head` returns no results\
      \ and the `--state merged`\n  fallback also returns nothing. Report \"No pull\
      \ request found for branch\n  `{branch}`\" and exit without error.\n- **No comments**\
      \ — PR exists but all three comment type queries return zero\n  results. Report\
      \ \"No review comments found on this PR.\" and"
