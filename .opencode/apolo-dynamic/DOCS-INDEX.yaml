- type: python
  path: scripts/python/predict_impact.py
  title: predict_impact
  docstring: "predict_impact.py — Generador de hologramas/predicciones de impacto.\n\
    \nGAP 3: Hologramas y predicción de soluciones.\n\nv2.5.0: project_dependency_cascade\
    \ ahora hace BFS multi-nivel (no solo 1 nivel\nde dependencias directas). Si A\
    \ importa B que importa C que importa D, el\ncascade detecta A->B->C->D hasta\
    \ profundidad configurable (default 5 niveles).\n\nPara cada Micro-Plan (MP) en\
    \ DYNAMIC-PLAN.yaml genera 3 proyecciones:\n\n[1] DEPENDENCY CASCADE (multi-nivel\
    \ BFS desde v2.5.0)\n    -> dado que MP-XX modifica archivos A, B, C,\n      ¿qué\
    \ otros módulos importan A, B, C? (desde CODE-INDEX)\n      ¿y qué módulos importan\
    \ ESOS? ¿y los siguientes? (BFS)\n      -> riesgo: bajo/medio/alto/crítico por\
    \ número total de afectados\n      -> cascade_depth: profundidad máxima alcanzada\n\
    \      -> affected_by_level: cuántos archivos afectados a cada nivel\n\n[2] HISTORICAL\
    \ PATTERN MATCH\n    -> busca en telemetry.jsonl patrones similares de fases/gates\n\
    \      que terminaron en rollback o bloqueo\n      -> \"este tipo de"
  examples:
  - "python3 predict_impact.py \\\\\n    --plan plan/active/<FLOW>/03-PLAN-INDICE-DYNAMIC.yaml\
    \ \\\\\n    --code-index .opencode/apolo-dynamic/CODE-INDEX.yaml \\\\\n    --telemetry\
    \ plan/active/<FLOW>/telemetry.jsonl \\\\\n    --test-runs-dir plan/active/<FLOW>/tests/\
    \ \\\\\n    --output plan/active/<FLOW>/IMPACT-PREDICTION.yaml \\\\\n    [--deep]\
    \ [--flowid APOLO-...] [--cascade-depth 5]"
