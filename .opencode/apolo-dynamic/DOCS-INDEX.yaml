    \ stack and interactively configure deterministic guardrails\nacross four enforcement\
    \ layers (session, commit, push, CI/CD). Each layer is\nindependently approvable.\
    \ Existing guardrails are preserved during re-runs.\n\n## Inputs\n\n- The codebase\
    \ (dependency manifests, config files, existing hooks)\n- `{projectArtifactsRoot}/config.json`\
    \ -- project configuration (optional -- not required)\n- `{projectArtifactsRoot}/CONSTITUTION.md`\
    \ -- practices to follow (if present)\n- Existing agent hooks, git hooks, CI workflows\n\
    \n## Outputs\n\nWhen complete, user-approved guardrails are configured. Artifacts\
    \ may include:\n\n\n- `.opencode/plugins/*.t"
  sections:
  - heading: Specwright Guard
    body: ''
  - heading: Goal
    body: '

      Detect the project''s stack and interactively configure deterministic guardrails

      across four enforcement layers (session, commit, push, CI/CD). Each layer is

      independently approvable. Existing guardrails are preserved during re-runs.

      '
  - heading: Inputs
    body: '

      - The codebase (dependency manifests, config files, existing hooks)

      - `{projectArtifactsRoot}/config.json` -- project configuration (optional --
      not required)

      - `{projectArtifactsRoot}/CONSTITUTION.md` -- practices to follow (if present)

      - Existing agent hooks, git hooks, CI workflows

      '
  - heading: Outputs
    body: '

      When complete, user-approved guardrails are configured. Artifacts may include:



      - `.opencode/plugins/*.ts` -- session-level plugin hooks.


      - Pre-commit hook configurations (framework chosen by user)

      - Pre-push hook configurations (test runner, coverage thresholds)

      - CI/CD workflow files (backstop checks, integration tests, security scanning)

      - `{projectArtifactsRoot}/config.json` -- updated with detected tool commands
      (if present)


      Note: CONSTITUTION.md is NOT modified. Constitutional updates '
  - heading: Constraints
    body: "\n**Detection (MEDIUM freedom):**\n- Follow `.specwright/protocols/guardrails-detection.md`\
      \ for the three-step detection algorithm\n  (manifest scan, config file scan,\
      \ existing guardrail scan).\n- Detection scope includes traditional tools (linters,\
      \ formatters, test runners) and\n  semantic analysis tools: ast-grep (`sg`),\
      \ OpenGrep (`opengrep`), and platform LSP\n  (Claude Code `.lsp.json`, Opencode\
      \ built-in, `cli-lsp-client` standalone).\n- If `{projectArtifactsRoot}/config.json`\
      \ exists, read `command"
  - heading: Protocol References
    body: '

      - `.specwright/protocols/guardrails-detection.md` -- three-step stack and guardrail
      detection

      - `.specwright/protocols/guardrails-patterns.md` -- coverage model, enforcement
      patterns, framework options

      - `.specwright/protocols/context.md` -- config.json format and loading

      - `.specwright/protocols/headless.md` -- non-interactive execution detection
      and defaults

      - `.specwright/protocols/delegation.md` -- agent delegation for researcher

      '
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |-----------|--------|

      | No dependency manifest found | Ask user about language/framework directly
      |

      | Detected tool fails `--version` check | Warn user, skip that tool, ask for
      correct command |

      | Install command fails | Show error, let user retry or skip |

      | Detected tools conflict | Present trade-offs, let user choose |

      | Unsupported CI platform | Warn, skip CI/CD layer |

      | Compaction during config | Read config.json and external files, resume next
      missing item |

      '
