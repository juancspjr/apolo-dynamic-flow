  path: scripts/python/llm_bridge.py
  title: llm_bridge
  docstring: "llm_bridge.py — Interface universal para LLM (v2.6.0).\n\nLee OPENAI_API_BASE\
    \ y MINIMAX_API_KEY (o OPENAI_API_KEY) del entorno.\nUsa curl para llamadas (sin\
    \ dependencias Python externas).\n\nSi no hay API key, todas las funciones retornan\
    \ None y el caller usa\nfallback determinista. El sistema es 100% funcional sin\
    \ LLM.\n\nUso:\n  from llm_bridge import chat, embed, is_available, analyze_code,\
    \ suggest_fix\n  \n  if is_available():\n      response = chat([{\"role\": \"\
    user\", \"content\": \"Analyze this code\"}])\n  else:\n      response = None\
    \  # usar fallback determinista"
  examples:
  - "from llm_bridge import chat, embed, is_available, analyze_code, suggest_fix\n\
    \  \n  if is_available():\n      response = chat([{\"role\": \"user\", \"content\"\
    : \"Analyze this code\"}])\n  else:\n      response = None  # usar fallback determinista"
