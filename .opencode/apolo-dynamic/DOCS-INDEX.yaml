  docstring: "summarize_functions.py — Resumen automático de funciones (v2.6.6).\n\
    \nGenera un resumen de 1 línea para cada función del codebase.\n\nSi LLM disponible:\
    \ usa llm_bridge.analyze_code() para generar resúmenes inteligentes.\nSi no: usa\
    \ heurísticas deterministas:\n  - Parsea docstrings\n  - Analiza verbos en el\
