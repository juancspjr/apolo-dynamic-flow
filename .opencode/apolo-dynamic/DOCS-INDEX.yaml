  path: .specwright/skills/gate-security/SKILL.md
  title: SKILL
  docstring: "---\nname: gate-security\ndescription: >-\n  Detects leaked secrets,\
    \ injection patterns, and sensitive data exposure\n  across changed files. Uses\
    \ real tooling when configured, LLM judgment\n  for analysis. Internal gate —\
    \ invoked by verify.\nallowed-tools:\n  - read\n  - bash\n  - glob\n  - grep\n\
    \  - write\n---\n\n# Gate: Security\n\n## Goal\n\nEnsure the codebase doesn't\
    \ leak secrets, introduce injection vulnerabilities,\nor expose sensitive data.\
    \ Use real security tooling when available. Use LLM\njudgment for analysis that\
    \ tools can't do.\n\n## Inputs\n\n- `{projectArtifactsRoot}/config.json` -- `commands.lint`,\
    \ SAST tool config if available\n- `{repoStateRoot}/work/{selectedWork.id}/workflow.json`\
    \ -- selected work unit\n- Changed files (detected via `git diff`)\n\n## Outputs\n\
    \n- Evidence file at `{workDir}/evidence/security-report.md`\n- Gate status in\
    \ the selected work's `workflow.json`\n- Findings shown inline with severity,\
    \ location, and remediation\n\n## Constraints\n\n**Scope (MEDIUM freedom):**\n\
    - Focus on chan"
  sections:
  - heading: 'Gate: Security'
    body: ''
  - heading: Goal
    body: '

      Ensure the codebase doesn''t leak secrets, introduce injection vulnerabilities,

      or expose sensitive data. Use real security tooling when available. Use LLM

      judgment for analysis that tools can''t do.

      '
  - heading: Inputs
    body: '

      - `{projectArtifactsRoot}/config.json` -- `commands.lint`, SAST tool config
      if available

      - `{repoStateRoot}/work/{selectedWork.id}/workflow.json` -- selected work unit

      - Changed files (detected via `git diff`)

      '
  - heading: Outputs
    body: '

      - Evidence file at `{workDir}/evidence/security-report.md`

      - Gate status in the selected work''s `workflow.json`

      - Findings shown inline with severity, location, and remediation

      '
  - heading: Constraints
    body: '

      **Scope (MEDIUM freedom):**

      - Focus on changed files. Use `git diff --name-only` against main branch.

      - If no changed files detected, check all files in work scope.


      **Phase 1 — Detection (LOW freedom, BLOCK severity):**

      - Scan for secrets: API keys, tokens, passwords, private keys in source files.

      - Scan for .env files, credential files, or key files staged for commit.

      - Check .gitignore covers sensitive patterns.

      - If a configured SAST tool exists (e.g., `semgrep`, `eslint-plugin-security`), '
  - heading: Protocol References
    body: '

      - `.specwright/protocols/evidence.md#verdict-rendering` -- verdict rendering

      - `.specwright/protocols/evidence.md` -- evidence storage

      - `.specwright/protocols/state.md` -- gate status updates

      '
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |-----------|--------|

      | No SAST tool configured | Skip tool-based detection, rely on LLM analysis
      |

      | No changed files detected | Scan all project source files |

      | SAST tool not installed | WARN finding, suggest installation, continue with
      LLM |

      '
