  docstring: "---\nname: sw-pivot\ndescription: >-\n  Research-backed rebaselining.\
    \ Revises design, plan, or in-progress work\n  while preserving completed scope\
    \ and approval lineage.\nargument-hint: \"[reason for pivot]\"\nallowed-tools:\n\
    \  - read\n  - write\n  - edit\n  - bash\n  - glob\n  - grep\n  - Task\n---\n\n\
    # Specwright Pivot\n\n## Goal\n\nResearch-backed rebaselining for the selected\
    \ work. Capture preserved scope,\nunderstand what changed, classify the pivot,\
    \ revise the affected open work via\narchitect, and hand back to `/sw-plan` or\
    \ `/sw-build` as appropriate. Applies\n`.specwright/protocols/decision.md` for\
    \ all decisions. Revisions auto-applied and recorded\nin `decisions.md`; the revised\
    \ artifact set is the contract.\n\n## Inputs\n\n- `{worktreeStateRoot}/session.json`\
    \ — selected work for this worktree\n- `{repoStateRoot}/work/{selectedWork.id}/workflow.json`\
    \ — selected work state,\n  active unit, `tasksCompleted`, `tasksTotal`, and work/unit\
    \ paths\n- work-level artifacts: `design.md`, `context.md`, `assumptions.md`,\n"
  sections:
  - heading: Specwright Pivot
    body: ''
  - heading: Goal
    body: '

      Research-backed rebaselining for the selected work. Capture preserved scope,

      understand what changed, classify the pivot, revise the affected open work via

      architect, and hand back to `/sw-plan` or `/sw-build` as appropriate. Applies

      `.specwright/protocols/decision.md` for all decisions. Revisions auto-applied
      and recorded

      in `decisions.md`; the revised artifact set is the contract.

      '
  - heading: Inputs
    body: "\n- `{worktreeStateRoot}/session.json` — selected work for this worktree\n\
      - `{repoStateRoot}/work/{selectedWork.id}/workflow.json` — selected work state,\n\
      \  active unit, `tasksCompleted`, `tasksTotal`, and work/unit paths\n- work-level\
      \ artifacts: `design.md`, `context.md`, `assumptions.md`,\n  `decisions.md`,\
      \ `integration-criteria.md` when present\n- active or affected unit artifacts:\
      \ `spec.md`, `plan.md`, `context.md`\n- `{workArtifactsRoot}/{selectedWork.id}/approvals.md`\
      \ — durable approval ledger fo"
  - heading: Outputs
    body: "\n- revised work-level artifacts when design or scope changes require them\n\
      - regenerated affected remaining-unit artifacts when unit boundaries or\n  observable\
      \ behavior change\n- updated `integration-criteria.md` when structural pivots\
      \ stale the current\n  criteria\n- selected work's `workflow.json` — pivot classification,\
      \ active state, and\n  affected remaining work updated\n- `decisions.md` — pivot\
      \ decisions recorded\n"
  - heading: Constraints
    body: '

      **Pre-condition (LOW freedom):**

      Resolve the selected work from the current worktree session. Valid entry states

      are `planning`, `building`, and `verifying`. Reject `designing`,

      `shipping`, and `shipped` with explicit guidance: use `/sw-design` change

      request flow for `designing`, and start a fresh work or normal ship/fix flow

      for `shipping` or `shipped`. If another live top-level worktree owns the

      selected work, STOP with explicit adopt/takeover guidance.


      **Snapshot (LOW freedom):**

      Read the '
  - heading: Protocol References
    body: '

      - `.specwright/protocols/stage-boundary.md` -- scope and handoff

      - `.specwright/protocols/decision.md` -- autonomous decision framework (scope
      assessment)

      - `.specwright/protocols/state.md` -- workflow state updates

      - `.specwright/protocols/approvals.md` -- approval lineage invalidation and
      stale-state handling

      - `.specwright/protocols/delegation.md` -- architect delegation

