    \ Analiza funciones llamadas internamente\n  - Genera: \"Gets user by ID from\
    \ database\" o \"Validates email format\"\n\nUso:\n  python3 summarize_functions.py\
    \ --repo-root . --code-index .opencode/apolo-dynamic/CODE-INDEX.yaml"
