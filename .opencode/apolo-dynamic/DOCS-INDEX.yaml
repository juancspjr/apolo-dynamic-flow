  title: self_healing_loop
  docstring: "self_healing_loop.py — Loop que detecta y auto-repara fallas del sistema\
    \ (v3.5.1).\n\nRESPONDE a tu indicacion: \"el agente se de cuenta de los errores\
    \ del sistema\nel sistema ayuda\"\n\nEste script MONITOREA el sistema continuamente\
    \ y cuando detecta una falla:\n  1. La diagnostica (guided_recovery)\n  2. Intenta\
    \ repararla automaticamente si es segura\n  3. Si no es segura, ofrece escape\
    \ hatch al agente\n  4. Registra todo en telemetry para aprendizaje\n\nTipos de\
    \ auto-repair que hace:\n  - Missing dependency → pip install (con confirmacion)\n\
    \  - Missing directory → mkdir -p\n  - Missing config file → init con defaults\n\
    \  - YAML parse error → intentar reconstruir desde backup\n  - Permission denied\
    \ → chmod (con confirmacion)\n\nCLI:\n  python3 self_healing_loop.py monitor --flowid\
    \ X --repo-root . [--interval 30]\n  python3 self_healing_loop.py check --flowid\
    \ X --repo-root .\n  python3 self_healing_loop.py repair --flowid X --error \"\
    ...\" [--dry-run]"
