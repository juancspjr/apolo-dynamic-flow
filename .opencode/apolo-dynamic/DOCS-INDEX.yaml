- type: python
  path: scripts/python/rollback.py
  title: rollback
  docstring: "rollback.py — Ejecuta rollback tras test fail.\n\nEstrategias:\n  -\
    \ git-restore: git restore <files afectados por el MP>\n  - git-stash-pop: git\
    \ stash + git stash pop al fallar\n  - custom-script: ejecuta un script Python/shell\
    \ custom\n\nLee:\n  - mp_id: MP que originó el cambio\n  - repo_root: raíz del\
    \ repo\n\nDetermina archivos afectados por:\n  - git diff --name-only HEAD (archivos\
    \ modificados no commiteados)\n  - Filtra por paths en FLOW-STATE.yaml.artifacts.current_mps[mp_id]\n\
    \nEjecuta rollback y reporta:\n  - archivos restaurados\n  - hash del estado pre-rollback\
    \ (para auditoría)\n  - exit code"
