- type: markdown
  path: .specwright/protocols/spec-review.md
  title: spec-review
  docstring: "# Spec Review Protocol\n\nPre-build spec quality review. Catches untestable\
    \ criteria, vague language, and\nmissing edge cases before build time is spent\
    \ on a bad spec.\n\n## When to Invoke\n\nAfter each spec is drafted in sw-plan\
    \ — for both single-unit specs and each\nper-unit spec in multi-unit work — before\
    \ presenting to the user for approval.\n\n## How to Invoke\n\nDelegate to `specwright-architect`\
    \ with:\n- The full spec (all acceptance criteria)\n- The design.md for grounding\
    \ context\n- This protocol (the seven dimensions and finding levels below)\n-\
    \ Instruction: \"Review these acceptance criteria for quality. Return findings\n\
    \  grouped by dimension. Do not suggest implementation — only assess spec quality.\"\
    \n\n## Quality Dimensions\n\n### 1. Testability\nEach criterion must describe\
    \ an observable, verifiable outcome. A tester must\nbe able to write a concrete\
    \ test (automated or manual check) without guessing.\n\n**Flag phrases:** \"works\
    \ correctly\", \"handles edge cases\", \"performs well\",\n\"is user-friendly\""
  sections:
  - heading: Spec Review Protocol
    body: '

      Pre-build spec quality review. Catches untestable criteria, vague language,
      and

      missing edge cases before build time is spent on a bad spec.

      '
  - heading: When to Invoke
    body: '

      After each spec is drafted in sw-plan — for both single-unit specs and each

      per-unit spec in multi-unit work — before presenting to the user for approval.

      '
  - heading: How to Invoke
    body: "\nDelegate to `specwright-architect` with:\n- The full spec (all acceptance\
      \ criteria)\n- The design.md for grounding context\n- This protocol (the seven\
      \ dimensions and finding levels below)\n- Instruction: \"Review these acceptance\
      \ criteria for quality. Return findings\n  grouped by dimension. Do not suggest\
      \ implementation — only assess spec quality.\"\n"
  - heading: Quality Dimensions
    body: ''
  - heading: 1. Testability
    body: 'Each criterion must describe an observable, verifiable outcome. A tester
      must

      be able to write a concrete test (automated or manual check) without guessing.


      **Flag phrases:** "works correctly", "handles edge cases", "performs well",

      "is user-friendly", "behaves as expected", "functions properly"


      **Example (bad):** "The API handles errors correctly."

      **Example (good):** "If the API receives a request with a missing required field,

      it returns HTTP 400 with a JSON body containing an `errors` arra'
  - heading: 2. Measurability
    body: 'Prefer numeric or behavioral thresholds over subjective adjectives. The
      pass/fail

      boundary must be unambiguous.


      **Flag phrases:** "fast enough", "reasonable", "appropriate", "good performance",

      "acceptable", "sufficient", "minimal overhead"


      **Example (bad):** "The search response is fast enough for users."

      **Example (good):** "Search results are returned within 500ms for queries up
      to

      100 characters on a dataset of 10,000 records."

      '
  - heading: 3. Completeness
    body: 'At least one error or boundary case per functional area. Happy-path-only
      specs

      miss the behaviors that matter most.


      **Look for:** criteria sets that only describe the success case with no

      corresponding error case, input validation, or limit behavior.

      '
  - heading: 4. Ambiguity
    body: 'Acceptance criteria must state what will be verified, not what should happen.

      Hedge words leave it to the implementer to decide what "enough" means.


      **Flag phrases:** "should", "might", "can", "may", "ideally", "where possible",

      "at minimum", "generally"


      **Example (bad):** "The form should validate required fields."

      **Example (good):** "Submitting the form with an empty required field displays

      an inline error message below that field and prevents form submission."

      '
  - heading: 5. Grounding
    body: 'Each criterion must be traceable to a design decision, requirement, or

      explicitly stated constraint. Criteria that appear from nowhere may reflect

      scope creep or misunderstanding.


      **Look for:** criteria that introduce behavior not mentioned in the design.md,

      context.md, or the user''s stated requirements.

      '
  - heading: 6. Testability Proof
    body: 'The architect''s review output must include a concrete test description
      for each

      AC — not a restatement of the criterion, but a specific test: inputs, action,

      and expected observable result. Each proof must also state the expected test
      type

      in square brackets.


      **Example:** "AC-1 can be tested by: [integration test] calling the real HTTP

      endpoint via supertest and asserting the response body contains `{status: ''ok''}`."


      **Rule:** If the architect cannot write a concrete test description for an AC'
  - heading: 7. Test Type Appropriateness
    body: "Each criterion that involves a system boundary should specify whether it\
      \ needs\na unit test, integration test, or E2E test. Criteria that cross internal\
      \ module\nboundaries but are silent about integration expectations are likely\
      \ to get\ntested with mocks when they should be tested with real components.\n\
      \n**Flag patterns:**\n- \"Data persists across requests\" → needs [integration\
      \ test] with real database,\n  not a mocked repository\n- \"API returns 200\
      \ with payload X\" → needs [integration test] with real "
  - heading: Finding Levels
    body: '

      | Level | Meaning | Action required |

      |-------|---------|-----------------|

      | **BLOCK** | Criterion cannot be tested as written | Must be revised or explicitly
      overridden by user before spec is finalized |

      | **WARN** | Vague language or missing boundary case | User may revise or accept
      as-is |

      | **INFO** | Style suggestion or minor improvement | Never blocking; shown for
      awareness only |

      '
  - heading: Resolution Flow
    body: "\n1. Architect returns findings grouped by dimension (BLOCK first, then\
      \ WARN, INFO).\n2. **BLOCKs:** Present each to the user with the finding and\
      \ a suggested revision.\n   User options: (a) revise the criterion, (b) override\
      \ with stated reason.\n3. **WARNs:** Present alongside the spec at the user\
      \ approval checkpoint.\n   User options: (a) revise, (b) accept as-is.\n4. **INFOs:**\
      \ Show as a summary line. No action required.\n5. If any criteria were revised:\
      \ re-delegate to architect for another pass.\n  "
  - heading: Failure Mode
    body: '

      If architect returns no findings: spec passes review. Note "Spec review: no
      issues

      found." and proceed to user approval checkpoint.

      '
