  docstring: "---\nname: sw-sync\ndescription: >-\n  Syncs the local repository by\
    \ fetching all remotes, updating the base branch,\n  and removing stale local\
    \ branches that are not protected by live sessions or\n  helper worktrees.\nargument-hint:\
    \ \"\"\nallowed-tools:\n  - read\n  - bash\n  - glob\n  - question\n---\n\n# Specwright\
    \ Sync\n\n## Goal\n\nKeep the local repository current without deleting branches\
    \ that are still\nclaimed by a live Specwright session or a subordinate helper\
    \ worktree.\n\n## Inputs\n\n- `{projectArtifactsRoot}/config.json`\n- `{worktreeStateRoot}/session.json`\n\
    - `{repoStateRoot}/work/*/workflow.json`\n- `git worktree list --porcelain`\n\n\
    ## Outputs\n\n- Remotes fetched and pruned\n- Base branch fast-forwarded when\
    \ safe\n- Candidate stale branches previewed, then deleted only after confirmation\n\
    - Summary report: branches fetched, removed, skipped, protected, and any stale\n\
    \  active works detected\n\n## Advisory Reporting\n\n- After fetch/prune completes,\
    \ `sw-sync` may report stale active works against\n  their re"
  sections:
  - heading: Specwright Sync
    body: ''
  - heading: Goal
    body: '

      Keep the local repository current without deleting branches that are still

      claimed by a live Specwright session or a subordinate helper worktree.

      '
  - heading: Inputs
    body: '

      - `{projectArtifactsRoot}/config.json`

      - `{worktreeStateRoot}/session.json`

      - `{repoStateRoot}/work/*/workflow.json`

      - `git worktree list --porcelain`

      '
  - heading: Outputs
    body: "\n- Remotes fetched and pruned\n- Base branch fast-forwarded when safe\n\
      - Candidate stale branches previewed, then deleted only after confirmation\n\
      - Summary report: branches fetched, removed, skipped, protected, and any stale\n\
      \  active works detected\n"
  - heading: Advisory Reporting
    body: "\n- After fetch/prune completes, `sw-sync` may report stale active works\
      \ against\n  their recorded targets and latest known freshness state.\n- This\
      \ report is advisory only and does not take ownership of\n  reconcile-or-ship\
      \ decisions away from the lifecycle skills.\n- `sw-sync` never rebases, merges,\
      \ retargets, or clears a freshness block on\n  behalf of `sw-build`, `sw-verify`,\
      \ or `sw-ship`.\n"
  - heading: Constraints
    body: "\n**Fetch (HIGH freedom):**\n- Run `git fetch --all --prune`.\n\n**State-aware\
      \ protection set (LOW freedom):**\n- Build a branch protection set from:\n \
      \ - the currently checked out branch\n  - the configured base branch and perennial\
      \ branches\n  - branches recorded by live `session.json` files across `git worktree\
      \ list`\n  - branches recorded in attached work `workflow.json.branch`\n  -\
      \ helper branch patterns `worktree-*` and `specwright-wt-*`\n- Treat subordinate\
      \ helper worktrees discovered via `git workt"
  - heading: Protocol References
    body: '

      - `.specwright/protocols/git.md` -- branch lifecycle and cleanup rules

      - `.specwright/protocols/git-freshness.md` -- freshness result shape and status
      semantics for advisory reporting

      - `.specwright/protocols/context.md` -- logical roots and session loading

      - `.specwright/protocols/state.md` -- per-work workflow fields used for protection

      - `.specwright/protocols/headless.md` -- non-interactive behavior

      '
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |---|---|

      | no remotes configured | stop with a remote-setup error |

      | `git fetch` fails | surface the error and skip deletion |

      | no stale branch candidates | report that nothing is deletable |

      | worktree/session inspection fails | skip deletion and warn |

      | current session''s attached work is building or verifying | abort and tell
      the user to finish or reset that work first |

      | base branch cannot fast-forward | warn and continue without merging or resetting
      |

      '
