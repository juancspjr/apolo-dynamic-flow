  docstring: "---\nname: gate-wiring\ndescription: >-\n  Detects unused exports, orphaned\
    \ files, architecture layer violations,\n  and circular dependencies across changed\
    \ files. Delegates to architect\n  agent for structural analysis. Internal gate\
    \ — invoked by verify.\nallowed-tools:\n  - read\n  - bash\n  - glob\n  - grep\n\
    \  - write\n  - Task\n---\n\n# Gate: Wiring\n\n## Goal\n\nEnsure the codebase\
    \ is properly connected — no dead code, no orphaned\nfiles, no architecture violations.\
    \ Code that compiles and passes tests\ncan still be wired incorrectly.\n\n## Inputs\n\
    \n- `{projectArtifactsRoot}/config.json` -- architecture layers, project structure\n\
    - `{repoStateRoot}/work/{selectedWork.id}/workflow.json` -- selected work unit\n\
    - Changed files (via `git diff`)\n\n## Outputs\n\n- Evidence file at `{workDir}/evidence/wiring-report.md`\n\
    - Gate status in the selected work's `workflow.json`\n- Findings with specific\
    \ file:line references and remediation\n\n## Constraints\n\n**Scope (MEDIUM freedom):**\n\
    - Focus on changed files and their immed"
  sections:
  - heading: 'Gate: Wiring'
    body: ''
  - heading: Goal
    body: '

      Ensure the codebase is properly connected — no dead code, no orphaned

      files, no architecture violations. Code that compiles and passes tests

      can still be wired incorrectly.

      '
  - heading: Inputs
    body: '

      - `{projectArtifactsRoot}/config.json` -- architecture layers, project structure

      - `{repoStateRoot}/work/{selectedWork.id}/workflow.json` -- selected work unit

      - Changed files (via `git diff`)

      '
  - heading: Outputs
    body: '

      - Evidence file at `{workDir}/evidence/wiring-report.md`

      - Gate status in the selected work''s `workflow.json`

      - Findings with specific file:line references and remediation

      '
  - heading: Constraints
    body: "\n**Scope (MEDIUM freedom):**\n- Focus on changed files and their immediate\
      \ dependents.\n- Use `git diff --name-only` against main branch.\n\n**Analysis\
      \ (HIGH freedom):**\n- Delegate to `specwright-architect` for structural analysis.\n\
      - The architect checks:\n  - **Unused exports**: Public functions/types exported\
      \ but never imported.\n  - **Orphaned files**: Files not imported by anything\
      \ in the dependency graph.\n  - **Layer violations**: Imports crossing architecture\
      \ layer boundaries (e.g., UI importing"
  - heading: Protocol References
    body: '

      - `.specwright/protocols/evidence.md#verdict-rendering` -- verdict rendering

      - `.specwright/protocols/evidence.md` -- evidence storage

      - `.specwright/protocols/state.md` -- gate status updates

      - `.specwright/protocols/delegation.md` -- architect agent delegation

      '
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |-----------|--------|

      | No changed files detected | Analyze all project source files |

      | No architecture layers configured | Skip layer violation check |

      | Wiring tool not installed | Fall back to LLM-based analysis |

      | Too many files to analyze | Focus on changed files only, note incomplete scope
      |

      | Single-unit work (no workUnits) | Skip cross-unit check entirely |

      | baselineCommit null or unreachable | Skip cross-unit check, WARN |

      | Not the final unit | Skip cross-un'
