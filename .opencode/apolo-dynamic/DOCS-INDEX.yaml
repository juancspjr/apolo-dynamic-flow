  path: .specwright/skills/sw-audit/SKILL.md
  title: SKILL
  docstring: "---\nname: sw-audit\ndescription: >-\n  Periodic codebase health check.\
    \ Analyzes architecture, complexity,\n  consistency, and debt across the full\
    \ codebase. Produces persistent\n  findings in AUDIT.md.\nargument-hint: \"[path\
    \ | --full]\"\nallowed-tools:\n  - read\n  - write\n  - glob\n  - grep\n  - Task\n\
    ---\n\n# Specwright Audit\n\n## Goal\n\nFind systemic codebase issues that per-change\
    \ quality gates miss.\nArchitecture debt, complexity growth, convention drift,\
    \ and accumulated\nworkarounds compound silently. Surface them, let the user prioritize,\n\
    and persist findings for future design cycles.\n\n## Inputs\n\n- The codebase\
    \ itself\n- `{projectArtifactsRoot}/CONSTITUTION.md` -- practices to check against\n\
    - `{projectArtifactsRoot}/AUDIT.md` -- prior findings (if exists, for ID matching)\n\
    - `{projectArtifactsRoot}/LANDSCAPE.md` -- module structure (if exists, for triage)\n\
    - `{projectArtifactsRoot}/config.json` -- audit config (optional `audit` section)\n\
    \n## Outputs\n\n- `{projectArtifactsRoot}/AUDIT.md` -- findings pe"
  sections:
  - heading: Specwright Audit
    body: ''
  - heading: Goal
    body: '

      Find systemic codebase issues that per-change quality gates miss.

      Architecture debt, complexity growth, convention drift, and accumulated

      workarounds compound silently. Surface them, let the user prioritize,

      and persist findings for future design cycles.

      '
  - heading: Inputs
    body: '

      - The codebase itself

      - `{projectArtifactsRoot}/CONSTITUTION.md` -- practices to check against

      - `{projectArtifactsRoot}/AUDIT.md` -- prior findings (if exists, for ID matching)

      - `{projectArtifactsRoot}/LANDSCAPE.md` -- module structure (if exists, for
      triage)

      - `{projectArtifactsRoot}/config.json` -- audit config (optional `audit` section)

      '
  - heading: Outputs
    body: '

      - `{projectArtifactsRoot}/AUDIT.md` -- findings per `.specwright/protocols/audit.md`
      format

      - Findings presented to user grouped by dimension before saving

      '
  - heading: Constraints
    body: "\n**Scope (LOW freedom):**\n- This skill reads and analyzes. It NEVER modifies\
      \ source code, creates branches, runs builds, or starts work units.\n- Does\
      \ NOT create `currentWork` in workflow.json. Does NOT require a lock. Can run\
      \ while a work unit is in progress.\n- It is not a core workflow stage and never\
      \ claims top-level work ownership.\n- On compaction: re-run from scratch (no\
      \ state to recover).\n\n**Triage (MEDIUM freedom):**\n- Determine audit depth\
      \ from argument and codebase size:\n  - Path argumen"
  - heading: Protocol References
    body: '

      - `.specwright/protocols/audit.md` -- finding format, IDs, matching, lifecycle

      - `.specwright/protocols/delegation.md` -- agent delegation

      - `.specwright/protocols/decision.md` -- autonomous decision framework (CURATION
      for severity)

      - `.specwright/protocols/context.md` -- config and anchor doc loading

      - `.specwright/protocols/backlog.md` -- backlog item format and write targets

      '
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |-----------|--------|

      | No codebase files found | STOP: "No source files to audit." |

      | Agents unavailable | Fall back to inline analysis (less thorough) |

      | Prior AUDIT.md parse error | WARN, start fresh (no ID continuity) |

      | Compaction during audit | Re-run from scratch |

      '
