  - heading: Análisis del Proyecto APOLO + Plugin de Reemplazo `apolo-dynamic-flow`
    body: '

      **Fecha**: 2026-06-20

      **Autor**: Análisis automatizado

      **Alcance**: Análisis exhaustivo del proyecto APOLO (`.opencode.txt`, `schemas.txt`,
      `templates.txt`, `TOOLS-MCP-MATRIX.md`) + construcción del plugin de reemplazo
      `apolo-dynamic-flow`.


      ---

      '
