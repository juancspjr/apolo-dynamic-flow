- type: python
  path: scripts/python/interactive_docs.py
  title: interactive_docs
  docstring: "interactive_docs.py — Documentación interactiva con búsqueda + ejemplos\
    \ contextuales (v2.8.1).\n\nCierra el GAP #11: \"Documentación interactiva (búsqueda\
    \ + ejemplos contextuales)\".\n\nIndexa TODA la documentación del repositorio:\n\
    \  - README.md y *.md\n  - Docstrings de scripts Python (scripts/python/*.py)\n\
    \  - Comentarios de encabezado en TypeScript (plugin/*.ts)\n  - Scripts bash con\
    \ comentarios (scripts/bash/*.sh)\n  - YAMLs de configuración con descripciones\n\
    \nConstruye un índice TF-IDF minimalista (sin dependencias externas) que permite:\n\
    \  - Búsqueda por keywords\n  - Sugerencias contextuales basadas en la fase actual\
    \ del flow\n  - Ejemplos de uso extraídos de los docstrings\n\nCLI:\n  # Indexar\
    \ docs (genera .opencode/apolo-dynamic/DOCS-INDEX.yaml)\n  python3 interactive_docs.py\
    \ index --repo-root .\n\n  # Buscar\n  python3 interactive_docs.py search --repo-root\
    \ . --query \"vulnerability scan\"\n\n  # Sugerencias contextuales para la fase\
    \ actual\n  python3 interactive_docs.py context --repo-root . --phase"
