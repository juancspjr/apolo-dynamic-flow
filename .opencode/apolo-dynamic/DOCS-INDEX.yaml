- type: markdown
  path: .specwright/protocols/git-reconcile.md
  title: git-reconcile
  docstring: "# Git Reconcile Protocol\n\nShared contract for lifecycle-owned Git\
    \ freshness recovery.\n\n## Purpose\n\n`git-reconcile` owns the mutating half\
    \ of freshness recovery after\n`git-freshness` has already assessed the selected\
    \ work.\n\nIt exists so `sw-build`, `sw-verify`, and `sw-ship` can recover stale\
    \ or\ndiverged branch-head state inside the blocked lifecycle stage without\n\
    collapsing read-only assessment and branch mutation into one opaque helper.\n\n\
    ## Preconditions\n\nLifecycle-owned reconcile is only eligible when all of the\
    \ following are true:\n\n- freshness validation is `branch-head`\n- the selected\
    \ work resolves in the current owning worktree\n- the current session is `top-level`\n\
    - the selected work's recorded branch resolves and matches the currently\n  attached\
    \ branch\n- `HEAD` is attached to that branch before mutation\n- the worktree\
    \ is clean before mutation\n- the assessed freshness result is `stale` or `diverged`\n\
    - the configured reconcile mode is `rebase` or `merge`\n\nIf any precondition\
    \ fails,"
  sections:
  - heading: Git Reconcile Protocol
    body: '

      Shared contract for lifecycle-owned Git freshness recovery.

      '
  - heading: Purpose
    body: '

      `git-reconcile` owns the mutating half of freshness recovery after

      `git-freshness` has already assessed the selected work.


      It exists so `sw-build`, `sw-verify`, and `sw-ship` can recover stale or

      diverged branch-head state inside the blocked lifecycle stage without

      collapsing read-only assessment and branch mutation into one opaque helper.

      '
  - heading: Preconditions
    body: "\nLifecycle-owned reconcile is only eligible when all of the following\
      \ are true:\n\n- freshness validation is `branch-head`\n- the selected work\
      \ resolves in the current owning worktree\n- the current session is `top-level`\n\
      - the selected work's recorded branch resolves and matches the currently\n \
      \ attached branch\n- `HEAD` is attached to that branch before mutation\n- the\
      \ worktree is clean before mutation\n- the assessed freshness result is `stale`\
      \ or `diverged`\n- the configured reconcile mode is `rebase"
  - heading: Supported Reconcile Modes
    body: "\n- `rebase` — replay the current branch onto the recorded target ref\n\
      - `merge` — merge the recorded target ref into the current branch\n- `manual`\
      \ — explicit fallback; stop and tell the operator to reconcile\n  manually in\
      \ the owning worktree\n\nQueue-managed validation is not a local reconcile mode.\
      \ When `validation =\nqueue`, the helper reports `queue-managed` and performs\
      \ no local rewrite.\n"
  - heading: Ownership And Safety
    body: "\nThe helper must treat the owning worktree as authoritative.\n\n- Session\
      \ ownership comes from `session.json`\n- Missing ownership proof in `session.json`\
      \ or `workflow.json` is fail-closed\n- `workflow.json.attachment` is a diagnostic\
      \ snapshot that must agree with the\n  current worktree when present\n- ownership\
      \ mismatch is fail-closed\n- subordinate sessions must not run local reconcile\
      \ for the parent work\n- detached `HEAD` is fail-closed\n- dirty worktree state\
      \ is fail-closed\n- conflicted rebase or m"
  - heading: Result Shape
    body: "\nMinimum machine-readable shape:\n\n```json\n{\n  \"phase\": \"build |\
      \ verify | ship\",\n  \"targetRef\": {\n    \"remote\": \"origin\",\n    \"\
      branch\": \"main\",\n    \"role\": \"integration\"\n  },\n  \"validation\":\
      \ \"branch-head | queue\",\n  \"reconcile\": \"manual | rebase | merge\",\n\
      \  \"status\": \"noop | reconciled | blocked | queue-managed\",\n  \"action\"\
      : \"rebase | merge | null\",\n  \"performed\": true,\n  \"currentBranch\": \"\
      feature-branch\",\n  \"currentHeadBefore\": \"sha | null\",\n  \"currentHeadAfter\"\
      : \"sha | null\",\n  \"targetHead\": \"s"
  - heading: Explicit Side-Effect Boundary
    body: '

      Allowed:


      - read and fetch the resolved target remote ref

      - rebase the current branch onto the resolved target ref

      - merge the resolved target ref into the current branch

      - abort an in-progress rebase or merge after a conflict


      Not allowed:


      - checkout a different branch to perform the reconcile

      - mutate session ownership or workflow attachment to justify a reconcile

      - push, create commits unrelated to the rebase or merge result, or open PRs

      - downgrade the recorded checkpoint policy to bypass '
  - heading: Caller Responsibilities
    body: "\n- lifecycle stages use `git-freshness` first to determine whether reconcile\
      \ is\n  needed\n- when reconcile mode is `rebase` or `merge`, the blocked lifecycle\
      \ stage owns\n  the recovery and may continue in that same stage after successful\
      \ reconcile\n- when reconcile mode is `manual`, stop and route the operator\
      \ to manual\n  recovery in the owning worktree\n- shipping keeps one explicit\
      \ exception: after a manual reconcile stop, rerun\n  `/sw-verify` before `/sw-ship`\n\
      - queue-managed validation remains p"
  - heading: Non-Goals
    body: '

      - choosing merge queue policy for the repository

      - inventing ownership or approval state when they disagree

      - hiding branch conflicts behind a best-effort auto-resolution step

      '
