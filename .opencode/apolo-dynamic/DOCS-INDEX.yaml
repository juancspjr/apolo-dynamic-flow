- type: python
  path: scripts/python/script_dynamic_invoker.py
  title: script_dynamic_invoker
  docstring: "script_dynamic_invoker.py — Invoca scripts funcionales dinamicamente\
    \ (v3.5.2).\n\nDIRECTIVA 4: \"invocalos de manera dinamica segun las demandas\
    \ del flujo\noperativo. permite al agente Si determinas que un script en un uso\
    \ no cubre\nla necesidad especifica del proceso que esta ejecutando permitele\
    \ que\nautogenere un script adaptado en tiempo real para resolver la parte que\n\
    cubre en cuanto al producto que esta tratando\"\n\nEl orquestador puede invocar\
    \ CUALQUIER script funcional dinamicamente:\n  1. Clasifica los scripts disponibles\
    \ (script_classifier)\n  2. Si un script funcional cubre la necesidad → lo invoca\n\
    \  3. Si ningun script cubre la necesidad → script_generator crea uno nuevo\n\
    \  4. El script generado se registra y se invoca\n\nIMPORTANTE: el agente NO puede\
    \ crear scripts que modifiquen el FLUJO del\norquestador. Solo puede crear scripts\
    \ para resolver necesidades del PRODUCTO\n(analizar codigo, generar artefactos,\
    \ validar datos). El flujo se mantiene\ndeterminista.\n\nCLI:\n  python3 script_dynamic"
