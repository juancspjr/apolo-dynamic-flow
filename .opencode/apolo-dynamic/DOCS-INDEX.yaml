  path: scripts/python/data_flow_validator.py
  title: data_flow_validator
  docstring: "data_flow_validator.py — Verifica que la data fluye por donde debe (v3.5.0).\n\
    \nRESPONDE a tu pregunta: \"asegurar que las datas pasen por donde debe pasar\n\
    el flujo de datos validados\"\n\nEjecuta un flow de prueba y verifica que cada\
    \ artefacto YAML se produce\nen el orden correcto y tiene la estructura esperada.\
    \ Si un artefacto falta\no tiene estructura incorrecta, reporta exactamente donde\
    \ se rompio el flujo.\n\nFlujo esperado:\n  CODE-INDEX.yaml → EVIDENCE-PACK.yaml\
    \ → EVIDENCE-SCORE.yaml →\n  PLAN.yaml → IMPACT-PREDICTION.yaml → SCAFFOLD-V3.yaml\
    \ →\n  (files_to_create) → VISUAL-DIFF snapshots → ORCHESTRATOR-REPORT.yaml\n\n\
    CLI:\n  python3 data_flow_validator.py validate --repo-root . --flowid APOLO-VALIDATE\n\
    \  python3 data_flow_validator.py check-artifacts --flowid X\n  python3 data_flow_validator.py\
    \ trace --flowid X"
