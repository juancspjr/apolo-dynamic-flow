- type: markdown
  path: .specwright/skills/sw-init/SKILL.md
  title: SKILL
  docstring: "---\nname: sw-init\ndescription: >-\n  Initializes Specwright in a project.\
    \ Detects stack, asks about practices,\n  creates constitution and charter, configures\
    \ quality gates and hooks.\nargument-hint: \"\"\nallowed-tools:\n  - bash\n  -\
    \ read\n  - write\n  - glob\n  - grep\n  - question\n---\n\n# Specwright Init\n\
    \n## Goal\n\nSet up Specwright in this project by understanding how the user works,\n\
    what they're building, and what quality standards they expect. Produce\nconfiguration\
    \ and anchor documents that will guide all future work. Tracked\nproject artifacts\
    \ should be shared across developers and agent sessions via\nGit; runtime session\
    \ state stays local to each clone or worktree. New\ninteractive installs should\
    \ prefer `project-visible` runtime roots under\n`.specwright-local/`, while `git-admin`\
    \ roots under `.git/specwright/` remain\ncompatibility-only.\n\n## Inputs\n\n\
    - The codebase (scan for language, framework, dependencies, test runner)\n- The\
    \ user (ask about practices, vision, quality expectations)\n\n## Output"
  sections:
  - heading: Specwright Init
    body: ''
  - heading: Goal
    body: '

      Set up Specwright in this project by understanding how the user works,

      what they''re building, and what quality standards they expect. Produce

      configuration and anchor documents that will guide all future work. Tracked

      project artifacts should be shared across developers and agent sessions via

      Git; runtime session state stays local to each clone or worktree. New

      interactive installs should prefer `project-visible` runtime roots under

      `.specwright-local/`, while `git-admin` roots under `.git/spec'
  - heading: Inputs
    body: '

      - The codebase (scan for language, framework, dependencies, test runner)

      - The user (ask about practices, vision, quality expectations)

      '
  - heading: Outputs
    body: "\nWhen complete, ALL of the following exist:\n\n- `{projectArtifactsRoot}/config.json`\
      \ -- detected + configured project settings\n- `{projectArtifactsRoot}/CONSTITUTION.md`\
      \ -- development practices the AI must follow\n- `{projectArtifactsRoot}/CHARTER.md`\
      \ -- technology vision and project identity\n- `{repoStateRoot}/work/` -- shared\
      \ work root, initialized and empty\n- `{worktreeStateRoot}/session.json` --\
      \ initialized detached top-level session for\n  the current worktree\n\nOptional\
      \ (created if the user o"
  - heading: Constraints
    body: "\n**Worktree context (LOW freedom):**\n- Check `worktreeContext` per `.specwright/protocols/context.md`.\n\
      - If `linked`, explain that tracked project artifacts under\n  `{projectArtifactsRoot}`\
      \ are shared across developers and agent sessions via\n  Git, while runtime\
      \ session state stays local to each clone or worktree under\n  `{repoStateRoot}`\
      \ and `{worktreeStateRoot}`.\n- If the shared layout already exists, reuse the\
      \ tracked project artifacts and\n  shared runtime roots, then create or repair\
      \ only th"
  - heading: Protocol References
    body: '

      - `.specwright/protocols/state.md` -- workflow.json initialization

      - `.specwright/protocols/context.md` -- config.json format

      - `.specwright/protocols/git.md` -- git config field reference and strategy
      definitions

      - `.specwright/protocols/landscape.md` -- codebase reference document format

      '
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |-----------|--------|

      | Existing Specwright tracked/runtime roots detected | Ask user: repair or reconfigure
      the existing install, or abort |

      | No dependency manifest found | Ask user about language and framework directly
      |

      | User unsure about practices | Suggest sensible defaults based on detected
      stack, let them adjust |

      | Old config.json git schema detected | Show diff of old vs new fields. Offer
      migration with AskUserQuestion. Preserve existing values, add new fields'
