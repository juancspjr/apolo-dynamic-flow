      echo "git:  $(git --version 2>/dev/null || echo'
  - heading: 3. Instalacion (3 metodos)
    body: ''
  - heading: 'Metodo 1: Install script (recomendado)'
    body: '

      ```bash

      cd /path/to/apolo-dynamic-flow

      chmod +x install.sh

      ./install.sh

      ```


      Salida esperada: `INSTALACION COMPLETA - apolo-dynamic-flow v2.9.0`

      '
  - heading: 'Metodo 2: Manual paso a paso'
    body: '

      ```bash'
  - heading: 1. Instalar dependencias Python
    body: 'pip3 install --user pyyaml jsonschema

      '
  - heading: 2. Instalar dependencias Node
    body: 'npm install

      '
  - heading: 3. Compilar TypeScript
    body: 'npx tsc

      '
  - heading: 4. Verificar estructura
    body: 'ls -la plugin/index.ts scripts/python/common.py panel/index.html

      '
  - heading: 5. Tests Python (5 suites)
    body: 'python3 tests/run_all_tests.py

      '
  - heading: 6. Tests TypeScript (133 tests)
    body: 'npx tsc && node --test dist/tests/plugin.test.js

      ```

      '
  - heading: 'Metodo 3: Migracion desde version anterior (ZIP patch)'
    body: '

      Cada version se distribuye como ZIP + script de migracion. Para migrar de v2.8.1
      a v2.9.0:


      ```bash'
  - heading: 1. Descargar apolo-v290-patch.zip y migrar_v290.sh a ~/Descargas
    body: ''
  - heading: 2. Ejecutar migracion
    body: 'chmod +x ~/Descargas/migrar_v290.sh

      ~/Descargas/migrar_v290.sh --from-zip ~/Descargas/apolo-v290-patch.zip

      '
  - heading: 3. Test exhaustivo
    body: 'bash apolo-full-test.sh

      '
  - heading: 4. Commit
    body: 'git add . && git commit -m ''v2.9.0'' && git push

      ```


      El script de migracion:

      - Mueve los archivos nuevos (`cp -f`)

      - Verifica compilacion Python + bash syntax

      - Ejecuta `hooks_validator.py` para verificar mecanismo de hooks

      - Hace smoke tests de los scripts nuevos

      - Muestra pasos siguientes


      ---

      '
