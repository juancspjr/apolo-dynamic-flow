- type: markdown
  path: ARCHITECTURE.md
  title: ARCHITECTURE
  docstring: '# ARCHITECTURE — apolo-dynamic-flow


    ## Visión general


    `apolo-dynamic-flow` es un plugin OpenCode (TypeScript) que reemplaza a `apolo-flow-guardian.ts`.
    Su objetivo es orquestar agentes con **flujos dinámicos** (no planes estáticos),
    apoyándose en **scripts Python deterministas** para todo lo que no requiere razonamiento
    del agente.


    ## Diagrama de componentes


    ```

    ┌─────────────────────────────────────────────────────────────────────┐

    │                        OpenCode Runtime                              │

    │                                                                      │

    │  ┌────────────────────────────────────────────────────────────────┐ │

    │  │              plugin/index.ts (entry point)                      │ │

    │  │  hooks: tool:execute:before/after, session:start               │ │

    │  │  tools: apolo.flow.{init,tick}                                  │ │

    │  │         apolo.evidence.collect                                  │ │

    │  │         apolo.plan.generate                  '
  sections:
  - heading: ARCHITECTURE — apolo-dynamic-flow
    body: ''
  - heading: Visión general
    body: '

      `apolo-dynamic-flow` es un plugin OpenCode (TypeScript) que reemplaza a `apolo-flow-guardian.ts`.
      Su objetivo es orquestar agentes con **flujos dinámicos** (no planes estáticos),
      apoyándose en **scripts Python deterministas** para todo lo que no requiere
      razonamiento del agente.

      '
  - heading: Diagrama de componentes
    body: '

      ```

      ┌─────────────────────────────────────────────────────────────────────┐

      │                        OpenCode Runtime                              │

      │                                                                      │

      │  ┌────────────────────────────────────────────────────────────────┐ │

      │  │              plugin/index.ts (entry point)                      │ │

      │  │  hooks: tool:execute:before/after, session:start               │ │

      │  │  tools: apolo.flow.{init,tick}                         '
  - heading: Decisiones de diseño
    body: ''
  - heading: 1. State machine explícita (no "planificación libre")
    body: '

      El proyecto viejo dejaba al orquestador decidir cuándo transitar de fase. Eso
      llevaba a:

      - Transiciones implícitas que nadie auditaba.

      - "Plan tras plan": el sistema volvía a `planning-bootstrap` sin razón clara.

      - Bloqueos que se registraban pero no se resolvían.


      **Solución**: tabla `TRANSITIONS` explícita con gates nombrados. Cada transición
      requiere:

      - `from` y `to` válidos

      - `gate` evaluado antes de transitar

      - `requires` (artefactos que deben existir en `state.artifacts`)

      '
  - heading: 2. Loop dinámico con circuit breaker por fase
    body: "\nCada fase tiene su propio `LoopCounter`:\n```yaml\nloops:\n  verdad:\
      \ { current: 0, max: 2, last_decision: \"\" }\n  implementation: { current:\
      \ 0, max: 4, last_decision: \"\" }\n```\n\nCuando un gate devuelve `refine`,\
      \ se incrementa `current`. Si `current >= max`:\n- `fail-closed` (default):\
      \ bloquear y esperar intervención.\n- `fail-open-adaptive`: escalar a `escalation_path[0]`\
      \ si está definido.\n\n**Resultado**: imposible entrar en loop infinito. El\
      \ circuit breaker siempre corta.\n"
  - heading: 3. Recolección determinista de evidencia
    body: '

      El proyecto viejo dependía del agente para "pensar" qué evidencia recopilar.
      Eso producía:

      - Evidence packs incompletos.

      - Variabilidad entre runs.

      - El agente gastaba tokens decidiendo qué recopilar.


      **Solución**: `collect_evidence.py` es determinista. Recibe un `scope` JSON
      y produce siempre el mismo `EVIDENCE-PACK.yaml` para los mismos inputs. El agente
      solo decide el scope, no cómo recopilar.

      '
  - heading: 4. Planes generados por Python
    body: '

      El proyecto viejo usaba `02.5-PLAN-SHAPING.yaml` escrito por el agente. Eso
      producía:

      - Planes estáticos que no se adaptaban a nueva evidencia.

      - El agente perdía tokens pensando en partición de unidades.


      **Solución**: `generate_plan.py` lee `EVIDENCE-PACK.yaml` + `02-VERDAD.yaml`
      y genera `DYNAMIC-PLAN.yaml` con:

      - Unidades derivadas de clusters de verdad.

      - `topological_sort` por algoritmo de Kahn sobre `dependenciasprevias`.

      - `adaptative_gates` que pueden reescribir el plan en runtime.

      - `'
  - heading: 5. Tests tras cada cambio
    body: '

      El proyecto viejo no tenía tests automáticos. El agente "verificaba" con narrativa.


      **Solución**: `run_tests.py` se ejecuta tras cada `micro-change` o `section-change`.
      Si falla y el cambio fue micro → `rollback.py` restaura los archivos afectados
      vía `git restore`.

      '
  - heading: 6. Absorción de tools externas
    body: '

      El proyecto viejo declaraba MCPs como "opcionales" pero nunca los integraba
      al orquestador.


      **Solución**: `tool-absorber.ts` escanea:

      - `opencode.json#mcp.*` → registra cada MCP con capabilities inferidas.

      - `.opencode/skills/*/SKILL.md` → registra cada skill local.

      - `.opencode/plugin/*.ts` → registra cada plugin TS.

      - `scripts/python/*.py` → registra cada script Python.


      Cada tool tiene:

      - `health_check` (comando bash que verifica disponibilidad).

      - `fallback` (tool alternativa si esta falla'
  - heading: 7. Telemetría append-only
    body: '

      Cada decisión del orquestador emite un `TelemetryEvent` a `telemetry.jsonl`.
      El panel HTML los consume via fetch (cada 5s).


      Tipos de evento:

      - `phase-enter`, `phase-exit` — transiciones de fase.

      - `loop-iter` — iteración de bucle en una fase.

      - `gate-evaluated` — gate evaluado con su decisión.

      - `block-detected`, `block-resolved` — bloqueos.

      - `tool-absorbed`, `tool-invoked`, `tool-failed` — tools.

      - `evidence-captured` — recolección completada.

      - `plan-version-bump` — plan reescrito.

      - `test-'
  - heading: 8. Sin dependencias externas
    body: '

      - TypeScript plugin: solo usa `child_process`, `crypto`, `fs`, `path`. No requiere
      npm install.

      - Python scripts: solo stdlib (`hashlib`, `json`, `subprocess`, `pathlib`, `re`).
      No requiere pip install.

      - YAML parser/serializer: implementación propia minimalista (no PyYAML).

      - JSON schema: validación mínima propia (no jsonschema).


      **Trade-off**: el parser YAML no soporta features avanzadas (anchors, multi-line
      strings con `|`, flow style `{a: 1, b: 2}`). Para proyectos serios, instalar
      PyYAML '
  - heading: Flujo de un flow completo
    body: "\n```\n1. Session start\n   └─ absorbTools() → TOOL-REGISTRY.yaml poblado\n\
      \n2. apolo.flow.init({ flowid })\n   └─ Crea FLOW-STATE.yaml con phase=reanclaje,\
      \ loops=0\n\n3. Loop hasta cierre:\n   ├─ apolo.flow.tick()\n   │   ├─ runLoopIteration(state,\
      \ ctx)\n   │   │   ├─ evaluateGate(gate_for_phase, ctx)\n   │   │   ├─ if pass\
      \ → transit → reset counter de la fase destino\n   │   │   ├─ if refine → counter++\
      \ → if maxed → block/escalate\n   │   │   └─ if block → blockAndStay → BLOCK-LOG.yaml\n\
      \   │   ├─ detectBlock"
  - heading: Métricas de mejora esperada vs apolo-flow-guardian.ts
    body: '

      | Métrica | apolo-flow-guardian.ts | apolo-dynamic-flow |

      |---|---|---|

      | Líneas de código del plugin | 1,445 TS | ~1,600 TS + ~1,400 Python |

      | Tests del propio plugin | 0 | 5 suites (todas pasan) |

      | Schemas YAML | 8 (con duplicaciones) | 7 nuevos (sin duplicaciones) |

      | MCPs integrados | 0 efectivos (solo declarados) | Todos los registrados absorbidos
      |

      | Recolección de evidencia | Agente piensa | Script Python determinista |

      | Generación de planes | Agente escribe YAML | Script Python desde'
  - heading: Limitaciones conocidas
    body: '

      1. **YAML parser minimalista**: no soporta anchors, multi-line strings con `|`,
      flow style. Para proyectos serios, instalar PyYAML.

      2. **JSON schema validation mínima**: solo valida `required`, `type`, `enum`,
      `pattern`. No soporta `$ref`, `allOf`, `oneOf`. Para validación completa, instalar
      jsonschema.

      3. **Tests Python del plugin TS**: los tests validan contratos leyendo el código
      TS, no ejecutándolo. Para tests reales, transpilar con `tsc` y ejecutar con
      node.

      4. **Playwright screenshots**: '
  - heading: Próximos pasos sugeridos
    body: '

      1. Instalar PyYAML y jsonschema para robustez YAML/schema completa.

      2. Integrar `mutmut` (Python) y `go-mutesting` (Go) para mutación real.

      3. Compilar el plugin TS con `tsc` y empaquetar como npm package.

      4. Añadir tests E2E que simulen un flow completo (init → tick × N → cierre).

      5. Migrar progresivamente los 12 skills locales al nuevo formato de tool-absorber.

      '
