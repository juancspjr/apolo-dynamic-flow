- type: markdown
  path: .specwright/protocols/context.md
  title: context
  docstring: '# Context Loading Protocol


    ## Logical Roots


    Every skill, hook, and adapter resolves the same five logical roots on every

    invocation:


    | Root | Resolution | Purpose |

    |---|---|---|

    | `projectRoot` | `git rev-parse --show-toplevel` | source tree and user-facing
    cwd |

    | `projectArtifactsRoot` | `{projectRoot}/.specwright` | tracked project artifacts
    and shared agent guidance |

    | `repoStateRoot` | depends on `config.git.runtime.mode`: `git-admin` -> `git
    rev-parse --git-common-dir` + `/specwright`; `project-visible` -> `<git common-dir
    parent>/{config.git.runtime.projectVisibleRoot}/repo` | shared clone-local runtime
    state |

    | `worktreeStateRoot` | depends on `config.git.runtime.mode`: `git-admin` -> `git
    rev-parse --git-dir` + `/specwright`; `project-visible` -> `<git common-dir parent>/{config.git.runtime.projectVisibleRoot}/worktrees/{worktreeId}`
    | per-worktree session and continuation state |

    | `workArtifactsRoot` | clone-local mode stays anchored under repo state: `git-admin`
    -> `{'
  sections:
  - heading: Context Loading Protocol
    body: ''
  - heading: Logical Roots
    body: '

      Every skill, hook, and adapter resolves the same five logical roots on every

      invocation:


      | Root | Resolution | Purpose |

      |---|---|---|

      | `projectRoot` | `git rev-parse --show-toplevel` | source tree and user-facing
      cwd |

      | `projectArtifactsRoot` | `{projectRoot}/.specwright` | tracked project artifacts
      and shared agent guidance |

      | `repoStateRoot` | depends on `config.git.runtime.mode`: `git-admin` -> `git
      rev-parse --git-common-dir` + `/specwright`; `project-visible` -> `<git common-dir
      paren'
  - heading: Runtime Mode Policy
    body: "\nThe runtime-root policy surface lives under tracked config:\n\n- `config.git.runtime.mode`\
      \ — `git-admin` or `project-visible`\n- `config.git.runtime.projectVisibleRoot`\
      \ — repo-visible clone-local runtime\n  root name, default `.specwright-local`\n\
      \nIf the `runtime` block is absent, callers must default to `git-admin` for\n\
      backward compatibility with existing installs.\n\nRuntime mode governs clone-local\
      \ runtime placement only. Work-artifact\npublication remains separate from runtime\
      \ mode and is still con"
  - heading: Runtime Mode Mapping
    body: '

      | Mode | Runtime mapping |

      |---|---|

      | `git-admin` | `repoStateRoot = {gitCommonDir}/specwright`, `worktreeStateRoot
      = {gitDir}/specwright`, clone-local `workArtifactsRoot = {repoStateRoot}/work`
      |

      | `project-visible` | shared runtime root = `<git common-dir parent>/{config.git.runtime.projectVisibleRoot}`,
      `repoStateRoot = {sharedRuntimeRoot}/repo`, `worktreeStateRoot = {sharedRuntimeRoot}/worktrees/{worktreeId}`,
      clone-local `workArtifactsRoot = {repoStateRoot}/work` |


      Guardrails for `projec'
  - heading: Standard Context Documents
    body: ''
  - heading: Tracked project artifacts
    body: "\nLoad from `projectArtifactsRoot` when needed for alignment or verification:\n\
      \n- `{projectArtifactsRoot}/config.json` — tracked project settings, commands,\n\
      \  gates, git, integration, and backlog settings\n- `{projectArtifactsRoot}/CONSTITUTION.md`\
      \ — development practices and\n  principles\n- `{projectArtifactsRoot}/CHARTER.md`\
      \ — technology vision and project purpose\n- `{projectArtifactsRoot}/TESTING.md`\
      \ — testing strategy (optional; if absent,\n  Constitution testing rules remain\
      \ authoritative)\n- `{p"
  - heading: Runtime work records
    body: '

      Load from the selected work under `repoStateRoot/work/{workId}`:


      - `workflow.json` — lifecycle, gates, units, attachment, per-work lock

      - `stage-report.md` — runtime-local stage handoff digest

      - `units/{unitId}/stage-report.md` — runtime-local unit handoff digest

      '
  - heading: Auditable work artifacts
    body: '

      Load from the selected work under `{workArtifactsRoot}/{workId}`:


      - `design.md`, `context.md`, `decisions.md`, `assumptions.md`

      - `approvals.md`, `integration-criteria.md`

      - `units/{unitId}/spec.md`, `plan.md`, `context.md`

      - `units/{unitId}/implementation-rationale.md`

      - `units/{unitId}/review-packet.md`

      - `units/{unitId}/evidence/`

      '
  - heading: Per-worktree documents
    body: "\nLoad from `worktreeStateRoot`:\n\n- `session.json` — the current worktree's\
      \ attached work, mode, branch, and\n  `lastSeenAt`\n- `continuation.md` — worktree-local\
      \ continuation snapshot (optional)\n"
  - heading: Root Resolution Sequence
    body: "\nRun this sequence before loading Specwright state:\n\n1. resolve `projectRoot`\n\
      2. derive `projectArtifactsRoot`\n3. resolve `gitDir`\n4. resolve `gitCommonDir`\n\
      5. read `config.git.runtime` from `{projectArtifactsRoot}/config.json` when\n\
      \   present; if the block is absent, default to `git-admin`\n6. derive `repoStateRoot`\
      \ and `worktreeStateRoot` from the resolved runtime\n   mode and `worktreeId`\n\
      7. resolve `workArtifactsRoot`: keep tracked publication separate from runtime\n\
      \   mode by reading `config.g"
  - heading: Loading Mode
    body: ''
  - heading: Tracked project-artifact root
    body: '

      If `{projectArtifactsRoot}/config.json` exists, that path is authoritative for

      tracked project config and anchor docs.


      If only `{repoStateRoot}/config.json` exists, callers may read it as a

      compatibility bridge for migrated runtime state, but they should warn that the

      tracked config has not yet been moved back to `projectArtifactsRoot`.


      If callers fall all the way back to `{projectArtifactsRoot}/state/`, they

      should explicitly say the repository is using the legacy working-tree Specwright
      lay'
  - heading: 'Preferred mode: shared/session runtime layout'
    body: '

      If `{projectArtifactsRoot}/config.json` exists, `{worktreeStateRoot}/session.json`

      exists, `{repoStateRoot}/work/` exists, or `{repoStateRoot}/config.json`

      exists, the repository is using the shared/session root model. Tracked project

      config alone is enough to opt into that model even before any work or session

      file exists. That is the normal path for both primary and linked worktrees.


      **Important:** a linked worktree is not degraded merely because the checkout

      lacks a working-tree `.specwrigh'
  - heading: 'Migration fallback: legacy working-tree layout'
    body: '

      If the shared/session runtime layout is absent, callers may read legacy runtime

      files from `{projectArtifactsRoot}/state/` during migration:


      - `{projectArtifactsRoot}/state/workflow.json`

      - `{projectArtifactsRoot}/state/continuation.md`


      Legacy `workflow.json` remains a migration-only bridge. It still uses the v2

      `currentWork` wrapper, so work-aware callers must normalize that wrapper

      explicitly or stop and direct the user to `/sw-init` before relying on work

      status, branch, or unit fields.


      O'
  - heading: Session And Work Resolution
    body: '

      State-aware callers resolve the selected work in this order:


      1. explicit selector, if the skill introduces one

      2. `{worktreeStateRoot}/session.json.attachedWorkId`

      3. legacy fallback during migration only


      Session-aware callers also read:


      - `session.json.mode` to distinguish `top-level` from `subordinate`

      - `session.json.branch` to compare the current checkout with the attached work

      - `session.json.lastSeenAt` for freshness and repair logic


      If no work can be resolved for an operation that re'
  - heading: Initialization Checks
    body: "\nBefore any operation:\n\n```javascript\nresolveLogicalRoots();\n\nif\
      \ (exists(projectArtifactsRoot + \"/config.json\")) {\n  config = read(projectArtifactsRoot\
      \ + \"/config.json\");\n} else if (exists(repoStateRoot + \"/config.json\"))\
      \ {\n  config = read(repoStateRoot + \"/config.json\"); // compatibility bridge\
      \ only\n  warn(\"Using runtime-local config compatibility path — run /sw-init\
      \ to migrate tracked config back to projectArtifactsRoot.\");\n} else {\n  error(\"\
      Run /sw-init first.\");\n}\n\nif (!config.version) {\n  w"
  - heading: Worktree Modes
    body: '

      | Mode | Source | Behavior |

      |---|---|---|

      | `top-level` | normal user-facing worktree | may own one attached work and
      mutate its workflow state |

      | `subordinate` | internal helper worktree such as `parallel-build` | may inherit
      context, but does not claim top-level ownership or rewrite shared work selection
      |


      Skills that require top-level ownership must enforce it explicitly. They must

      not infer "top-level" from the absence of a linked-worktree marker.

      '
  - heading: Loading Strategy
    body: "\nAlways load:\n\n- `config.json`\n- `session.json` for session-aware operations\n\
      \nLoad on demand:\n\n- the selected work's `workflow.json`\n- `CONSTITUTION.md`,\
      \ `CHARTER.md`, `TESTING.md`\n- runtime `stage-report.md` digests from `repoStateRoot`\n\
      - auditable work artifacts for the selected work and unit from\n  `workArtifactsRoot`\n\
      \nRead-only repo-wide views such as `sw-status`, `sw-sync`, and `sw-doctor`\
      \ may\nenumerate all works from `{repoStateRoot}/work/*/workflow.json` in addition\
      \ to\nreading the current"
  - heading: Error Handling
    body: '

      If required context is missing:


      1. stop immediately

      2. say which logical root or file could not be resolved

      3. say whether legacy fallback was attempted

      4. indicate which command or repair path should run next


      Failures that are local to the current worktree should say so explicitly rather

      than implying the whole repository is broken.

      '
