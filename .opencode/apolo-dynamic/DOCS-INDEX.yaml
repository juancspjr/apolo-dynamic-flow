- type: markdown
  path: MIGRATION-GUIDE.md
  title: MIGRATION-GUIDE
  docstring: "# MIGRATION GUIDE — de `apolo-flow-guardian.ts` a `apolo-dynamic-flow`\n\
    \n## Resumen\n\nEsta guía te lleva de la arquitectura vieja (`apolo-flow-guardian.ts`\
    \ + 8 agentes + 12 skills + 13 commands + 8 schemas) a la nueva (`apolo-dynamic-flow`\
    \ con state machine explícita, scripts Python deterministas y absorción de tools\
    \ externas).\n\n## Pre-migración: backup\n\n```bash\n# Backup del plugin viejo\
    \ y config\ncp -r .opencode .opencode.backup.$(date +%Y%m%d)\ncp opencode.json\
    \ opencode.json.backup.$(date +%Y%m%d)\ncp -r plan plan.backup.$(date +%Y%m%d)\n\
    ```\n\n## Paso 1: Copiar el nuevo plugin\n\n```bash\n# Asumiendo que apolo-dynamic-flow/\
    \ está en /home/z/my-project/download/\ncp -r /home/z/my-project/download/apolo-dynamic-flow\
    \ ./\n```\n\n## Paso 2: Migrar opencode.json\n\nReemplaza la entrada del plugin\
    \ viejo por la nueva:\n\n```json\n{\n  \"plugin\": {\n    \"apolo-dynamic-flow\"\
    : \"./apolo-dynamic-flow/plugin/index.ts\"\n  },\n  \"mcp\": {\n    \"opencode-fastedit\"\
    : { /* ... */ },\n    \"@playwright/mcp\": { /* ... */ }\n  }\n}\n```\n"
  sections:
  - heading: MIGRATION GUIDE — de `apolo-flow-guardian.ts` a `apolo-dynamic-flow`
    body: ''
  - heading: Resumen
    body: '

      Esta guía te lleva de la arquitectura vieja (`apolo-flow-guardian.ts` + 8 agentes
      + 12 skills + 13 commands + 8 schemas) a la nueva (`apolo-dynamic-flow` con
      state machine explícita, scripts Python deterministas y absorción de tools externas).

      '
  - heading: 'Pre-migración: backup'
    body: '

      ```bash'
  - heading: Backup del plugin viejo y config
    body: 'cp -r .opencode .opencode.backup.$(date +%Y%m%d)

      cp opencode.json opencode.json.backup.$(date +%Y%m%d)

      cp -r plan plan.backup.$(date +%Y%m%d)

      ```

      '
  - heading: 'Paso 1: Copiar el nuevo plugin'
    body: '

      ```bash'
  - heading: Asumiendo que apolo-dynamic-flow/ está en /home/z/my-project/download/
    body: 'cp -r /home/z/my-project/download/apolo-dynamic-flow ./

      ```

      '
  - heading: 'Paso 2: Migrar opencode.json'
    body: "\nReemplaza la entrada del plugin viejo por la nueva:\n\n```json\n{\n \
      \ \"plugin\": {\n    \"apolo-dynamic-flow\": \"./apolo-dynamic-flow/plugin/index.ts\"\
      \n  },\n  \"mcp\": {\n    \"opencode-fastedit\": { /* ... */ },\n    \"@playwright/mcp\"\
      : { /* ... */ }\n  }\n}\n```\n\n**Eliminar** del `opencode.json`:\n- Cualquier\
      \ referencia a `apolo-flow-guardian.ts`\n- MCPs declarados como \"opcionales\"\
      \ pero nunca integrados (chrome-devtools-mcp, opencode-mcp-triage, etc.) — el\
      \ nuevo plugin los absorberá automáticamente si los necesit"
  - heading: 'Paso 3: Migrar schemas'
    body: '

      Los 8 schemas viejos (en `.opencode/schemas/`) pueden coexistir con los 7 nuevos.
      Recomendado:


      ```bash'
  - heading: Mover schemas viejos a backup
    body: 'mkdir -p .opencode/schemas.viejos

      mv .opencode/schemas/*.schema.yaml .opencode/schemas.viejos/

      '
  - heading: Copiar schemas nuevos
    body: 'cp apolo-dynamic-flow/schemas/*.schema.yaml .opencode/schemas/

      ```


      **Mapeo de schemas viejos → nuevos**:


      | Schema viejo | Schema nuevo | Notas |

      |---|---|---|

      | `00-OBJETIVO.schema.yaml` | (sin cambio) | Se mantiene compatible |

      | `01-ASR.schema.yaml` | (sin cambio) | Se mantiene compatible |

      | `02-VERDAD.schema.yaml` | (sin cambio) | Se mantiene compatible |

      | `apolo-loop-v2.schema.yaml` | `dynamic-plan.schema.yaml` | Añade versionado,
      topological_sort, adaptative_gates |

      | `03-PLAN-INDICE.sc'
  - heading: 'Paso 4: Migrar agentes'
    body: '

      Los 8 agentes viejos (orchestrator, implementer, surface-scanner, truth-auditor,
      microplanner, evidence-acquisition, mutation-guardian, planner) NO se eliminan.
      El nuevo plugin los orquesta de forma diferente:


      - **orchestrator**: ahora invoca `apolo.flow.tick()` repetidamente. Ya no decide
      transiciones manualmente.

      - **implementer**: sigue editando archivos, pero tras cada edición, el orquestador
      llama `apolo.tests.run({ trigger: "micro-change" })`.

      - **surface-scanner**: ahora alimenta `apolo'
  - heading: 'Paso 5: Migrar skills'
    body: '

      Las 12 skills locales (`.opencode/skills/`) se mantienen. El nuevo plugin las
      absorbe automáticamente vía `tool-absorber.ts`.


      **Acción**: ejecuta `apolo.tools.absorb()` después de instalar el plugin. Verifica
      con `apolo-inspect.sh tools` que todas aparecen en `TOOL-REGISTRY.yaml`.

      '
  - heading: 'Paso 6: Migrar commands'
    body: '

      Los 13 commands viejos siguen disponibles. El nuevo plugin añade uno nuevo:
      `apolo-inspect`.


      **Commands viejos a deprecar**:

      - `apolo-estado` → reemplazado por `apolo-inspect state`

      - `apolo-reanclar` → reemplazado por `apolo.flow.tick()` (el state machine maneja
      reanclaje)

      - `apolo-check-drift` → reemplazado por `apolo-inspect telemetry` (drift se
      detecta por patrones en eventos)

      - `apolo-go` / `apolo-avanzar` → reemplazados por `apolo.flow.tick()` (transición
      explícita)


      **Acción**: deja los'
  - heading: 'Paso 7: Migrar flows activos'
    body: "\nPara cada flow activo en `plan/active/<FLOW>/`:\n\n1. Crea `FLOW-STATE.yaml`\
      \ desde `FLOW-STATE.template.yaml`, poblando:\n   - `flowid` (el mismo del flow)\n\
      \   - `phase` (la fase actual del flow, infiriendo desde `CURRENT.md`)\n   -\
      \ `artifacts.*` (paths a los artefactos existentes)\n2. Crea `BLOCK-LOG.yaml`\
      \ desde `BLOCK-LOG.template.yaml`, migrando los bloqueos de `99-BLOQUEOS.md`.\n\
      3. Crea `telemetry.jsonl` vacío (`touch`).\n4. Ejecuta `apolo.tools.absorb()`\
      \ para poblar `TOOL-REGISTRY.yaml`.\n\n**Script"
  - heading: '!/usr/bin/env python3'
    body: "\"\"\"Migra flows viejos a FLOW-STATE.yaml.\"\"\"\nimport sys\nfrom pathlib\
      \ import Path\nsys.path.insert(0, \"apolo-dynamic-flow/scripts/python\")\nfrom\
      \ common import read_yaml, write_yaml, now_iso\n\nfor flow_dir in Path(\"plan/active\"\
      ).iterdir():\n    if not flow_dir.is_dir():\n        continue\n    flowid =\
      \ flow_dir.name\n    if (flow_dir / \"FLOW-STATE.yaml\").exists():\n       \
      \ continue  # ya migrado\n    state = {\n        \"flowstate\": \"V2\",\n  \
      \      \"flowid\": flowid,\n        \"version\": 1,\n        \"schema_version\""
  - heading: 'Paso 8: Verificación post-migración'
    body: '

      ```bash'
  - heading: 1. Tests del plugin pasan
    body: 'cd apolo-dynamic-flow && python3 tests/run_all_tests.py

      '
  - heading: 2. Tools absorbidas
    body: './scripts/bash/apolo-inspect.sh tools

      '
  - heading: 3. Health check
    body: './scripts/bash/apolo-inspect.sh health

      '
  - heading: 4. Estado de flows migrados
    body: './scripts/bash/apolo-inspect.sh state --flowid APOLO-20260620-TU-FLOW

      '
  - heading: 5. Panel de telemetría
    body: './scripts/bash/apolo-inspect.sh serve-panel --flowid APOLO-20260620-TU-FLOW

      ```

      '
  - heading: Rollback
    body: '

      Si algo falla:


      ```bash'
  - heading: Restaurar opencode.json
    body: 'cp opencode.json.backup.YYYYMMDD opencode.json

      '
  - heading: Restaurar .opencode
    body: 'rm -rf .opencode

      mv .opencode.backup.YYYYMMDD .opencode

      '
  - heading: Restaurar plan
    body: 'rm -rf plan

      mv plan.backup.YYYYMMDD plan

      '
  - heading: Eliminar plugin nuevo (opcional)
    body: 'rm -rf apolo-dynamic-flow

      ```

      '
  - heading: Tiempos estimados
    body: '

      - **Setup**: 30 min (copiar plugin, editar opencode.json)

      - **Migración de schemas**: 15 min

      - **Migración de flows activos**: 1-2 horas (depende de cuántos flows)

      - **Verificación**: 30 min

      - **Total**: 2-3 horas para migración completa

      '
  - heading: Soporte
    body: '

      Si encuentras issues durante la migración:

      1. Verifica que `python3 tests/run_all_tests.py` pasa.

      2. Verifica que `apolo-inspect.sh health` reporta todas las tools como `active`
      o `degraded` (no `unverified`).

      3. Revisa `telemetry.jsonl` del flow problemático — los eventos `block-detected`
      y `gate-evaluated` te dirán dónde se atascó.

      '
