- type: markdown
  path: .specwright/skills/gate-semantic/SKILL.md
  title: SKILL
  docstring: "---\nname: gate-semantic\ndescription: >-\n  Tiered semantic analysis\
    \ of changed code (rg → ast-grep → OpenGrep).\n  Detects error-path bugs structural\
    \ gates miss. Findings default to\n  WARN. Internal — invoked by verify.\nallowed-tools:\n\
    \  - read\n  - bash\n  - glob\n  - grep\n  - write\n---\n\n# Gate: Semantic Analysis\n\
    \n## Goal\n\nDetect semantic bugs in changed code using symbolic pre-processing\
    \ when\navailable. For each candidate finding, localize it explicitly with\npremises,\
    \ claims, and conclusion grounded in file:line evidence.\n\n## Inputs\n\n- `config.json`\
    \ `gates.semantic` — categories, tools, optional `rulesDir`\n- `{repoStateRoot}/work/{selectedWork.id}/workflow.json`\
    \ — selected work unit\n- Changed files via `git diff --name-only $(git merge-base\
    \ HEAD <baseBranch>)`\n\n## Outputs\n\n- `{workDir}/evidence/semantic-report.md`\n\
    - Gate status in the selected work's `workflow.json`\n\n## Constraints\n\n**Scope\
    \ (MEDIUM freedom):**\nChanged code files only. Skip markdown/JSON/YAML/config.\
    \ No changed code → PASS."
  sections:
  - heading: 'Gate: Semantic Analysis'
    body: ''
  - heading: Goal
    body: '

      Detect semantic bugs in changed code using symbolic pre-processing when

      available. For each candidate finding, localize it explicitly with

      premises, claims, and conclusion grounded in file:line evidence.

      '
  - heading: Inputs
    body: '

      - `config.json` `gates.semantic` — categories, tools, optional `rulesDir`

      - `{repoStateRoot}/work/{selectedWork.id}/workflow.json` — selected work unit

      - Changed files via `git diff --name-only $(git merge-base HEAD <baseBranch>)`

      '
  - heading: Outputs
    body: '

      - `{workDir}/evidence/semantic-report.md`

      - Gate status in the selected work''s `workflow.json`

      '
  - heading: Constraints
    body: '

      **Scope (MEDIUM freedom):**

      Changed code files only. Skip markdown/JSON/YAML/config. No changed code → PASS.


      **Tool tiers (LOW freedom):**

      Resolve from `gates.semantic.tools` config, fall back to PATH detection.

      Missing tools narrow scope — never FAIL or ERROR. Validate `sg` identity:

      `sg --version 2>&1 | grep -iq ''ast-grep''` (`/usr/bin/sg` from shadow-utils

      is a false positive).


      | Tier | Tool | Adds |

      |------|------|------|

      | 0 | rg | Text-pattern extraction + LLM |

      | 1 | ast-grep (`sg`) | S'
  - heading: Protocol References
    body: '

      - `.specwright/protocols/evidence.md#verdict-rendering` -- verdict rendering
      and calibration

      - `.specwright/protocols/evidence.md` -- evidence storage

      - `.specwright/protocols/state.md` -- gate status updates

      - `.specwright/protocols/context.md` -- config and anchor doc loading

      '
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |-----------|--------|

      | Disabled in config | sw-verify skips silently |

      | No changed code files | PASS |

      | No symbolic tools | Degrade to Tier 0 |

      | Tool missing at runtime | WARN, skip tier |

      | No calibration data | All findings WARN |

      '
