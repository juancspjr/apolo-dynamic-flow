- type: python
  path: scripts/python/user_input_collector.py
  title: user_input_collector
  docstring: "user_input_collector.py — Pausa para input del usuario (v3.2.0).\n\n\
    RESPONDE a la intencion del usuario:\n  \"solo se para cuando requiere informacion\
    \ del usuario\"\n\nCuando el orquestador encuentra una ambiguedad o decision que\
    \ requiere\ninput humano, pausa y genera un QUESTION.yaml con:\n  - question_id:\
    \ identificador unico\n  - question: la pregunta en lenguaje natural\n  - context:\
    \ informacion relevante para responder\n  - options: opciones predefinidas (si\
    \ aplica)\n  - default: valor por defecto si el usuario no responde\n  - timeout_seconds:\
    \ tiempo maximo antes de usar default\n\nEl usuario responde via:\n  - CLI: python3\
    \ user_input_collector.py answer --flowid X --question-id Q1 --answer \"...\"\n\
    \  - Archivo: escribir la respuesta en ANSWERS/<question_id>.txt\n  - Auto-yes:\
    \ el sistema usa el default automaticamente (--yes flag en orquestador)\n\nCLI:\n\
    \  # El orquestador genera una pregunta\n  python3 user_input_collector.py ask\
    \ \\\n      --flowid APOLO-X \\\n      --question \"Que archivos quieres incluir\
    \ e"
