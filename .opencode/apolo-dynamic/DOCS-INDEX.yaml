    - `{worktreeStateRoot}/session.json`\n- `{repoStateRoot}/work/*/workflow.json`\n\
    - `{workArtifactsRoot}/{selectedWork.id}/approvals.md` when a work is attached\n\
    - `{workDir}/review-packet.md` when the selected unit has reached verify or ship\
    \ artifacts\n\n## Outputs\n\n- Formatted status display for the current session\
    \ and selected work\n- Repo-wide summary of active works and their owner w"
  sections:
  - heading: Specwright Status
    body: ''
  - heading: Goal
    body: '

      Tell the user what this worktree is attached to, what that work is doing, what

      other works are active in the repository, which runtime layout is active, and

      what the next action should be.

      '
  - heading: Inputs
    body: '

      - `{projectArtifactsRoot}/config.json`

      - `{worktreeStateRoot}/session.json`

      - `{repoStateRoot}/work/*/workflow.json`

      - `{workArtifactsRoot}/{selectedWork.id}/approvals.md` when a work is attached

      - `{workDir}/review-packet.md` when the selected unit has reached verify or
      ship artifacts

      '
  - heading: Outputs
    body: '

      - Formatted status display for the current session and selected work

      - Repo-wide summary of active works and their owner worktrees

      - In `--repair` mode: remediation outcome for the targeted shipped unit

      '
  - heading: Constraints
    body: "\n**Display (HIGH freedom):**\n- Print the resolved `projectArtifactsRoot`,\
      \ `repoStateRoot`,\n  `worktreeStateRoot`, and `workArtifactsRoot` before the\
      \ session summary so\n  tracked project artifacts and the active runtime layout\
      \ are inspectable.\n- Name the runtime layout explicitly: `project-visible`\
      \ runtime roots under\n  `.specwright-local/` are the recommended interactive\
      \ default, while\n  `git-admin` roots under `.git/specwright/` are compatibility\
      \ mode.\n- Show the current session first: `worktre"
  - heading: Protocol References
    body: '

      - `.specwright/protocols/context.md` -- logical roots and session/work resolution

      - `.specwright/protocols/state.md` -- per-work workflow schema and mutation
      rules

      '
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |---|---|

      | no shared/session state can be resolved | tell the user to run `/sw-init`
      |

      | selected workflow parse error | show the raw error and stop |

      | stale per-work lock detected | offer to clear it with a warning |

      | `--repair` target ambiguous across works | stop and list matching work IDs
      |

      '
