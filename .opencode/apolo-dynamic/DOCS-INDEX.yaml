- type: python
  path: scripts/python/scaffold_impl.py
  title: scaffold_impl
  docstring: "scaffold_impl.py — Generador de andamios de implementación.\n\nGAP 4:\
    \ Apoyo activo a la implementación.\n\nPara un MP específico del DYNAMIC-PLAN.yaml,\
    \ genera IMPL-SCAFFOLD.yaml con:\n\n  - Lista exacta de archivos a tocar (del\
    \ CODE-INDEX, no inferida)\n  - Firmas de funciones que debe mantener (para no\
    \ romper contratos)\n  - Tests existentes que debe seguir pasando\n  - Template\
    \ de estructura del cambio según patrones del repo\n  - Checkpoints intermedios:\
    \ \"después de X, corre tests antes de continuar Y\"\n  - Dependencias circulares\
    \ a evitar\n  - Sugerencia de orden de edición (archivos sin dependencias primero)\n\
    \nEl agente implementa con un andamio, no en el vacío.\n\nUso:\n  python3 scaffold_impl.py\
    \ \\\n    --plan plan/active/<FLOW>/03-PLAN-INDICE-DYNAMIC.yaml \\\n    --unit-id\
    \ U-01 \\\n    --code-index .opencode/apolo-dynamic/CODE-INDEX.yaml \\\n    --impact-prediction\
    \ plan/active/<FLOW>/IMPACT-PREDICTION.yaml \\\n    --output plan/active/<FLOW>/IMPL-SCAFFOLD-U01.yaml\
    \ \\\n    [--flowid APOLO-...]"
  examples:
  - "python3 scaffold_impl.py \\\\\n    --plan plan/active/<FLOW>/03-PLAN-INDICE-DYNAMIC.yaml\
    \ \\\\\n    --unit-id U-01 \\\\\n    --code-index .opencode/apolo-dynamic/CODE-INDEX.yaml\
    \ \\\\\n    --impact-prediction plan/active/<FLOW>/IMPACT-PREDICTION.yaml \\\\\
    \n    --output plan/active/<FLOW>/IMPL-SCAFFOLD-U01.yaml \\\\\n    [--flowid APOLO-...]"
