  path: scripts/python/test_coverage.py
  title: test_coverage
  docstring: "test_coverage.py — Análisis de cobertura de tests por símbolo (v2.5.0).\n\
    \nDiferencia con run_tests.py (que solo corre tests):\neste script analiza QUÉ\
    \ símbolos están cubiertos por tests,\nno solo si los tests pasan.\n\nIntegraciones:\n\
    \  Python: coverage.py (coverage run + coverage report --json)\n  JavaScript/TypeScript:\
    \ nyc/jest --coverage\n  Go: go test -cover -coverprofile\n\nSi coverage tools\
    \ no están disponibles, usa heurísticas:\n  - Busca test_<name>.py, <name>_test.go,\
    \ <name>.test.ts por convención\n  - Cuenta símbolos en archivos de test vs archivos\
    \ de código\n\nUso:\n  python3 test_coverage.py --repo-root . --output TEST-COVERAGE.yaml\n\
    \  python3 test_coverage.py --repo-root . --code-index .opencode/apolo-dynamic/CODE-INDEX.yaml"
