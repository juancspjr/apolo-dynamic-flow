      ```

      Snapshot: {ISO 8601 timestamp}

      Files: {count} | Modules: {count}

      ```


      Required sections: Architecture, Modules (per-module: purpose, key files, public
      API, dependencies), Conventions, Integration Points, Gotchas.

      '
  - heading: Size
    body: '

      - Small projects: 500-1000 words

      - Large projects: 1500-2500 words

      - Hard cap: 3000 words

      '
  - heading: Freshness
    body: '

      Parse `Snapshot:` timestamp. Default staleness threshold: 7 days. Configurable
      via `config.landscape.stalenessThresholdDays` (optional field, default 7).


      - Fresh: use as-is

      - Stale: consumer warns user, may refresh inline

      - Missing: no warning, proceed without

      '
  - heading: Updates
    body: '

      - **Full rewrite**: initial generation and refresh (replace entire document)

      - **Incremental merge**: post-ship updates (re-scan affected modules only, preserve
      unchanged sections, update timestamp)

      - Module granularity: one section per logical module, package, or top-level
      directory

      '
