  path: .specwright/protocols/evidence.md
  title: evidence
  docstring: "# Evidence Protocol\n\n## Evidence Storage\n\n**Directory structure:**\n\
    ```\n{currentWork.workDir}/evidence/\n```\n\n**File naming:**\n```\n{gate-name}-report.md\n\
    ```\n\nExamples:\n- `security-report.md`\n- `spec-compliance.md`\n- `test-quality.md`\n\
    \n## Gate State Updates\n\nAfter each gate, update `workflow.json`:\n\n```json\n\
    {\n  \"gates\": {\n    \"security\": {\n      \"verdict\": \"PASS\",\n      \"\
    lastRun\": \"2026-02-10T12:34:56Z\",\n      \"evidence\": \"{currentWork.workDir}/evidence/security-report.md\"\
    \n    }\n  }\n}\n```\n\n**Verdict values:** `PASS`, `WARN`, `FAIL`, `ERROR`, `SKIP`\n\
    \n`SKIP` — gate was skipped; no evidence file produced.\n\n## Freshness\n\nEvidence\
    \ older than 30 minutes is stale. Re-run the gate.\n\n## Visibility\n\n**Surface\
    \ key findings inline in gate output.** Users should not need to read evidence\
    \ files to understand results.\n\nEvidence files are for:\n- Detailed audit trail\n\
    - Future reference\n- External review\n\nNot for:\n- Primary communication\n-\
    \ User decision-making\n\n## Mutation Evidence\n\nMutation evidence is ti"
  sections:
  - heading: Evidence Protocol
    body: ''
  - heading: Evidence Storage
    body: '

      **Directory structure:**

      ```

      {currentWork.workDir}/evidence/

      ```


      **File naming:**

      ```

      {gate-name}-report.md

      ```


      Examples:

      - `security-report.md`

      - `spec-compliance.md`

      - `test-quality.md`

      '
  - heading: Gate State Updates
    body: "\nAfter each gate, update `workflow.json`:\n\n```json\n{\n  \"gates\":\
      \ {\n    \"security\": {\n      \"verdict\": \"PASS\",\n      \"lastRun\": \"\
      2026-02-10T12:34:56Z\",\n      \"evidence\": \"{currentWork.workDir}/evidence/security-report.md\"\
      \n    }\n  }\n}\n```\n\n**Verdict values:** `PASS`, `WARN`, `FAIL`, `ERROR`,\
      \ `SKIP`\n\n`SKIP` — gate was skipped; no evidence file produced.\n"
  - heading: Freshness
    body: '

      Evidence older than 30 minutes is stale. Re-run the gate.

      '
  - heading: Visibility
    body: '

      **Surface key findings inline in gate output.** Users should not need to read
      evidence files to understand results.


      Evidence files are for:

      - Detailed audit trail

      - Future reference

      - External review


      Not for:

      - Primary communication

      - User decision-making

      '
  - heading: Mutation Evidence
    body: "\nMutation evidence is tier-aware. Every mutation report must disclose\
      \ which tier\nran:\n\n- `T1` — tool-backed mutation analysis\n- `T2` — LLM-generated\
      \ mutants\n- `T3` — qualitative bypass-class floor\n  - runs the preserved bypass\
      \ classes: hardcoded returns, partial\n    implementations, and boundary skips\n\
      \  - produces one PASS / WARN / BLOCK verdict per bypass class when T1 / T2\n\
      \    cannot yield usable output\n\nMutation analysis never degrades to a silent\
      \ skip; if one tier cannot produce\nusable outpu"
  - heading: Reviewer Synthesis
    body: "\n`review-packet.md` is a sibling audit artifact, not another gate report.\n\
      \n- Location: `{workDir}/review-packet.md`\n- Producer: `sw-verify`, after the\
      \ standard gate run completes\n- Inputs: approvals, `implementation-rationale.md`,\
      \ gate evidence files, and\n  the gate-spec compliance matrix\n\nRules:\n\n\
      - The packet synthesizes evidence for reviewer consumption; it does not rerun\n\
      \  gates or duplicate gate logic.\n- Gate evidence files remain canonical for\
      \ detailed findings and proof.\n- `spec-compliance"
  - heading: Verdict Rendering
    body: ''
  - heading: Default Stance
    body: '

      **Default verdict: FAIL**


      Evidence must prove PASS, not the other way around. Absence of evidence is not
      evidence of absence.

      '
  - heading: Self-Critique Checkpoint
    body: '

      Before finalizing verdict, ask:

      - Did I accept anything without citing proof?

      - Did I give benefit of the doubt?

      - Would a skeptical auditor agree?

      - If ambiguous -> FAIL

      '
  - heading: Status Precedence
    body: '

      ```

      ERROR > FAIL > WARN > PASS

      ```


      If any finding is ERROR, overall status is ERROR.

      If any finding is FAIL and none ERROR, overall status is FAIL.

      And so on.

      '
  - heading: Visibility Requirements
    body: '

      Explain each finding in plain language:

      - **What was found:** Specific location, code, pattern

      - **Why it matters:** Impact, risk, or spec violation

      - **What to do:** Actionable remediation


      Not just: "Security: FAIL"

      '
  - heading: Guardian Posture
    body: "\nThe verify phase exists to catch problems, not to rubber-stamp shipping.\n\
      \n- Present findings as issues to address, not obstacles to dismiss.\n- Never\
      \ recommend shipping when blocking findings exist.\n- Warnings are real: explain\
      \ why each matters and what the user risks by\n  shipping with them. Let the\
      \ user make an informed decision.\n- The default tone is \"here's what needs\
      \ attention\" not \"everything looks\n  fine except...\"\n"
  - heading: Anchor Verification
    body: '

      Check findings against:

      - `CONSTITUTION.md` -- development practices

      - `CHARTER.md` -- project vision


      Where relevant, cite which principle is violated.

      '
  - heading: Escalation Heuristics
    body: '

      When BLOCK findings suggest design-level problems rather than implementation
      bugs,

      sw-verify should recommend upstream action.


      **Signals** (evaluated after all gates complete):


      1. **gate-spec**: 3+ criteria have FAIL status (systemic, not isolated)

      2. **gate-wiring**: circular dependencies in changed files (structural problem)

      3. **gate-tests**: mutation resistance BLOCK on 50%+ of test files (`T1/T2`)
      or on 2+ bypass classes (`T3`).

      4. **gate-security**: BLOCK findings in core data flow (not'
  - heading: Calibration Data
    body: "\nLightweight gate outcome tracking. Recorded from the first shipped unit.\n\
      Silently absent from the verify report until 5+ units have shipped.\n\n**Data\
      \ format** (stored as a sibling field in the learnings JSON):\n```json\n{\n\
      \  \"gateCalibration\": {\n    \"{gateName}\": {\n      \"verdict\": \"PASS|WARN|FAIL\"\
      ,\n      \"findingCount\": 0,\n      \"falsePositives\": [\"dimension description\"\
      ],\n      \"falseNegatives\": [\"bug description\"]\n    }\n  }\n}\n```\n\n\
      **Recording (sw-learn) -- mandatory:**\n- Recording is mandatory. "
