  title: SKILL
  docstring: "---\nname: sw-plan\ndescription: >-\n  Breaks a design into work units\
    \ with testable specs. Reads design\n  artifacts from sw-design and produces implementation-ready\
    \ plans.\nargument-hint: \"\"\nallowed-tools:\n  - read\n  - write\n  - edit\n\
    \  - bash\n  - glob\n  - grep\n  - Task\n---\n\n# Specwright Plan\n\n## Goal\n\
    \nTurn the approved design into implementation-ready specs with testable acceptance\n\
    criteria. Decompose into ordered work units if large. Operates autonomously,\n\
    applying `.specwright/protocols/decision.md` for all decisions. Gate handoff at\
    \ the end.\n\n## Inputs\n\n- `{worktreeStateRoot}/session.json` -- selected work\
    \ for this worktree\n- `{repoStateRoot}/work/{selectedWork.id}/workflow.json`\
    \ -- selected work state\n- `{workArtifactsRoot}/{selectedWork.id}/design.md`\
    \ -- approved solution design\n- `{workArtifactsRoot}/{selectedWork.id}/context.md`\
    \ -- research findings from sw-design\n- `{workArtifactsRoot}/{selectedWork.id}/decisions.md`\
    \ -- design-phase decisions\n- Conditional design artifacts: `data-"
  sections:
  - heading: Specwright Plan
    body: ''
  - heading: Goal
    body: '

      Turn the approved design into implementation-ready specs with testable acceptance

      criteria. Decompose into ordered work units if large. Operates autonomously,

      applying `.specwright/protocols/decision.md` for all decisions. Gate handoff
      at the end.

      '
  - heading: Inputs
    body: '

      - `{worktreeStateRoot}/session.json` -- selected work for this worktree

      - `{repoStateRoot}/work/{selectedWork.id}/workflow.json` -- selected work state

      - `{workArtifactsRoot}/{selectedWork.id}/design.md` -- approved solution design

      - `{workArtifactsRoot}/{selectedWork.id}/context.md` -- research findings from
      sw-design

      - `{workArtifactsRoot}/{selectedWork.id}/decisions.md` -- design-phase decisions

      - Conditional design artifacts: `data-model.md`, `contracts.md`, `testing-strategy.md`,
      `infra.md'
  - heading: Outputs
    body: '

      **Single-unit work**: `spec.md` + `plan.md` in `{workArtifactsRoot}/{selectedWork.id}/`
      (flat layout).


      **Multi-unit work**: For each unit in `{workArtifactsRoot}/{selectedWork.id}/units/{unit-id}/`:

      `spec.md` + `plan.md` + `context.md`. `workUnits` array in workflow.json.

      Also: `integration-criteria.md` in the design-level directory (`{workArtifactsRoot}/{selectedWork.id}/`).


      Also: `{repoStateRoot}/work/{selectedWork.id}/stage-report.md` for the planning
      handoff.


      Also: `decisions.md` updated'
  - heading: Constraints
    body: '

      **Stage boundary (LOW freedom):**

      Follow `.specwright/protocols/stage-boundary.md`. Produce specs and plans. NEVER
      implement, branch,

      test, or commit. After gate handoff, STOP.


      **Pre-condition check (LOW freedom):**

      Resolve the selected work from the current worktree session. Check that

      `selectedWork.status` is `designing` or `planning` and `design.md` exists.

      `sw-plan` operates on the current worktree''s attached work only.

      If another live top-level worktree owns that selected work, STOP and r'
  - heading: Protocol References
    body: '

      - `.specwright/protocols/stage-boundary.md` -- scope, termination, and handoff

      - `.specwright/protocols/decision.md` -- autonomous decision framework, gate
      handoff, late assumption capture and autonomous resolution

      - `.specwright/protocols/state.md` -- workflow state updates and locking

      - `.specwright/protocols/context.md` -- anchor doc and config loading

      - `.specwright/protocols/recovery.md` -- compaction recovery

      - `.specwright/protocols/approvals.md` -- design approval capture and validation'
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |-----------|--------|

      | Status not `designing`/`planning` | STOP: "Run /sw-design first" |

      | Required artifact missing | STOP: "Run /sw-design first" |

      | Selected work owned by another live top-level worktree | STOP with explicit
      `/sw-adopt` guidance |

      | Design too vague for specs | Apply DISAMBIGUATION from design context. Record
      interpretation. Surface at gate if undetermined. |

      | Active work in progress | Continue planning the current work. sw-plan always
      operates on '
