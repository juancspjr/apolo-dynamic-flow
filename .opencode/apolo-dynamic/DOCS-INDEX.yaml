- type: python
  path: scripts/python/registry_recommend.py
  title: registry_recommend
  docstring: "registry_recommend.py — Implementa apolo.registry.recommend(task).\n\
    \nDado una tarea, recomienda qué tool del registry usar con scoring.\n\nDiferencia\
    \ con mcp-loader.suggestMcpForTask (que solo mira MCPs):\neste script considera\
    \ TODAS las tools (MCPs + skills + plugins + scripts Python)\ny las ordena por\
    \ score con reasoning explícito.\n\nScoring:\n  +10 si capability matchea palabra\
    \ clave en la tarea\n  +5 si es tool nativa (más confiable que MCP externo)\n\
    \  +3 si tiene fallback definido\n  -5 si está marcada como degraded\n  -10 si\
    \ está disabled\n\nUso:\n  python3 registry_recommend.py \\\n    --task \"editar\
    \ archivo TS y correr tests\" \\\n    --repo-root /path \\\n    [--flowid APOLO-...]\
    \ \\\n    [--top 3]"
  examples:
  - "python3 registry_recommend.py \\\\\n    --task \"editar archivo TS y correr tests\"\
    \ \\\\\n    --repo-root /path \\\\\n    [--flowid APOLO-...] \\\\\n    [--top\
    \ 3]"
