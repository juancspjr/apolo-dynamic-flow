  path: .specwright/protocols/insights.md
  title: insights
  docstring: "# Insights Protocol\n\n**System boundary crossing.** Claude Code writes\
    \ session insights to `~/.claude/usage-data/`. This protocol governs reading that\
    \ data for learning enrichment.\n\n## Data Location\n\n```\n~/.claude/usage-data/\n\
    \  facets/{session-id}.json\n  session-meta/{session-id}.json\n```\n\n## Required\
    \ Schemas\n\n### Facet Files\nRequired fields:\n- `session_id` (string)\n- `friction_counts`\
    \ (object: string keys, numeric values)\n- `friction_detail` (string)\n\nPrivacy-sensitive\
    \ fields (NEVER surface):\n- `brief_summary`\n- `underlying_goal`\n\n### Session-Meta\
    \ Files\nRequired fields:\n- `session_id` (string)\n- `project_path` (string,\
    \ absolute path)\n- `start_time` (ISO 8601 string)\n\n## Validation\n\n**Per-file\
    \ validation:**\n- Required fields must exist and match type\n- Invalid files:\
    \ skip silently, continue processing others\n- Non-JSON files: skip\n\n**Cross-file\
    \ validation:**\n- Facets without matching session-meta: skip\n\n## Project Filtering\n\
    \n1. Join facets to session-meta by `session_id`\n2. Filter where"
  sections:
  - heading: Insights Protocol
    body: '

      **System boundary crossing.** Claude Code writes session insights to `~/.claude/usage-data/`.
      This protocol governs reading that data for learning enrichment.

      '
  - heading: Data Location
    body: "\n```\n~/.claude/usage-data/\n  facets/{session-id}.json\n  session-meta/{session-id}.json\n\
      ```\n"
  - heading: Required Schemas
    body: ''
  - heading: Facet Files
    body: 'Required fields:

      - `session_id` (string)

      - `friction_counts` (object: string keys, numeric values)

      - `friction_detail` (string)


      Privacy-sensitive fields (NEVER surface):

      - `brief_summary`

      - `underlying_goal`

      '
  - heading: Session-Meta Files
    body: 'Required fields:

      - `session_id` (string)

      - `project_path` (string, absolute path)

      - `start_time` (ISO 8601 string)

      '
  - heading: Validation
    body: '

      **Per-file validation:**

      - Required fields must exist and match type

      - Invalid files: skip silently, continue processing others

      - Non-JSON files: skip


      **Cross-file validation:**

      - Facets without matching session-meta: skip

      '
  - heading: Project Filtering
    body: '

      1. Join facets to session-meta by `session_id`

      2. Filter where `project_path` matches current project (exact string match)

      3. Only normalize trailing slashes before comparison (no case, symlink, or other
      normalization)

      4. No partial matching — `/myapp-v2` does NOT match `/myapp`

      '
  - heading: Aggregation
    body: '

      **Friction counts:**

      - Sum `friction_counts` across matching sessions by category

      - Surface top 3 categories by total count


      **Detail text:**

      - Include `friction_detail` from the most recent session (by `start_time`)

      '
  - heading: Staleness
    body: '

      **Threshold:** 14 days from newest matching facet''s `start_time`


      If stale:

      - Show info note: "Session pattern data is older than 14 days. Run /insights
      to refresh."

      - Skip enrichment

      '
  - heading: Graceful Degradation
    body: '

      **Silent skip when:**

      - Facets directory missing or empty

      - No matching project sessions

      - All files fail validation


      **Never:**

      - Prompt user to run `/insights` (except staleness note)

      - Error on missing data

      '
  - heading: Presentation
    body: '

      **Source tag:**

      ```json

      { "source": "insights" }

      ```


      **Section label:**

      "Session Patterns"


      **Visually separate** from other learning findings.

      '
  - heading: Privacy
    body: '

      **Only surface:**

      - Aggregated `friction_counts`

      - `friction_detail` text


      **Never surface:**

      - `brief_summary`

      - `underlying_goal`

      - Individual session identifiers

      '
