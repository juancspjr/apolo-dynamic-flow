- type: python
  path: scripts/python/cross_flow_learning.py
  title: cross_flow_learning
  docstring: "cross_flow_learning.py — Cross-flow learning: usar evidencia de flows\
    \ anteriores (v3.1.0).\n\nCierra el GAP #6 del INTEGRATION-VERDICT.md:\n  \"Cross-flow\
    \ learning: usar evidencia de flows anteriores para mejorar nuevos\"\n\nAnaliza\
    \ la telemetria y evidencia de flows anteriores para extraer\naprendizajes que\
    \ mejoren flows nuevos:\n\n  1. Patrones de exito: que combinaciones de (phase,\
    \ tool, strategy) llevan\n     a flows exitosos\n  2. Patrones de fallo: que combinaciones\
    \ llevan a bloqueos\n  3. Recommendations contextuales: dado un flow nuevo en\
    \ fase X, recomendar\n     acciones basadas en flows similares anteriores\n  4.\
    \ Routing adjustments: si cierto tool fallo N veces en fase X, ajustar\n     routing\
    \ para evitarlo\n\nStorage: .opencode/apolo-dynamic/CROSS-FLOW-LEARNING.yaml (consolidado)\n\
    \nCLI:\n  # Analizar todos los flows y construir base de conocimiento\n  python3\
    \ cross_flow_learning.py analyze --repo-root . --output knowledge.yaml\n\n  #\
    \ Recomendar para un flow nuevo\n  python3 cross_flow_learning.py "
