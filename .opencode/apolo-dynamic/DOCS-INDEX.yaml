- type: markdown
  path: .specwright/skills/sw-ship/SKILL.md
  title: SKILL
  docstring: "---\nname: sw-ship\ndescription: >-\n  Ships the current work unit.\
    \ Verifies all gates passed, creates a PR\n  with evidence-mapped body, updates\
    \ workflow state to shipped.\nargument-hint: \"\"\nallowed-tools:\n  - read\n\
    \  - write\n  - bash\n  - glob\n  - grep\n---\n\n# Specwright Ship\n\n## Goal\n\
    \nMerge the current work unit to main via a pull request. The PR body maps\nevidence\
    \ to acceptance criteria and derives its reviewer-facing audit summary\nfrom `review-packet.md`\
    \ so reviewers can verify without opening raw transcripts\nor reconstructing rationale\
    \ from the diff alone. The PR itself is the human\ngate — reviewers verify before\
    \ merge.\n\n## Inputs\n\n- `{worktreeStateRoot}/session.json` -- selected work\
    \ for this worktree\n- `{repoStateRoot}/work/{selectedWork.id}/workflow.json`\
    \ -- selected work unit, gate results\n- `{workDir}/spec.md` -- acceptance criteria\
    \ for PR body\n- `{workDir}/review-packet.md` -- reviewer-facing audit summary\
    \ assembled by `/sw-verify`\n- `{workDir}/evidence/` -- gate evidence files\n\
    - `"
  sections:
  - heading: Specwright Ship
    body: ''
  - heading: Goal
    body: '

      Merge the current work unit to main via a pull request. The PR body maps

      evidence to acceptance criteria and derives its reviewer-facing audit summary

      from `review-packet.md` so reviewers can verify without opening raw transcripts

      or reconstructing rationale from the diff alone. The PR itself is the human

      gate — reviewers verify before merge.

      '
  - heading: Inputs
    body: '

      - `{worktreeStateRoot}/session.json` -- selected work for this worktree

      - `{repoStateRoot}/work/{selectedWork.id}/workflow.json` -- selected work unit,
      gate results

      - `{workDir}/spec.md` -- acceptance criteria for PR body

      - `{workDir}/review-packet.md` -- reviewer-facing audit summary assembled by
      `/sw-verify`

      - `{workDir}/evidence/` -- gate evidence files

      - `{projectArtifactsRoot}/config.json` -- git config (PR tool, branch prefix,
      main branch)

      '
  - heading: Outputs
    body: '

      - `{repoStateRoot}/work/{selectedWork.id}/units/{selectedWork.unitId}/stage-report.md`
      -- shipping handoff digest with attention-at-top

      - Pull request created with a review-packet-grounded, evidence-mapped body

      - Selected work''s `workflow.json` status set to `shipped`

      '
  - heading: Constraints
    body: "\n**Stage boundary (LOW freedom):**\nFollow `.specwright/protocols/stage-boundary.md`.\
      \ Create PRs and mark shipped. NEVER start new\nwork, run builds, or begin next\
      \ unit. After PR: show URL, suggest `/sw-learn`, handoff.\n\n**Pre-flight checks\
      \ (LOW freedom):**\n- Resolve the selected work from the current worktree session.\
      \ If another live\n  top-level worktree owns it, STOP with explicit `/sw-adopt`\
      \ guidance instead\n  of generic adopt/takeover behavior.\n- Verify the selected\
      \ work exists and status is `"
  - heading: Protocol References
    body: '

      - `.specwright/protocols/stage-boundary.md` -- scope, termination, and handoff

      - `.specwright/protocols/decision.md` -- autonomous decision framework

      - `.specwright/protocols/git.md` -- branch, push, PR creation

      - `.specwright/protocols/git-freshness.md` -- shipping freshness pre-flight

      - `.specwright/protocols/git-reconcile.md` -- lifecycle-owned branch reconcile

      - `.specwright/protocols/state.md` -- workflow state updates

      - `.specwright/protocols/evidence.md` -- evidence references for PR bod'
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |-----------|--------|

      | Status is `building` | STOP: "Run /sw-verify first." |

      | Gates not passed | STOP: "Gate {name} failed. Fix and re-run /sw-verify."
      |

      | Gate has no verdict | STOP: "Gate {name} has no verdict. Run /sw-verify first."
      |

      | Shipping freshness reconcile under branch-head `require` + `rebase` or `merge`
      fails | STOP with the reconcile failure and rerun `/sw-verify`, then `/sw-ship`
      after fixing the blocked worktree state. |

      | Shipping freshness checkpoin'
