- type: python
  path: scripts/python/guided_recovery.py
  title: guided_recovery
  docstring: "guided_recovery.py — Sistema ayuda al agente a recuperar de errores\
    \ (v3.5.1).\n\nRESPONDE a tu indicacion: \"el sistema ayuda pero ya hemos visto\
    \ muchos pequeñas\nfallas yo insisto seguir revisando\"\n\nCuando un script falla,\
    \ el sistema no solo reporta el error — ANALIZA la causa\ny propone SOLUCIONES\
    \ CONCRETAS que el agente puede ejecutar. Como un mecánico\nque diagnostica y\
    \ repara.\n\nTipos de recovery:\n  1. MISSING_DEPENDENCY: falta instalar paquete\
    \ → proponer pip install\n  2. YAML_PARSE_ERROR: YAML invalido → mostrar linea\
    \ exacta + fix\n  3. FILE_NOT_FOUND: archivo falta → proponer crear o buscar alternativa\n\
    \  4. PERMISSION_DENIED: permisos → proponer chmod\n  5. TIMEOUT: script lento\
    \ → proponer aumentar timeout o dividir tarea\n  6. SCHEMA_MISMATCH: YAML no cumple\
    \ schema → mostrar campos faltantes\n  7. CIRCULAR_DEPENDENCY: dependencia circular\
    \ → proponer orden alternativo\n  8. TEST_FAILURE: test fallo → mostrar diff +\
    \ evidence_replay + smart_rollback\n\nCLI:\n  python3 guided_recovery.py diagnose"
