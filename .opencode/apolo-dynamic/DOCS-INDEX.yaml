- type: python
  path: scripts/python/agent_escape_hatch.py
  title: agent_escape_hatch
  docstring: "agent_escape_hatch.py — Salidas guiadas cuando el sistema puede dañar\
    \ (v3.5.1).\n\nRESPONDE a tu indicacion: \"seria bueno indicaciones no digo que\
    \ el agente se\nlibere o que haga trampas para liberarse solo que hay que buscar\
    \ una salida\ncuando el sistema puede dañar las soluciones\"\n\nCuando el agente\
    \ esta atasco en un loop de fallos, el sistema debe ofrecer\nSALIDAS GUIADAS (no\
    \ escapar sin control, sino caminos alternativos seguros):\n\n  1. SKIP_WITH_JUSTIFICATION:\
    \ saltar una fase con justificacion documentada\n  2. ALTERNATIVE_PATH: proponer\
    \ un camino alternativo (ej: manual en vez de auto)\n  3. DEGRADE_GRACEFUL: degradar\
    \ funcionalidad en vez de fallar\n  4. REQUEST_HUMAN_HELP: escalar a humano con\
    \ contexto completo\n  5. ROLLBACK_AND_RETRY: revertir y reintentar con estrategia\
    \ diferente\n\nCada escape hatch:\n  - Requiere justificacion (no se puede escapar\
    \ sin razon)\n  - Queda registrado en telemetry (auditable)\n  - El agente debe\
    \ aprender de por que necesito escapar\n  - Si se usa el mismo escap"
