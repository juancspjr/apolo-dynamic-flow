- type: markdown
  path: .specwright/protocols/delegation.md
  title: delegation
  docstring: "# Delegation Protocol\n\n## Custom Subagents\n\nSpecwright defines agents\
    \ as markdown files in `agents/`. Each file has YAML frontmatter (name, description,\
    \ model, tools) and a system prompt body. Claude Code loads these at **session\
    \ start**. Agents added mid-session require `/agents` or a session restart to\
    \ become available.\n\n## Invocation\n\n**Primary** (when agents are loaded):\n\
    ```\nTask({\n  subagent_type: \"{agent-name}\",\n  description: \"Short description\"\
    ,\n  prompt: \"Full context brief with deliverable, file paths, constraints, output\
    \ format\"\n})\n```\n\n**Fallback** (mid-session or when custom agents unavailable):\n\
    ```\nTask({\n  subagent_type: \"general-purpose\",\n  model: \"{model from roster}\"\
    ,\n  description: \"Short description\",\n  prompt: \"{agent system prompt from\
    \ agents/{name}.md}\\n\\n{task-specific brief}\"\n})\n```\n\nWhen using fallback,\
    \ read the agent's markdown file and include its system prompt in the task prompt.\
    \ This preserves the agent's behavioral constraints.\n\n## Context Handoff\n\n\
    Agents"
  sections:
  - heading: Delegation Protocol
    body: ''
  - heading: Custom Subagents
    body: '

      Specwright defines agents as markdown files in `agents/`. Each file has YAML
      frontmatter (name, description, model, tools) and a system prompt body. Claude
      Code loads these at **session start**. Agents added mid-session require `/agents`
      or a session restart to become available.

      '
  - heading: Invocation
    body: "\n**Primary** (when agents are loaded):\n```\nTask({\n  subagent_type:\
      \ \"{agent-name}\",\n  description: \"Short description\",\n  prompt: \"Full\
      \ context brief with deliverable, file paths, constraints, output format\"\n\
      })\n```\n\n**Fallback** (mid-session or when custom agents unavailable):\n```\n\
      Task({\n  subagent_type: \"general-purpose\",\n  model: \"{model from roster}\"\
      ,\n  description: \"Short description\",\n  prompt: \"{agent system prompt from\
      \ agents/{name}.md}\\n\\n{task-specific brief}\"\n})\n```\n\nWhen using fallback"
  - heading: Context Handoff
    body: '

      Agents do NOT inherit the main conversation. Include in every prompt:

      - The specific deliverable expected

      - File paths to read (spec, plan, config, constitution)

      - Relevant constraints from constitution

      - Expected output format

      '
  - heading: Context Discipline
    body: '

      Request structured, concise output. Every delegation prompt should end with

      an output format constraint (e.g., "Return: files changed, test results,

      issues found. No narrative.").


      Between tasks in multi-task skills: reference committed source code by path

      only (agents can Read it). Spec/plan/design content needed for the current

      task should still be included inline — agents have no conversation history.


      For large context documents (context.md, design.md): include only sections

      relevant to the'
  - heading: Build Grounding
    body: '

      For build-time delegation, pass file paths for grounding docs instead of

      describing them inline:

      - `{currentWork.workDir}/repo-map.md` when it exists

      - `core/skills/lang-building/{language}.md` for the task''s language-pattern
      doc


      Build agents read those files directly when the prompt includes the paths.

      Language selection is deterministic: use `config.json project.languages[0]`

      unless the task is clearly in a different language by file extension.

      '
  - heading: Agent Roster
    body: '

      | Agent | Model | Use for | Constraint |

      |-------|-------|---------|------------|

      | specwright-architect | opus | Design, review, critic | READ-ONLY |

      | specwright-tester | opus | Write brutal tests, audit test quality | Adversarial
      mindset |

      | specwright-integration-tester | opus | Write integration/contract/E2E tests
      at boundaries | No skip conditions. No mocking internal boundaries. |

      | specwright-executor | sonnet | Implementation (make tests pass) | No subagents
      |

      | specwright-reviewer | o'
  - heading: Agent Teams (Experimental)
    body: '

      Agent teams coordinate multiple independent Claude Code sessions (teammates)
      under a lead session. Unlike subagents, teammates are full sessions with their
      own context windows, tool access, and the ability to spawn subagents.


      **When to use agent teams vs subagents:**


      | Factor | Subagents | Agent Teams |

      |--------|-----------|-------------|

      | Context | Share caller''s context window | Independent context windows |

      | Isolation | Same working directory | Can use separate worktrees |

      | Nesting | C'
  - heading: Anti-Patterns
    body: '

      - Don''t delegate simple lookups -- use Glob/Grep directly

      - Don''t delegate work that requires the main conversation''s history

      - Don''t nest subagent delegation -- subagents cannot spawn other subagents

      - Teammates are full sessions and CAN spawn subagents, but cannot spawn teams

      - Don''t delegate without all necessary context in the prompt

      '
