  docstring: "static_analyzer.py — Análisis estatico de dependencias entre scripts\
    \ (v3.5.0).\n\nRESPONDE a tu pregunta: \"debe haber recursos estaticos o a traves\
    \ de script\nque ayudan a acomodar este tipo de integraciones buscando las mejores\
    \ formas\nevitando daños colaterales\"\n\nAnaliza estaticamente (sin ejecutar)\
    \ todos los scripts Python del plugin y\nconstruye un grafo de dependencias:\n\
    \  - Que scripts importa cada script\n  - Que scripts invoca cada script (via\
    \ subprocess/run_cmd)\n  - Que artefactos YAML produce cada script\n  - Que artefactos\
    \ YAML consume cada script\n  - Deteccion de dependencias circulares\n  - Deteccion\
    \ de scripts aislados (no conectados al grafo)\n\nCLI:\n  python3 static_analyzer.py\
    \ analyze --repo-root .\n  python3 static_analyzer.py graph --repo-root .\n  python3\
    \ static_analyzer.py circular --repo-root .\n  python3 static_analyzer.py isolated\
    \ --repo-root ."
