- type: python
  path: scripts/python/full_audit.py
  title: full_audit
  docstring: "full_audit.py — Revisión completa del sistema (v2.8.1).\n\nFIX v2.8.1:\
    \ TypeError cuando `security_findings` o `smell_count` son listas\n  (algunos\
    \ analizadores retornan lista de findings, no un int).\n  Ahora se normaliza con\
    \ `_as_count()` antes de cualquier operación aritmética.\n\nEjecuta TODOS los\
    \ analizadores en orden y genera un reporte consolidado:\n  1. Code index (AST)\n\
    \  2. Code quality (bandit, radon, eslint-security, gosec, cppcheck)\n  3. Vulnerability\
    \ scan (safety, npm audit, pip-audit, govulncheck, cargo audit)\n  4. Code smells\
    \ (long methods, god classes, deep nesting, duplication)\n  5. Dead code analysis\n\
    \  6. Cyclomatic complexity (radon, gocyclo, regex fallback)\n  7. Test coverage\n\
    \  8. LSP diagnostics (if available)\n  9. Cross-language analysis\n  10. Function\
    \ summaries\n  11. Refactoring suggestions\n\nGenera FULL-AUDIT-REPORT.yaml con\
    \ todo consolidado + score final.\n\nUso:\n  python3 full_audit.py --repo-root\
    \ ."
