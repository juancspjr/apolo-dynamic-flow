      | Selected work owned by another live top-level worktree | STOP with explicit
      adopt/takeover guidance |

      | No open scope remains (only applicable in `building` or `verifying`) | STOP:
      "Run /sw-verify" |

      | Architect modifies completed criteria or shipped scope | Reject, re-delegate
      (max 2) |

