  sections:
  - heading: APOLO Dynamic Flow
    body: '

      > **Plugin de orquestacion de agentes para OpenCode** con flujos dinamicos,
      recoleccion determinista de evidencia, planes generados por Python, tests automaticos
      tras cada cambio, absorcion de tools externas (MCPs, skills, plugins, scripts),
      self-healing, generacion automatica de tests, busqueda semantica, refactoring,
      escaneo de vulnerabilidades CVE, code smells, dead code, feedback loop, documentacion
      interactiva, modo debug paso a paso, validacion de integracion E2E, auto-hooks,
      post-script '
