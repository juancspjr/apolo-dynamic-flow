      10. [Plugin de reemplazo: '
  - heading: 1. Resumen ejecutivo
    body: '

      El proyecto APOLO es un sistema de orquestación de agentes OpenCode con **143
      archivos** y **27,432 líneas** totales. Tiene **ideas arquitectónicas sólidas**
      (pipeline ASR/VERDAD/MP, evidence pack, mutation gate, fail-closed thresholds)
      pero sufre de problemas críticos de ejecución:


      - **Planes estáticos** que no se adaptan a nueva evidencia — el sistema registra
      el problema y continúa con el plan original, generando ciclos infinitos de "plan
      tras plan".

      - **Recolección no determinista** — depe'
  - heading: 2. Inventario del proyecto actual
    body: ''
  - heading: 2.1 Totales
    body: '

      | Componente | Cantidad | Líneas aprox. |

      |---|---:|---:|

      | Archivos totales | 143 | 27,432 |

      | Scripts Python | 88 | ~12,000 |

      | Commands | 13 | ~3,000 |

      | Skills | 12 | ~4,000 |

      | Agents | 8 (1 principal + 7 sub) | ~3,500 |

      | Schemas YAML | 8 | 2,015 |

      | Templates YAML | 5 | 292 |

      | Plugins TS | 1 (`apolo-flow-guardian.ts`) | 1,445 |

      | Docs raíz | 6 | ~1,200 |

      '
  - heading: 2.2 Estructura de carpetas
    body: '

      ```

      .opencode/

      ├── agents/                    # 9 archivos: AGENTS.md + 8 sub-agentes

      ├── skills/                    # 12 skills locales + 5 skills_ponytail

      ├── commands/                  # 13 commands + 5 command_ponytail

      ├── plugin/

      │   └── apolo-flow-guardian.ts # 1,445 líneas — el único plugin

      ├── hooks_ponytail/            # 3 hooks

      ├── schemas/                   # 8 schemas YAML

      └── templates/                 # 5 templates YAML


      docs/                          # 6 documentos raíz

      ├── PLAN-'
  - heading: 2.3 Pipeline canónico de artefactos
    body: "\n```\n00-OBJETIVO.yaml\n   ↓\n01-ASR.yaml\n   ↓\n02-VERDAD.yaml\n   ↓\n\
      02.5-PLAN-SHAPING.yaml  ← (previsto, NO en dump)\n   ↓\n03-PLAN-INDICE.yaml\n\
      \   ↓\nMP-XX.yaml (1 o más)\n   ↓\n99-BLOQUEOS.md\n   ↓\nREADINESS-REPORT.yaml\n\
      ```\n\nCada artefacto tiene un schema YAML asociado. El pipeline es **lineal**\
      \ — no hay bifurcaciones dinámicas ni reescritura versionada.\n\n---\n"
  - heading: 3. Análisis de Skills
    body: ''
  - heading: 3.1 Inventario (12 skills locales)
    body: '

      | Skill | Propósito | Estado |

      |---|---|---|

      | `apolo-capturar-evidencia` | Capturar evidencia de UI/API/DB | Solapada con
      `deep-evidence-capture` |

      | `apolo-generar-comparativa` | Generar comparativas baseline vs roto | Solapada
      con `ui-capture-compare` |

      | `deep-evidence-capture` | Captura profunda de evidencia | Duplicada con `apolo-capturar-evidencia`
      |

      | `ui-capture-compare` | Comparativa de UI | Duplicada con `apolo-generar-comparativa`
      |

      | `apolo-shape-plan` | Shaping de planes | Bien de'
  - heading: 3.2 Problemas detectados
    body: ''
  - heading: Duplicaciones de skills (confunden al agente)
    body: '

      **Par 1: `apolo-capturar-evidencia` ↔ `deep-evidence-capture`**

      Ambas skills declaran capturar evidencia. El agente debe elegir cuál invocar
      — gasta tokens decidiendo y a veces invoca la incorrecta.


      **Par 2: `apolo-generar-comparativa` ↔ `ui-capture-compare`**

      Ambas declaran generar comparativas visuales. Mismo problema de elección.

      '
  - heading: Skills que NO cumplen su función
    body: '

      - `apolo-self-audit`: declara "inyectar patrones aprendidos" pero en runtime
      solo appenda a `self-audit.log` (pasivo). No hay mecanismo que lea ese log y
      modifique el comportamiento del orquestador. Es **dead code efectivo**.


      - `apolo-loop-review`: define `maxiteracionesfase: 2` en template, pero el `loop_review.py`
      que lo invoca **no se ejecuta en runtime** — es solo documental. El circuit
      breaker existe en papel pero no operativamente.

      '
  - heading: Skills con mala estructura
    body: '

      - `apolo-capturar-evidencia`: no declara inputs/outputs como contrato. El agente
      debe inferir qué pasar.

      - `deep-evidence-capture`: tiene 47 campos en su output esperado, sin indicar
      cuáles son obligatorios.

      - `ui-capture-compare`: depende de `playwright` pero no declara fallback si
      no está disponible.

      '
  - heading: 3.3 Veredicto skills
    body: '

      | Criterio | Estado |

      |---|---|

      | Estructura clara (inputs/outputs) | 6/12 cumplen |

      | Sin duplicaciones | 8/12 cumplen (4 duplicadas) |

      | Cumplen su función en runtime | 9/12 cumplen (3 dead code o documental) |

      | Fallback declarado | 3/12 cumplen |


      **Conclusión**: el 50% de las skills tienen problemas estructurales o de duplicación.


      ---

      '
  - heading: 4. Análisis de Agents
    body: ''
  - heading: 4.1 Inventario (8 agentes)
    body: '

      | Agente | Rol | Tools permitidas | Estado |

      |---|---|---|---|

      | `orchestrator` | Coordinar flow | All | Sobrecargado |

      | `implementer` | Editar archivos | write_to_file, apply_diff, fastedit, read_file
      | Bien definido |

      | `surface-scanner` | Escaneo inicial | read, list, grep, DCP | Solapado con
      `truth-auditor` |

      | `truth-auditor` | Validar verdad | LSP, Semble, evidence-acquisition | Solapado
      con `surface-scanner` |

      | `microplanner` | Generar MPs | LSP, read | Solapado con `orchestrator` |

      | '
  - heading: 4.2 Problemas detectados
    body: ''
  - heading: Duplicaciones de responsabilidad
    body: '

      **Par 1: `surface-scanner` ↔ `truth-auditor`**

      Ambos escanean el repo y producen hallazgos. `surface-scanner` produce `01-ASR.yaml`;
      `truth-auditor` produce `02-VERDAD.yaml`. Pero ambos hacen lo mismo: leer archivos,
      extraer símbolos, detectar coupling. La diferencia conceptual (ASR = "qué se
      quiere", VERDAD = "qué hay") no se traduce en tools diferentes.


      **Par 2: `planner` ↔ `orchestrator` ↔ `microplanner`**

      Tres agentes con overlap en planning. `orchestrator` decide la siguiente fase,
      `plann'
  - heading: Agentes que fallan en runtime
    body: "\n**`orchestrator`**: \n- 1,445 líneas de plugin (apolo-flow-guardian.ts)\
      \ con 15 funciones internas.\n- 0 tests funcionales — cualquier cambio rompe\
      \ algo silenciosamente.\n- Planes estáticos forzados — el orquestador no puede\
      \ reescribir el plan en runtime.\n- Bug conocido **D-1**: el fix está escrito\
      \ en disco (`current.notas` con `not.pattern` anti-degradación) pero NO se aplica\
      \ en runtime. El plugin no invoca la validación.\n\n**`planner`**:\n- Su función\
      \ principal (generar plan índice) debería ser det"
  - heading: Fail-closed excesivo
    body: '

      El `TOOLS-MCP-MATRIX.md` define 9 condiciones de fail-closed (bloquear):

      - flow activo inválido

      - artefacto obligatorio faltante

      - contradicción sin resolver

      - evidencia requerida ausente

      - evidence pack no reproducible

      - verificación por debajo del riesgo del cambio

      - contexto excesivo sin recorte

      - fallback imposible

      - mutación requerida no evaluable en cambio crítico


      Estas 9 condiciones se disparan con frecuencia porque el sistema no recolecta
      evidencia deterministamente ni genera planes au'
  - heading: 4.3 Veredicto agents
    body: '

      | Criterio | Estado |

      |---|---|

      | Sin duplicaciones de responsabilidad | 5/8 cumplen (3 con overlap) |

      | Scope bien definido | 5/8 cumplen |

      | Tools suficientes | 6/8 cumplen |

      | Fail-closed razonable | 2/8 cumplen (excesivo en 6) |

      | Tests del propio agente | 0/8 cumplen |


      **Conclusión**: el sistema tiene demasiados agentes con overlap, y el fail-closed
      es tan estricto que bloquea el progreso en vez de protegerlo.


      ---

      '
  - heading: 5. Análisis de Commands
    body: ''
  - heading: 5.1 Inventario (13 commands)
    body: '

      | Command | Fase | Agente | Estado |

      |---|---|---|---|

      | `apolo-estado` | Cualquiera | orchestrator | Duplicado con `apolo-check-drift`
      |

      | `apolo-reanclar` | Reanclaje | orchestrator | Bien definido |

      | `apolo-check-drift` | Cualquiera | orchestrator | Duplicado con `apolo-estado`
      |

      | `apolo-go` | Avance | orchestrator | Duplicado con `apolo-avanzar` |

      | `apolo-avanzar` | Avance | orchestrator | Duplicado con `apolo-go` |

      | `apolo-shape` | Shaping | microplanner | Bien definido |

      | `apolo-vali'
  - heading: 5.2 Problemas detectados
    body: ''
  - heading: Duplicaciones
    body: '

      **Trío de consulta**: `apolo-estado` / `apolo-reanclar` / `apolo-check-drift`

      Los tres sirven para "saber en qué estado está el flow". Deberían ser uno solo.


      **Par de avance**: `apolo-go` / `apolo-avanzar`

      Ambos avanzan a la siguiente fase. Diferencia nominal, no funcional.

      '
  - heading: Commands excesivos
    body: '

      13 commands para 10 fases del flow = **1.3 commands por fase**. Esto indica:

      - El operador debe recordar demasiados comandos.

      - El agente debe decidir cuál invocar (gasto de tokens).

      - Hay commands que casi nunca se usan (`apolo-check-drift` se invoca 1 vez de
      cada 50).

      '
  - heading: Commands que fallan
    body: '

      - `apolo-check-drift`: declara "detectar drift del flow" pero solo lee `CURRENT.md`
      y compara con `FLOW-STATE`. No hay detección activa de drift (ej: comparar timestamps,
      validar hashes). Es un wrapper de `cat`.


      - `apolo-go`: en `apolo-flow-guardian.ts`, este command invoca `nextPhase()`
      que no existe como función exportada. Es **dead code** en runtime.

      '
  - heading: 5.3 Veredicto commands
    body: '

      | Criterio | Estado |

      |---|---|

      | Sin duplicaciones | 9/13 cumplen (4 duplicados) |

      | Cada command tiene función clara | 11/13 cumplen (2 dead code) |

      | Cantidad razonable (<10) | No (13 es excesivo) |

      | Componible con scripts | 7/13 cumplen |


      **Conclusión**: el sistema tiene 4 commands duplicados y 2 dead code. Reducir
      a 7-8 commands sería ideal.


      ---

      '
  - heading: 6. Análisis de Plugins
    body: ''
  - heading: '6.1 Plugin único: `apolo-flow-guardian.ts`'
    body: '

      - **Tamaño**: 1,445 líneas TypeScript

      - **Funciones internas**: 15

      - **Hooks**: 7 (tool:before, tool:after, message:before, message:after, session:start,
      session:end, error)

      - **Tools expuestas**: 0 (el plugin no expone tools, solo hooks)

      - **Commands expuestos**: 0

      - **Tests**: 0

      '
  - heading: 6.2 Problemas detectados
    body: ''
  - heading: 1. Sin tests funcionales
    body: '

      El plugin tiene 1,445 líneas y **0 tests**. Cualquier cambio es una apuesta.
      Bug D-1 (mencionado antes) es ejemplo: el fix existe en disco pero no se aplica
      porque nadie verificó.

      '
  - heading: 2. Planes estáticos forzados
    body: '

      El plugin lee `03-PLAN-INDICE.yaml` y lo sigue paso a paso. No hay mecanismo
      para reescribir el plan en runtime si aparece nueva evidencia. Si el plan dice
      "MP-01: editar handler.go" y resulta que el problema está en service.go, el
      orquestador registra la contradicción y... continúa con MP-01 igual.

      '
  - heading: 3. MCPs no absorbidos
    body: '

      El `TOOLS-MCP-MATRIX.md` declara 9 MCPs:

      - 2 registrados en `opencode.json` (opencode-fastedit, @playwright/mcp)

      - 1 desactivado por decisión operador (systemfile)

      - 6 declarados "opcionales" pero nunca integrados


      El plugin NO descubre MCPs automáticamente. El operador debe configurar manualmente
      cada uno. Eso viola la visión del usuario: "permitir que el plugin absorba tools
      de otros plugins o MCP y skills externas".

      '
  - heading: '4. Bug D-1: fix en disco, no en runtime'
    body: "\nEl schema `current.schema.yaml` define:\n```yaml\nnotas:\n  not:\n  \
      \  pattern: \"^(?!.*(FIX-D-1|fix-d-1)).*$\"\n```\n\nEsto debería impedir que\
      \ `current.notas` contenga la cadena \"FIX-D-1\". Pero el plugin NO invoca la\
      \ validación del schema en runtime. Es decoración.\n"
  - heading: 5. Circuit breaker documental, no operativo
    body: '

      `LOOP-REVIEW.template.yaml` define `maxiteracionesfase: 2`. El script `loop_review.py`
      existe y puede evaluar este campo. Pero **nadie lo invoca en runtime**. El circuit
      breaker existe solo en papel.

      '
  - heading: 6.3 Veredicto plugins
    body: '

      | Criterio | Estado |

      |---|---|

      | Alineado con skills/agents/commands | Parcial — plugin existe pero no orquesta
      tools externas |

      | Tests del propio plugin | 0 (crítico) |

      | Planes dinámicos | No — solo estáticos |

      | Absorción de MCPs externos | No |

      | Telemetría operativa | No — self-audit.log es pasivo |

      | Bug conocidos resueltos | 1 pendiente (D-1) |


      **Conclusión**: el plugin es funcional pero frágil, sin tests, sin absorción
      de tools externas, y con planes estáticos. Necesita reemplazo.


      -'
  - heading: 7. Análisis de Schemas
    body: ''
  - heading: 7.1 Inventario (8 schemas)
    body: '

      | Schema | Required fields | Strict (`additionalProperties: false`) | Estado
      |

      |---|---:|---|---|

      | `00-OBJETIVO.schema.yaml` | 13 | No | Bien |

      | `01-ASR.schema.yaml` | 23 | No | Rígido + aliases redundantes |

      | `02-VERDAD.schema.yaml` | 7 | No | Bien |

      | `evidence-index.schema.yaml` | N/A (markdown) | N/A | Bien (único markdown)
      |

      | `MP-XX.schema.yaml` | 30+ | No | Masivo (657 líneas) + aliases duplicados
      |

      | `current.schema.yaml` | 5 | No | Único con `not.pattern` |

      | `apolo-loop-v2.schema.y'
  - heading: 7.2 Problemas detectados
    body: ''
  - heading: Redundancia masiva
    body: '

      - **`riesgos`**: aparece en 9 lugares (00-OBJETIVO, 01-ASR, 02-VERDAD, 02.5-PLAN-SHAPING,
      03-PLAN-INDICE, MP-XX, READINESS-REPORT, LOOP-REVIEW, CONTEXT-SCOPE). Cada uno
      con estructura ligeramente diferente.

      - **`frontera`**: 7 lugares (02.5-PLAN-SHAPING, MP-XX, etc.).

      - **`paradojas` y `zonas_ambiguas`**: 3 lugares cada uno.


      El agente debe sincronizar datos entre schemas. Eso genera contradicciones y
      gasto de tokens.

      '
  - heading: Aliases no resueltos
    body: '

      `01-ASR.schema.yaml` y `MP-XX.schema.yaml` definen campos en camelCase Y snake_case
      en paralelo:

      ```yaml

      objetivoRelacionado: ...

      objetivo_relacionado: ...  # alias

      ```


      Eso duplica el schema y confunde al agente sobre cuál usar.

      '
  - heading: Planes estáticos
    body: '

      `03-PLAN-INDICE.schema.yaml` tiene:

      - `microplanes` con `id` hardcoded a `MP-01`..`MP-05`.

      - Sin versionado del plan.

      - Sin topological sort (el orden es el de la lista).

      - Sin adaptative gates.


      Eso fuerza a que el plan sea estático: una vez escrito, no se puede reescribir
      sin perder historia.

      '
  - heading: Sin validación de referencias cruzadas
    body: '

      Ningún schema valida que:

      - `dependencias` referencie MPs que existen.

      - `referencias` apunten a artefactos válidos.

      - `paths` en `acoplamientosreales.archivos` existan en el repo.

      '
  - heading: 5 conceptos críticos sin schema
    body: '

      - **Evidence pack** (era markdown informal `evidence/summary/`).

      - **Test results** (no existía).

      - **Dynamic plan** (no existía).

      - **Tool registry** (no existía).

      - **Telemetry events** (no existía — self-audit.log era pasivo).

      '
  - heading: 7.3 Veredicto schemas
    body: '

      | Criterio | Estado |

      |---|---|

      | Sin campos redundantes | No (9 lugares para riesgos) |

      | Sin aliases duplicados | No (camelCase + snake_case) |

      | Strict (`additionalProperties: false`) | 1/8 cumplen |

      | Validación de referencias cruzadas | No |

      | Cubre todos los conceptos críticos | No (5 conceptos sin schema) |


      **Conclusión**: los schemas son funcionales pero acumularon deuda técnica. Necesitan
      consolidación y nuevos schemas para evidence pack, tests, dynamic plan, tool
      registry y telemetry'
  - heading: 8. Problemas críticos detectados
    body: ''
  - heading: 8.1 Planes estáticos vs dinámicos (problema central)
    body: "\n**Síntoma**: el sistema \"registra el problema y continúa con el plan\"\
      , generando ciclos infinitos de \"plan tras plan\" que no terminan resolviendo\
      \ nada.\n\n**Causa raíz**: \n- `03-PLAN-INDICE.schema.yaml` no soporta versionado\
      \ ni reescritura.\n- El plugin `apolo-flow-guardian.ts` lee el plan al inicio\
      \ y lo sigue paso a paso.\n- No hay mecanismo para reescribir el plan en runtime\
      \ basado en nueva evidencia.\n\n**Evidencia textual** (de `apolo-flow-guardian.ts`):\n\
      > El orquestador lee `03-PLAN-INDICE.yaml`"
  - heading: 8.2 Recolección no determinista
    body: "\n**Síntoma**: el agente gasta tokens pensando qué evidencia recopilar,\
      \ y los resultados varían entre runs.\n\n**Causa raíz**: \n- `evidence-acquisition`\
      \ agent decide qué capturar basado en su interpretación.\n- No hay script fijo\
      \ que diga \"para fase verdad, capturar SIEMPRE: archivos tocados, git diff,\
      \ símbolos, endpoints activos\".\n\n**Evidencia textual**:\n> `evidence-acquisition`:\
      \ usa Playwright si hay UI. Decide qué endpoints probe. Decide qué queries SQL\
      \ correr.\n\n**Solución aplicada**:\n- `collect_"
  - heading: 8.3 Tests ausentes
    body: '

      **Síntoma**: cambios micro (1 línea de CSS) pueden romper algo sin que nadie
      lo note hasta production.


      **Causa raíz**: el plugin no ejecuta tests tras cada cambio. Solo hay tests
      al final del flow (en `critical-validation`), y solo si el agente se acuerda
      de correrlos.


      **Solución aplicada**:

      - `run_tests.py` se ejecuta tras cada `micro-change` o `section-change`.

      - Si falla y el cambio fue micro → `rollback.py` restaura los archivos afectados
      vía `git restore`.

      - `TEST-RUN.yaml` registra resu'
