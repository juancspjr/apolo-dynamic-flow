- type: python
  path: scripts/python/run_tests.py
  title: run_tests
  docstring: "run_tests.py — Runner determinista de tests tras cada cambio.\n\nLee:\n\
    \  - targets (símbolos, archivos, endpoints) afectados por el cambio\n  - kind:\
    \ unit | integration | mutation | e2e | contract | schema-validation\n\nEjecuta:\n\
    \  - Descubre test files relacionados con los targets (patrones comunes)\n  -\
    \ Los ejecuta con pytest (Python), go test (Go), jest (JS/TS) según disponibilidad\n\
    \  - Si kind=mutation → ejecuta mutmut (Python) o go-mutesting (Go)\n  - Si kind=schema-validation\
    \ → valida YAMLs contra schemas\n  - Calcula hashes de stdout/stderr para comparación\
    \ determinista\n\nEscribe:\n  - TEST-RUN.yaml conforme al schema"
