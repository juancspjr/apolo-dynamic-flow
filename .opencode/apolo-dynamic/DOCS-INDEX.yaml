  docstring: "---\nname: gate-build\ndescription: >-\n  Runs configured build and\
    \ test commands in tiered order. Captures output as\n  evidence per tier. Returns\
    \ PASS, FAIL, WARN, or SKIP based on per-tier\n  verdicts. Internal gate — invoked\
    \ by verify, not directly by users.\nallowed-tools:\n  - read\n  - bash\n  - glob\n\
    \  - write\n---\n\n# Gate: Build\n\n## Goal\n\nConfirm the codebase compiles and\
    \ tests pass across all configured tiers. This\nis the most basic gate — if the\
    \ code doesn't build or tests don't pass, nothing\nelse matters.\n\n## Inputs\n\
    \n- `{projectArtifactsRoot}/config.json` -- `commands.build`, `commands.test`,\n\
    \  `commands.test:integration`, `commands.test:smoke`\n- `{repoStateRoot}/work/{selectedWork.id}/workflow.json`\
    \ -- selected work unit for evidence path\n\n## Outputs\n\n- Evidence file at\
    \ `{workDir}/evidence/build-report.md`\n- Gate status update in the selected work's\
    \ `workflow.json`: PASS, FAIL, WARN, or SKIP\n- Console output showing results\
    \ inline (users see findings, not just badges)\n\n## Constraints"
