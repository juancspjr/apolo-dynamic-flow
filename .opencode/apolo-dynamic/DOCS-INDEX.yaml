- type: markdown
  path: .specwright/protocols/approvals.md
  title: approvals
  docstring: "# Approval Protocol\n\nDefine how Specwright records durable human approval\
    \ for auditable work\nartifacts.\n\n## File Location\n\n- Work-level approval\
    \ ledger: `{workArtifactsRoot}/{workId}/approvals.md`\n- Approval state travels\
    \ with auditable artifacts, not runtime-only session\n  state.\n- `workflow.json`\
    \ is never approval truth — this is a hard invariant, not guidance.\n\n## Approval\
    \ Scopes\n\n- `design` — approves the design artifact set that `/sw-plan` consumes\n\
    - `unit-spec` — approves one unit's `spec.md` / `plan.md` / `context.md`\n- `accepted-mutant`\
    \ — approves one accepted-mutant lineage record for the\n  live `/sw-verify --accept-mutant`\
    \ flow\n\nUse one active approval entry per design or unit-spec scope. `unit-spec`\n\
    entries also carry `unitId`. `accepted-mutant` uses one active entry per\n`mutantId`.\n\
    \n## Approval Status Vocabulary\n\nOnly these status values are valid:\n\n- `APPROVED`\n\
    - `STALE`\n- `SUPERSEDED`\n\nSemantics:\n\n- `APPROVED` — a human approved the\
    \ current artifact set hash for the scope"
  sections:
  - heading: Approval Protocol
    body: '

      Define how Specwright records durable human approval for auditable work

      artifacts.

      '
  - heading: File Location
    body: "\n- Work-level approval ledger: `{workArtifactsRoot}/{workId}/approvals.md`\n\
      - Approval state travels with auditable artifacts, not runtime-only session\n\
      \  state.\n- `workflow.json` is never approval truth — this is a hard invariant,\
      \ not guidance.\n"
  - heading: Approval Scopes
    body: "\n- `design` — approves the design artifact set that `/sw-plan` consumes\n\
      - `unit-spec` — approves one unit's `spec.md` / `plan.md` / `context.md`\n-\
      \ `accepted-mutant` — approves one accepted-mutant lineage record for the\n\
      \  live `/sw-verify --accept-mutant` flow\n\nUse one active approval entry per\
      \ design or unit-spec scope. `unit-spec`\nentries also carry `unitId`. `accepted-mutant`\
      \ uses one active entry per\n`mutantId`.\n"
  - heading: Approval Status Vocabulary
    body: '

      Only these status values are valid:


      - `APPROVED`

      - `STALE`

      - `SUPERSEDED`


      Semantics:


      - `APPROVED` — a human approved the current artifact set hash for the scope

      - `STALE` — the approved artifact set hash no longer matches current contents

      - `SUPERSEDED` — a newer approval replaced an older approval for the same scope

      '
  - heading: Approval Source Classification
    body: '

      Only these source classifications are valid:


      - `command` — human-triggered lifecycle command such as `/sw-plan` or `/sw-build`

      - `review-comment` — human approval captured from a PR review or issue comment

      - `external-record` — human approval imported from another durable system

      - `headless-check` — automation validated or reported lineage but did not approve


      `headless-check` may report `STALE` or missing lineage, but it MUST NOT create

      an `APPROVED` entry.

      '
  - heading: Accepted-Mutant Lineage
    body: '

      Accepted mutants are not silent config waivers. The config list is only the

      lookup surface for the current branch; durable approval truth lives in

      `approvals.md`. The canonical config linkage is

      `config.gates.tests.mutation.acceptedMutants[]`.


      Each `accepted-mutant` entry is an auditable approval record tied to the mutant

      lineage and carries:


      - `unitId`

      - `mutantId`

      - `reason`

      - `configPath` or equivalent config linkage

      - `approvedAt`

      - `expiresAt`


      Entries missing any of these lineage fields'
  - heading: Artifact Set Hashing
    body: '

      Approval freshness is determined by a deterministic artifact-set hash:


      1. Normalize each artifact path relative to the work or unit directory.

      2. Sort the artifact paths lexically.

      3. Hash each artifact''s contents.

      4. Hash the ordered manifest of `{path, content hash}` pairs.


      The resulting `artifactSetHash` is the approval fingerprint. If any approved

      artifact changes or disappears, the approval becomes `STALE`.

      '
  - heading: Compact Freshness Reason Codes
    body: "\nHuman-readable closeout and reviewer-facing approval summaries use one\
      \ compact\nreason-code vocabulary when approval lineage is not current:\n\n\
      - `missing-entry` — no approval entry exists for the required scope\n- `artifact-set-changed`\
      \ — the approved artifact set hash no longer matches the\n  current artifacts\n\
      - `missing-lineage` — an `accepted-mutant` entry is missing required lineage\n\
      \  fields or carries an invalid `approvedAt`\n- `expired` — an `accepted-mutant`\
      \ entry has an invalid or elapsed `e"
  - heading: File Shape
    body: '

      `approvals.md` stays human-readable, but the machine-readable source of truth
      is

      the fenced JSON ledger between the approval markers.


      ````markdown'
  - heading: Approvals
    body: "\nDurable human approval checkpoints for this work.\n\n<!-- approvals-ledger:start\
      \ -->\n```json\n{\n  \"version\": \"1.0\",\n  \"entries\": [\n    {\n      \"\
      scope\": \"design\",\n      \"unitId\": null,\n      \"status\": \"APPROVED\"\
      ,\n      \"source\": {\n        \"classification\": \"command\",\n        \"\
      ref\": \"/sw-plan\"\n      },\n      \"artifactSetHash\": \"sha256:...\",\n\
      \      \"artifacts\": [\"design.md\", \"context.md\", \"decisions.md\"],\n \
      \     \"approvedAt\": \"2026-04-15T00:00:00Z\",\n      \"notes\": null\n   \
      \ },\n    {\n      \"scope\": \"acce"
  - heading: Lifecycle Responsibilities
    body: "\n- `sw-design` identifies the design artifact set awaiting approval. It\
      \ does not\n  write an `APPROVED` entry on its own.\n- `sw-plan` records design\
      \ approval on entry when a human triggered `/sw-plan`.\n  In headless mode it\
      \ must validate an existing human approval instead of\n  fabricating one.\n\
      - `sw-pivot` reassesses design freshness when work-level artifacts change and\n\
      \  reassesses `unit-spec` freshness when current or remaining unit artifacts\n\
      \  change. It preserves the stale lineage with compac"
  - heading: Shared Helper Contract
    body: "\nShared approval helpers must provide deterministic support for:\n\n-\
      \ artifact-set hashing\n- parsing and serializing `approvals.md`\n- recording\
      \ a new approval entry while marking older entries for the same scope\n  as\
      \ `SUPERSEDED`\n- recording or refreshing `accepted-mutant` entries without\
      \ collapsing them\n  into a silent config-only waiver\n- validating approval\
      \ freshness against current artifacts\n- assessing both `design` and `unit-spec`\
      \ entries against pivoted artifact sets\n  without special-case "
