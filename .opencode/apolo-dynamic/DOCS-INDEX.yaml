- type: python
  path: scripts/python/index_codebase.py
  title: index_codebase
  docstring: "index_codebase.py — Indexador semántico de código basado en AST.\n\n\
    GAP 1: Rapidez de comprensión de código sin discrepancia.\n\nGenera `.opencode/apolo-dynamic/CODE-INDEX.yaml`\
    \ con un índice liviano de:\n  - Funciones/clases/interfaces exportadas con sus\
    \ firmas\n  - Imports (dependencias directas)\n  - Última modificación git\n \
    \ - Hash de contenido (para detectar cambios sin releer)\n  - Resumen de 2 líneas\
    \ generado por AST (no por LLM)\n\nEl agente consulta CODE-INDEX.yaml en vez de\
    \ leer archivos directos\n-> 10x menos tokens por comprensión de estructura.\n\
    \nSoporta: Python (.py via `ast`), TypeScript/JavaScript (.ts/.tsx/.js/.jsx via\
    \ regex\ncon patrones de export), Go (.go via regex). Otros archivos se registran\n\
    solo con hash + size + git-mtime.\n\nUso:\n  python3 index_codebase.py --repo-root\
    \ /path --output CODE-INDEX.yaml\n  python3 index_codebase.py --repo-root /path\
    \ --output CODE-INDEX.yaml \\\n    --include \"src/**/*.ts\" --exclude \"node_modules/**\""
  examples:
  - "python3 index_codebase.py --repo-root /path --output CODE-INDEX.yaml\n  python3\
    \ index_codebase.py --repo-root /path --output CODE-INDEX.yaml \\\\\n    --include\
    \ \"src/**/*.ts\" --exclude \"node_modules/**\""
