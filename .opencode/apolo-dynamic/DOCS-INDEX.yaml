- type: python
  path: scripts/python/agent_honesty_enforcer.py
  title: agent_honesty_enforcer
  docstring: "agent_honesty_enforcer.py — Previene que los agentes se autoengañen\
    \ (v3.5.0).\n\nRESPONDE a tu pregunta: \"que los agentes no se autoengañen\"\n\
    \nUn agente se autoengaña cuando:\n  1. Declara \"done\" sin evidence pack valido\n\
    \  2. Declara \"tests pass\" sin haber ejecutado tests\n  3. Declara \"implementado\"\
    \ sin archivos creados\n  4. Omite errores de telemetry (silent fail)\n  5. Declara\
    \ \"success\" con score < threshold\n  6. Reporta \"fix aplicado\" sin visual\
    \ diff que lo confirme\n\nEste script verifica que cada declaracion del agente\
    \ este respaldada por\nevidencia objetiva. Si no lo esta, BLOQUEA al agente.\n\
    \nCLI:\n  python3 agent_honesty_enforcer.py verify --flowid X --repo-root .\n\
    \  python3 agent_honesty_enforcer.py verify-claim --flowid X --claim \"done\"\
    \ --repo-root .\n  python3 agent_honesty_enforcer.py verify-claim --flowid X --claim\
    \ \"tests_pass\" --repo-root ."
