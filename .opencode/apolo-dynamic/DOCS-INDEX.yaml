- type: python
  path: scripts/python/evidence_replay.py
  title: evidence_replay
  docstring: "evidence_replay.py — Replay de evidencia: reproducir un bug paso a paso\
    \ (v3.1.0).\n\nCierra el GAP #5 del INTEGRATION-VERDICT.md:\n  \"Replay de evidencia\
    \ (reproducir un bug paso a paso desde el audit log)\"\n\nPermite reproducir un\
    \ bug paso a paso desde el audit log (telemetry.jsonl +\nDEBUG-TRACE.jsonl). Construye\
    \ una linea de tiempo con todos los eventos\nque llevaron a un fallo, permitiendo\
    \ al agente entender exactamente que\npaso, cuando, y por que.\n\nCLI:\n  # Listar\
    \ flows con telemetry disponible\n  python3 evidence_replay.py flows --repo-root\
    \ .\n\n  # Construir timeline de un flow\n  python3 evidence_replay.py timeline\
    \ --flowid APOLO-X --output timeline.yaml\n\n  # Filtrar por tipo de evento\n\
    \  python3 evidence_replay.py timeline --flowid APOLO-X --filter kind=tool-invoked\n\
    \n  # Replay de un bug especifico (busca el primer error en telemetry)\n  python3\
    \ evidence_replay.py bug --flowid APOLO-X --output BUG-REPLAY.yaml\n\n  # Replay\
    \ con pasos detallados\n  python3 evidence_replay.py bug --flowid APOLO-X"
