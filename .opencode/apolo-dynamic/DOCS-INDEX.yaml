- type: python
  path: scripts/python/auto_hooks.py
  title: auto_hooks
  docstring: "auto_hooks.py — Ejecuta scripts Python automáticamente según el contexto\
    \ (v3.1.0).\n\nEXTENDIDO en v3.1.0: 4 nuevos triggers para integrar los nuevos\
    \ scripts:\n  - evidence:baseline-captured → capturar diff baseline (v3.1.0)\n\
    \  - evidence:broken-captured → construir bug replay (v3.1.0)\n  - evidence:post-fix-captured\
