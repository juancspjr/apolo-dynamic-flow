  docstring: "---\nname: sw-adopt\ndescription: >-\n  Explicitly adopt an existing\
    \ work into the current worktree after validating\n  live ownership, stale sessions,\
    \ and branch consistency.\nargument-hint: \"<work-id>\"\nallowed-tools:\n  - read\n\
    \  - write\n  - bash\n  - glob\n---\n\n# Specwright Adopt\n\n## Goal\n\nAttach\
    \ an existing work to the current worktree without creating split-brain\nownership.\
    \ This skill attaches only the current worktree session.\n\n## Inputs\n\n- target\
    \ work ID from the argument, or the current worktree session's\n  `attachedWorkId`\
    \ when re-adopting the already-selected work\n- `{worktreeStateRoot}/session.json`\
    \ for the current worktree\n- `{repoStateRoot}/work/{workId}/workflow.json`\n\
    - repo-wide `session.json` files discovered via `git worktree list --porcelain`\n\
    \n## Outputs\n\n- updated `{worktreeStateRoot}/session.json` for the current worktree\
    \ only\n- updated selected work `workflow.json.attachment` pointing at the current\n\
    \  worktree when adoption succeeds\n- concise outcome explaining whether the "
  sections:
  - heading: Specwright Adopt
    body: ''
  - heading: Goal
    body: '

      Attach an existing work to the current worktree without creating split-brain

      ownership. This skill attaches only the current worktree session.

      '
  - heading: Inputs
    body: "\n- target work ID from the argument, or the current worktree session's\n\
      \  `attachedWorkId` when re-adopting the already-selected work\n- `{worktreeStateRoot}/session.json`\
      \ for the current worktree\n- `{repoStateRoot}/work/{workId}/workflow.json`\n\
      - repo-wide `session.json` files discovered via `git worktree list --porcelain`\n"
  - heading: Outputs
    body: "\n- updated `{worktreeStateRoot}/session.json` for the current worktree\
      \ only\n- updated selected work `workflow.json.attachment` pointing at the current\n\
      \  worktree when adoption succeeds\n- concise outcome explaining whether the\
      \ work was adopted, blocked by a live\n  owner, or blocked by branch mismatch\n"
  - heading: Constraints
    body: "\n**Scope (LOW freedom):**\n- `/sw-adopt` is the explicit same-work adoption\
      \ flow. It must not silently run\n  during `/sw-design`, `/sw-plan`, `/sw-build`,\
      \ `/sw-verify`, or `/sw-ship`.\n- `/sw-adopt` never rewrites another worktree's\
      \ `session.json`.\n- Subordinate sessions must not run `/sw-adopt`.\n\n**Target\
      \ resolution (LOW freedom):**\n- Resolve the target work from the argument first,\
      \ then the current worktree's\n  `session.json.attachedWorkId` as a fallback.\n\
      - Validate that the target work exists u"
  - heading: Protocol References
    body: '

      - `.specwright/protocols/state.md` -- live ownership, attachment validation,
      subordinate rules

      - `.specwright/protocols/context.md` -- logical roots and session discovery

      - `.specwright/protocols/git.md` -- recorded branch context

      '
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |-----------|--------|

      | No target work resolves | STOP: "Pass a work ID or run /sw-design first."
      |

      | Target work does not exist | STOP with a missing-work error |

      | Current session is subordinate | STOP: "Subordinate helper sessions cannot
      adopt work." |

      | Another live top-level worktree owns the target work | STOP with live-owner
      guidance |

      | Recorded branch mismatch for in-flight work | STOP with branch-consistency
      guidance |

      '
