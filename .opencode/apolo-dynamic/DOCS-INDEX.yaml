  path: INTEGRATION-VERDICT.md
  title: INTEGRATION-VERDICT
  docstring: '# INTEGRATION VERDICT — apolo-dynamic-flow v2.8.1


    **Fecha del análisis:** 2026-06-22

    **Versión analizada:** v2.8.0 → v2.8.1 (con fix + 3 GAPs cerrados)

    **Metodología:** Ejecución del script `integration_validation.py` sobre el repositorio
    mismo como objetivo, captura de outputs YAML reales, verificación de telemetría,
    análisis de tests.


    ---


    ## Veredicto Ejecutivo


    El sistema **funciona end-to-end en su capa determinista**, pero la participación
    del agente está **mal delimitada**: de 39 scripts en `scripts/python/`, solo **11
    son invocados automáticamente** por el loop engine TS; los otros **28 requieren
    invocación manual por el agente**. Esto significa que el 72% del valor del sistema
    depende de que el agente sepa qué script llamar y cuándo.


    Hay **5 puntos donde el control se pierde o el agente toma decisiones sin evidencia
    suficiente**, identificados honestamente más abajo.


    ---


    ## 1. Flow Completo — Outputs Reales Capturados


    El script `integration_validation.py` (nuevo en v2.8.'
  sections:
  - heading: INTEGRATION VERDICT — apolo-dynamic-flow v2.8.1
    body: '

      **Fecha del análisis:** 2026-06-22

      **Versión analizada:** v2.8.0 → v2.8.1 (con fix + 3 GAPs cerrados)

      **Metodología:** Ejecución del script `integration_validation.py` sobre el repositorio
      mismo como objetivo, captura de outputs YAML reales, verificación de telemetría,
      análisis de tests.


      ---

      '
  - heading: Veredicto Ejecutivo
    body: '

      El sistema **funciona end-to-end en su capa determinista**, pero la participación
      del agente está **mal delimitada**: de 39 scripts en `scripts/python/`, solo
      **11 son invocados automáticamente** por el loop engine TS; los otros **28 requieren
      invocación manual por el agente**. Esto significa que el 72% del valor del sistema
      depende de que el agente sepa qué script llamar y cuándo.


      Hay **5 puntos donde el control se pierde o el agente toma decisiones sin evidencia
      suficiente**, identificados h'
  - heading: 1. Flow Completo — Outputs Reales Capturados
    body: '

      El script `integration_validation.py` (nuevo en v2.8.1) ejecuta 7 fases en orden
      y captura el YAML real de cada una. Resultados contra `apolo-dynamic-flow` como
      objetivo:


      | Fase | Script invocado | Output YAML | Estado |

      |------|----------------|-------------|--------|

      | 1. init | `apolo-inspect.sh init-flow` | `FLOW-STATE.yaml` | ✓ Crea directorio
      del flow |

      | 2. index | `index_codebase.py` | `CODE-INDEX.yaml` (3KB+) | ✓ AST real con
      símbolos |

      | 3. collect | `collect_evidence.py` | `EVIDENCE'
  - heading: 2. Telemetry.jsonl — Registra Decisiones con Timestamps
    body: '

      El loop engine TS escribe `telemetry.jsonl` (una línea JSON por evento). Verificación:


      - **Existencia:** ✓ Se crea en `plan/active/<FLOW-ID>/telemetry.jsonl`

      - **Formato:** ✓ Una línea JSON por evento, append-only

      - **Campos requeridos:** `at` (timestamp ISO 8601 con Z), `flowid`, `kind`,
      `phase`, `severity`, `message`

      - **Timestamps:** ✓ Formato `2026-06-22T00:26:29Z` (UTC, sortable)


      **Limitación identificada:** Telemetry **solo registra lo que el TS layer reporta**.
      Si un script Python fall'
  - heading: '3. Tests: ¿Contratos de Integración o Scripts Aislados?'
    body: '

      Análisis heurístico de los tests existentes:


      | Métrica | Valor |

      |---------|-------|

      | Total archivos de test | 6 (Python) + 1 (TypeScript) |

      | Tests de integración (referencian 2+ scripts) | 1 |

      | Tests aislados (referencian 1 o 0 scripts) | 5 |

      | **Ratio de integración** | **17%** |


      **Veredicto:** La mayoría de los tests son **smoke tests aislados** que hacen
      `grep -q success` sobre el stdout de un script individual. **No validan contratos
      de integración** entre capas (e.g., "el evidence pa'
  - heading: 4. Scripts Automáticos vs Manuales — Conteo Honesto
    body: ''
  - heading: Automáticos (11 scripts) — Invocados por el loop engine TS
    body: '

      | Script | Fase | Trigger |

      |--------|------|---------|

      | `index_codebase.py` | plan-indice | Loop la invoca para construir CODE-INDEX
      |

      | `collect_evidence.py` | verdad | Loop la invoca con scope paths del diff |

      | `score_evidence.py` | verdad | Loop la invoca para gate: score >= threshold
      |

      | `generate_plan.py` | plan-indice | Loop la invoca (3 modos: deterministic/hybrid/manual)
      |

      | `predict_impact.py` | plan-indice | Loop la invoca después de generate_plan
      |

      | `scaffold_impl.py` | reanclaje'
  - heading: Manuales (28 scripts) — Requieren que el agente los llame explícitamente
    body: '

      | Script | Cuándo debería invocarse | Por qué es manual |

      |--------|--------------------------|-------------------|

      | `code_quality.py` | Antes de implementar | El agente decide si analizar calidad
      |

      | `test_coverage.py` | Después de implementar | El agente decide si medir coverage
      |

      | `lsp_integration.py` | Durante análisis | El agente lo usa para find-references
      |

      | `vulnerability_scanner.py` | Auditoría de seguridad | El agente decide cuándo
      escanear CVEs |

      | `code_smells.py` | Auditoría de '
  - heading: 5. Puntos de Pérdida de Control
    body: '

      Estos son los 5 puntos donde el control se pierde o el agente toma decisiones
      sin evidencia suficiente:

      '
  - heading: '5.1 [SEVERIDAD: ALTA] Selección de U-NN para `scaffold_impl.py`'
    body: '

      **Problema:** Cuando el plan tiene 10 unidades (U-01 a U-10), el agente decide
      cuál implementar primero. El sistema no prioriza automáticamente basándose en:

      - Impacto predicho (`predict_impact.py` output)

      - Criticidad del símbolo

      - Dependencias topológicas


      **Evidencia:** El plan YAML tiene `topological_sort` con dependencias, pero
      `scaffold_impl.py` acepta `--unit-id` como argumento libre — el agente puede
      pedir U-07 antes que U-01.


      **Fix propuesto:** El loop engine debería llamar `scaffold_'
  - heading: '5.2 [SEVERIDAD: ALTA] Invocación de scripts manuales (28 scripts)'
    body: '

      **Problema:** 28 scripts requieren invocación manual. El sistema no los ejecuta
      automáticamente en función del contexto. Por ejemplo:

      - Después de `collect_evidence`, el sistema no ejecuta automáticamente `code_quality.py`
      sobre los paths del scope.

      - Después de `scaffold_impl`, el sistema no ejecuta automáticamente `vulnerability_scanner.py`
      sobre el scaffold.

      - Después de implementar, el sistema no ejecuta automáticamente `test_coverage.py`.


      **Evidencia:** No hay un manifiesto de "hooks" que'
  - heading: '5.3 [SEVERIDAD: ALTA] Silent failures en scripts Python'
    body: '

      **Problema:** Si un script Python falla silenciosamente (retorna YAML vacío
      pero exit code 0), el loop engine TS puede avanzar de fase sin evidencia real.
      `telemetry.jsonl` solo registra lo que el TS layer reporta, no lo que el script
      Python realmente produjo.


      **Evidencia:** En el test de integración, `collect_evidence.py` retorna `success:
      true` incluso si `items: 0`. El gate de score_evidence debería rechazar evidence
      packs vacíos.


      **Fix propuesto:** Añadir validación post-script en el loop'
  - heading: '5.4 [SEVERIDAD: MEDIA] Elección de method en `generate_plan.py`'
    body: '

      **Problema:** El agente elige `deterministic` / `hybrid` / `manual` sin evidencia
      cuantitativa que justifique la elección. El sistema no impone un method por
      defecto basado en el score de evidencia.


      **Evidencia:** Si `score_evidence.py` retorna score < 0.4 (evidencia débil),
      el sistema debería forzar `method=manual` (el agente debe decidir manualmente).
      Si score > 0.8 (evidencia fuerte), debería forzar `method=deterministic`.


      **Fix propuesto:** Hacer que `generate_plan.py` lea `EVIDENCE-SCORE'
  - heading: '5.5 [SEVERIDAD: MEDIA] Thresholds hardcoded en gates'
    body: "\n**Problema:** Los thresholds de score_evidence (e.g., `>= 0.6 para avanzar`)\
      \ están hardcoded en TS, no son ajustables por flow ni por proyecto.\n\n**Evidencia:**\
      \ Buscar en `plugin/state-machine.ts` y `plugin/core/loop-engine-tree.ts` constantes\
      \ como `MIN_EVIDENCE_SCORE = 0.6`.\n\n**Fix propuesto:** Mover thresholds a\
      \ `apolo-config.yaml` (configurable por proyecto):\n```yaml\ngates:\n  verdad:\n\
      \    min_score: 0.6\n    min_items: 1\n  reanclaje:\n    require_scaffold_concrete:\
      \ true\n```\n\n---\n"
  - heading: 6. ¿El Flujo Produce Artefactos Útiles y Consistentes?
    body: '

      **SÍ** para las fases 1-6 (init, index, collect, score, plan, impact):

      - Cada fase produce un YAML con campos esperados.

      - Los handoffs entre scripts funcionan (output de uno es input del siguiente).

      - Hash chain garantiza integridad de evidencia.


      **NO** para la fase 7 (scaffold):

      - El YAML producido es abstracto (descripción de la unidad, no andamio accionable).

      - No contiene `files_to_create`, `files_to_modify`, ni `commands`.

      - El agente tiene que improvisar el andamio basándose en el plan,'
  - heading: 7. ¿Está Bien Delimitada la Participación del Agente vs la del Sistema?
    body: '

      **PARCIALMENTE.** El sistema determinista maneja bien:

      - Recolección de evidencia (`collect_evidence.py`)

      - Scoring (`score_evidence.py`)

      - Generación de plan (`generate_plan.py`)

      - Predicción de impacto (`predict_impact.py`)

      - Validación de artifacts (`validate_artifact.py`)


      El agente maneja bien:

      - Decisión de qué implementar (con el plan como input)

      - Invocación de herramientas de calidad (code_quality, vulnerability_scanner)

      - Refactoring y generación de código

      - Debugging y feedback


      **Pe'
  - heading: 8. Conclusión y Próximos Pasos
    body: ''
  - heading: 'Lo que funciona bien (mantener):'
    body: '1. Arquitectura de 3 capas (Infrastructure / Deterministic / Intelligence)

      2. Recolección híbrida de evidencia (scripts + agente)

      3. Hash chain en audit log

      4. Allowlist + SSRF protection

      5. Self-healing y semantic search

      6. Cross-language analysis y function summaries

      '
  - heading: 'Lo que necesita mejora (roadmap v2.9.0+):'
    body: '1. **Auto-hooks:** scripts manuales deben invocarse automáticamente según
      el contexto (alta prioridad)

