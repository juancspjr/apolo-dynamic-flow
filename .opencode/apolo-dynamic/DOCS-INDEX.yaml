  docstring: "feedback_loop.py — Loop de feedback con el usuario (v2.8.1).\n\nCierra\
    \ el GAP #10: \"Feedback loop con el usuario (apolo-feedback)\".\n\nPermite al\
    \ usuario registrar feedback cualitativo en cualquier punto del flow:\n  - Por\
    \ flow completo (\"el flow X fue útil\")\n  - Por fase (\"la fase reanclaje tomó\
    \ demasiado\")\n  - Por símbolo/artefacto (\"el scaffold de U-03 fue incorrecto\"\
    )\n  - Por sugerencia del sistema (\"la recomendación de self_healing no aplicaba\"\
    )\n\nEl feedback se almacena en .opencode/apolo-dynamic/FEEDBACK.jsonl (append-only,\n\
    un JSON por línea) y se agrega al contexto de self_healing.py para que el\nsistema\
    \ aprenda de preferencias del usuario.\n\nCLI:\n  # Registrar feedback\n  python3\
    \ feedback_loop.py add \\\n      --flowid APOLO-001 \\\n      --phase reanclaje\
    \ \\\n      --rating 4 \\\n      --comment \"El scaffold fue bueno pero faltó\
    \ incluir tests\" \\\n      --tags scaffold,tests\n\n  # Listar feedback de un\
    \ flow\n  python3 feedback_loop.py list --flowid APOLO-001\n\n  # Agregar para\
    \ self-healing (resume"
