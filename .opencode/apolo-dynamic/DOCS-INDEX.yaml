  - heading: 'Gate: Spec Compliance'
    body: ''
  - heading: Goal
    body: '

      Prove that the implementation actually does what was asked for. Every

      acceptance criterion in the spec must map to implementation evidence

      (file:line) and test evidence (test name at file:line). This is the gate

      that closes the loop.

      '
  - heading: Inputs
    body: '

      - `{workDir}/spec.md` -- acceptance criteria

      - `{repoStateRoot}/work/{selectedWork.id}/workflow.json` -- selected work unit

      - The codebase (implementation and tests)

      '
  - heading: Outputs
    body: "\n- Evidence file at `{workDir}/evidence/spec-compliance.md`\n- Compliance\
      \ matrix: each criterion → implementation ref + test ref + status\n- Gate status\
      \ in the selected work's `workflow.json`\n- The compliance matrix remains the\
      \ canonical AC / IC proof surface that\n  downstream `review-packet.md` synthesis\
      \ summarizes or references\n"
  - heading: Constraints
    body: "\n**Criteria extraction (LOW freedom):**\n- Parse spec.md for all acceptance\
      \ criteria (lines matching `- [ ] AC-*`).\n- Number them. Every single one must\
      \ be mapped. No skipping.\n- On the final work unit of a multi-WU design: also\
      \ parse behavioral integration\n  criteria (IC-B{n} entries) from `integration-criteria.md`\
      \ in the design-level\n  directory. IC-B entries are added to the compliance\
      \ matrix alongside ACs. When\n  not on the final work unit, when `integration-criteria.md`\
      \ does not exist, or\n  "
  - heading: Protocol References
    body: '

      - `.specwright/protocols/evidence.md#verdict-rendering` -- verdict rendering
      and self-critique

      - `.specwright/protocols/evidence.md` -- evidence storage

      - `.specwright/protocols/state.md` -- gate status updates

      - `.specwright/protocols/delegation.md` -- reviewer agent delegation

      '
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |-----------|--------|

      | No spec.md found | Gate ERROR: "No spec found for this work unit" |

      | No acceptance criteria in spec | Gate ERROR: "Spec has no acceptance criteria"
      |

      | Implementation exists but tests don''t | WARN per criterion, gate WARN overall
      |

      | Can''t determine mapping with confidence | FAIL the criterion. Don''t guess.
      |

      '
