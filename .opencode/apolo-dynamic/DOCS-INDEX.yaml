- type: python
  path: scripts/python/hooks_validator.py
  title: hooks_validator
  docstring: "hooks_validator.py — Verifica que el mecanismo de hooks de OpenCode\
    \ está activo (v2.9.0).\n\nResponde a la pregunta del usuario:\n  \"solicito un\
    \ mecanismo que verifique primero que funciona el mecanismo de hook\n   de opencode\
    \ se instaló el plugin opencode-hook pero hay que asegurar\"\n\nVerifica 7 capas:\n\
    \  1. opencode binary disponible (PATH, npm global, bun global)\n  2. opencode.json\
    \ presente y válido en el repo\n  3. Plugin apolo-dynamic-flow cargado en opencode.json\n\
    \  4. Plugin compilado (dist/ existe y tiene index.js)\n  5. Hooks registrados\
    \ en plugin/index.ts (tool:execute:before, tool:execute:after, session:start)\n\
    \  6. MCPs configurados (opencode-fastedit, @playwright/mcp, etc.)\n  7. Test\
    \ funcional: invoca un hook con payload mock y verifica respuesta\n\nCLI:\n  python3\
    \ hooks_validator.py --repo-root .\n  python3 hooks_validator.py --repo-root .\
    \ --json\n  python3 hooks_validator.py --repo-root . --fix   # intenta reparar\
    \ problemas menores"
