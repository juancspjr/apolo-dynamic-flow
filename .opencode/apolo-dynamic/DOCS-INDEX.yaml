  title: SKILL
  docstring: "---\nname: gate-tests\ndescription: >-\n  Audits test quality — assertion\
    \ strength, boundary coverage, mock\n  discipline, error path testing. Delegates\
    \ to the tester agent for\n  adversarial analysis. Internal gate — invoked by\
    \ verify.\nallowed-tools:\n  - read\n  - bash\n  - glob\n  - grep\n  - write\n\
    \  - Task\n---\n\n# Gate: Test Quality\n\n## Goal\n\nEnsure tests are actually\
    \ worth having. Passing tests that don't catch bugs\nare worse than no tests —\
    \ they create false confidence. This gate audits\ntest quality, not just pass/fail.\n\
    \n## Inputs\n\n- `{projectArtifactsRoot}/config.json` -- test commands, project\
    \ language\n- `{projectArtifactsRoot}/TESTING.md` -- testing strategy with boundary\
    \ classifications (optional)\n- `{repoStateRoot}/work/{selectedWork.id}/workflow.json`\
    \ -- selected work unit\n- Test files in the codebase\n\n## Outputs\n\n- Evidence\
    \ file at `{workDir}/evidence/test-quality.md`\n- Gate status in the selected\
    \ work's `workflow.json`\n- Findings organized by category with specific file:line\
    \ referen"
  sections:
  - heading: 'Gate: Test Quality'
    body: ''
  - heading: Goal
    body: '

      Ensure tests are actually worth having. Passing tests that don''t catch bugs

      are worse than no tests — they create false confidence. This gate audits

      test quality, not just pass/fail.

      '
  - heading: Inputs
    body: '

      - `{projectArtifactsRoot}/config.json` -- test commands, project language

      - `{projectArtifactsRoot}/TESTING.md` -- testing strategy with boundary classifications
      (optional)

      - `{repoStateRoot}/work/{selectedWork.id}/workflow.json` -- selected work unit

      - Test files in the codebase

      '
  - heading: Outputs
    body: '

      - Evidence file at `{workDir}/evidence/test-quality.md`

      - Gate status in the selected work''s `workflow.json`

      - Findings organized by category with specific file:line references

      '
  - heading: Constraints
    body: "\n**Scope (MEDIUM freedom):**\n- Focus on test files related to the current\
      \ work unit.\n- Identify test files via convention (test/, __tests__/, *.test.*,\
      \ *.spec.*).\n\n**Analysis (HIGH freedom):**\n- Delegate to `specwright-tester`\
      \ agent for adversarial test quality review.\n- The tester evaluates against\
      \ these quality dimensions:\n  - **Assertion strength**: Are assertions specific?\
      \ (`toBe(42)` vs `toBeDefined()`)\n  - **Boundary coverage**: Are edge cases\
      \ tested? (empty, null, max, negative)\n  - **Moc"
  - heading: Protocol References
    body: '

      - `.specwright/protocols/evidence.md#verdict-rendering` -- verdict rendering

      - `.specwright/protocols/evidence.md` -- evidence storage

      - `.specwright/protocols/state.md` -- gate status updates

      - `.specwright/protocols/delegation.md` -- tester agent delegation

      - `.specwright/protocols/testing-strategy.md` -- boundary classifications for
      mock-vs-integration validation

      '
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |-----------|--------|

      | No test files found | Gate FAIL: "No tests found for this work unit" |

      | Tester agent unavailable | Fall back to inline analysis (less thorough) |

      | Project has no test framework | Gate SKIP with note |

      '
