  path: .specwright/protocols/build-context.md
  title: build-context
  docstring: "# Build Context Protocol\n\nContinuation snapshots, status cards, and\
    \ context nudge for sw-build.\n\n## Continuation Snapshot\n\nAfter each task commit,\
    \ write `{worktreeStateRoot}/continuation.md`: current unit, task just completed,\
    \ key files modified, remaining tasks. Overwrites each time.\n\n## Status Card\n\
    \nAfter each task commit, emit a status card:\n\n```\n───────────────────────────────────────\n\
    ✓ {task-id} committed — {task name}\n  Progress: {n} of {total} tasks complete\n\
    \  Next:     {next-task-id} — {next task name}\n  Ahead:    {remaining task ids\
    \ and names}\n───────────────────────────────────────\n```\n\n## Context Nudge\n\
    \nAfter the 3rd completed task, if 4+ tasks remain, append to the status card:\n\
    \"Context growing — consider /clear. I'll recover from workflow.json.\"\n\n##\
    \ Repo Map\n\nLightweight codebase context injected into agent delegation prompts.\n\
    \n**Generation timing:** Before the first task in sw-build (after branch setup,\
    \ before\nthe TDD loop begins).\n\n**Storage:** `{currentWork.workDir}/rep"
  sections:
  - heading: Build Context Protocol
    body: '

      Continuation snapshots, status cards, and context nudge for sw-build.

      '
  - heading: Continuation Snapshot
    body: '

      After each task commit, write `{worktreeStateRoot}/continuation.md`: current
      unit, task just completed, key files modified, remaining tasks. Overwrites each
      time.

      '
  - heading: Status Card
    body: "\nAfter each task commit, emit a status card:\n\n```\n───────────────────────────────────────\n\
      ✓ {task-id} committed — {task name}\n  Progress: {n} of {total} tasks complete\n\
      \  Next:     {next-task-id} — {next task name}\n  Ahead:    {remaining task\
      \ ids and names}\n───────────────────────────────────────\n```\n"
  - heading: Context Nudge
    body: '

      After the 3rd completed task, if 4+ tasks remain, append to the status card:

      "Context growing — consider /clear. I''ll recover from workflow.json."

      '
  - heading: Repo Map
    body: "\nLightweight codebase context injected into agent delegation prompts.\n\
      \n**Generation timing:** Before the first task in sw-build (after branch setup,\
      \ before\nthe TDD loop begins).\n\n**Storage:** `{currentWork.workDir}/repo-map.md`\
      \ — ephemeral, regenerated per build.\n\n**Injection method (dual-channel):**\n\
      1. **Context envelope** (primary): sw-build includes repo-map.md content at\
      \ the TOP of\n   each delegation prompt (before task details, ACs, and instructions).\
      \ Longform data\n   first improves respons"
  - heading: Feedback Log
    body: '

      Accumulated per-task semantic findings from the micro-check step.


      **Location:** `{currentWork.workDir}/feedback-log.md` — ephemeral, per-build.


      **Accumulation:** Each micro-check appends to the file (does not overwrite).


      **Per-task format:**

      ```markdown'
  - heading: 'Task: {task-id}'
    body: '- **{category}** ({file}:{line}): {description}

      - **{category}** ({file}:{line}): {description}

      ```


      When no findings exist for a task, no section is appended. When no tasks produce

      findings across the entire build, the file does not exist or is empty.

      '
  - heading: Correction Summary
    body: '

      Compressed quality corrections that survive context compaction.


      **Generation method:** Observation masking — deduplicate findings by category,
      keep

      only unique violation patterns with occurrence counts. Do NOT use LLM summarization

      (research shows summarization increases trajectory length 13-15% by smoothing

      failure signals).


      **Deterministic instruction** (for the PreCompact agent prompt): "List each
      unique

      violation category exactly once with its occurrence count. Do not rephrase,

      summarize,'
  - heading: Correction Summary
    body: 'Unique violations seen in this build (avoid these patterns):

      - unchecked-error (3 occurrences): Always check return values from async calls

      - bare-except (1 occurrence): Use specific exception types

      ```


      **Injection point:** Written to `{worktreeStateRoot}/continuation.md` during
      PreCompact.

      Read and injected by the SessionStart hook on the `compact` trigger.


      **When feedback-log.md is absent or empty:** No Correction Summary section is
      written.

      The existing continuation snapshot content is unaf'
  - heading: Pause Handling
    body: '

      If user responds "stop" or "pause" to a status card: halt cleanly.

      Advise: `/sw-pivot` if the plan changed, `/sw-build` to resume.

      '
