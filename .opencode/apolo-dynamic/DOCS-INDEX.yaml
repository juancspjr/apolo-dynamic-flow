- type: python
  path: scripts/python/secret_scanner.py
  title: secret_scanner
  docstring: "secret_scanner.py — Detector de secretos en evidencia y artifacts.\n\
    \nv2.4.0: Escanea contenido antes de escribirlo a EVIDENCE-PACK.yaml o\ncualquier\
    \ artifact que vaya a logs. Si detecta secretos, los REDACTA.\n\nUsa patrones\
    \ regex de security_config.yaml (no depende de detect-secrets\nni trufflehog externos\
    \ — los patrones están integrados para cero dependencias).\n\nPatrones detectados:\n\
    \  - API keys genéricas\n  - AWS Access Key / Secret Key\n  - GitHub tokens (ghp_,\
    \ gho_, ghs_, ghu_, ghr_)\n  - Bearer tokens\n  - Private keys (PEM)\n  - Database\
    \ connection strings\n  - JWT tokens\n  - Generic passwords\n  - Slack tokens\n\
    \  - Stripe keys\n\nUso:\n  # Escanear un archivo\n  python3 secret_scanner.py\
    \ --scan-file path/to/file.yaml\n\n  # Escanear un texto (stdin)\n  echo \"api_key=abc123...\"\
    \ | python3 secret_scanner.py --scan-stdin\n\n  # Escanear y redactar (devuelve\
    \ el texto con secretos reemplazados)\n  python3 secret_scanner.py --scan-file\
    \ file.yaml --redact --output file_redacted.yaml\n\n  # Como lib: from secre"
  examples:
  - "# Escanear un archivo\n  python3 secret_scanner.py --scan-file path/to/file.yaml\n\
    \n  # Escanear un texto (stdin)\n  echo \"api_key=abc123...\" | python3 secret_scanner.py\
    \ --scan-stdin\n\n  # Escanear y redactar (devuelve el texto con secretos reemplazados)\n\
    \  python3 secret_scanner.py --scan-file file.yaml --redact --output file_redacted.yaml\n\
    \n  # Como lib: from secret_scanner import scan_text, redact_text"
