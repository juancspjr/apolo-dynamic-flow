  path: scripts/python/pre_commit_hooks.py
  title: pre_commit_hooks
  docstring: "pre_commit_hooks.py — Pre-commit hooks para apolo-dynamic-flow (v3.4.0).\n\
    \nCierra el GAP: \"Pre-commit hooks\"\n\nGenera y gestiona pre-commit hooks que\
    \ se ejecutan antes de cada git commit:\n  1. Verifica que no hay secretos en\
    \ archivos staging\n  2. Verifica que TypeScript compila\n  3. Verifica que Python\
    \ scripts compilan\n  4. Ejecuta apolo-full-test.sh (fast mode)\n  5. Verifica\
    \ que force_quality_gates pasan\n\nCLI:\n  # Instalar hooks en .git/hooks/pre-commit\n\
    \  python3 pre_commit_hooks.py install --repo-root .\n\n  # Ejecutar hooks manualmente\n\
    \  python3 pre_commit_hooks.py run --repo-root .\n\n  # Verificar que hooks estan\
    \ instalados\n  python3 pre_commit_hooks.py status --repo-root .\n\n  # Remover\
    \ hooks\n  python3 pre_commit_hooks.py uninstall --repo-root ."
