- type: python
  path: scripts/python/smart_rollback.py
  title: smart_rollback
  docstring: "smart_rollback.py — Detectar qué parte del MP falló y revertir solo\
    \ esa (v3.4.0).\n\nCierra el GAP: \"Rollback inteligente: detectar qué parte del\
    \ MP falló y revertir solo esa\"\n\nEn lugar de hacer git checkout de todo el\
    \ repo, este script:\n  1. Analiza que archivos fueron modificados por el MP actual\n\
    \  2. Identifica cuales causaron el fallo (via test failures + evidence_replay)\n\
    \  3. Revierte SOLO esos archivos, preservando el resto del trabajo\n\nCLI:\n\
    \  # Analizar que archivos causaron el fallo\n  python3 smart_rollback.py analyze\
    \ --flowid X --repo-root .\n\n  # Ejecutar rollback inteligente (solo archivos\
    \ que fallaron)\n  python3 smart_rollback.py rollback --flowid X --repo-root .\
    \ [--dry-run]\n\n  # Ver que se revertiria sin ejecutar\n  python3 smart_rollback.py\
    \ preview --flowid X --repo-root ."
