- type: markdown
  path: .specwright/protocols/git.md
  title: git
  docstring: "# Git Operations Protocol\n\nAll git behavior is driven by the `git`\
    \ section of `config.json`. Nothing is\nhardcoded.\n\n## Config Schema\n\n```json\n\
    {\n  \"git\": {\n    \"strategy\": \"trunk-based\",\n    \"baseBranch\": \"main\"\
    ,\n    \"targets\": {\n      \"defaultRole\": \"integration\",\n      \"roles\"\
    : {\n        \"integration\": { \"branch\": \"main\" },\n        \"release\":\
    \ { \"branch\": \"main\" },\n        \"maintenance\": { \"pattern\": \"release/*\"\
    \ }\n      }\n    },\n    \"freshness\": {\n      \"validation\": \"branch-head\"\
    ,\n      \"reconcile\": \"rebase\",\n      \"checkpoints\": {\n        \"build\"\
    : \"require\",\n        \"verify\": \"require\",\n        \"ship\": \"require\"\
    \n      }\n    },\n    \"workArtifacts\": {\n      \"mode\": \"clone-local\",\n\
    \      \"trackedRoot\": null\n    },\n    \"branchPrefix\": \"feat/\",\n    \"\
    mergeStrategy\": \"squash\",\n    \"prRequired\": true,\n    \"commitFormat\"\
    : \"conventional\",\n    \"commitTemplate\": null,\n    \"branchPerWorkUnit\"\
    : true,\n    \"cleanupBranch\": true,\n    \"prTool\": \"gh\"\n  }\n}\n```\n\n\
    | Field | Type | Default | Description |\n|"
  sections:
  - heading: Git Operations Protocol
    body: '

      All git behavior is driven by the `git` section of `config.json`. Nothing is

      hardcoded.

      '
  - heading: Config Schema
    body: "\n```json\n{\n  \"git\": {\n    \"strategy\": \"trunk-based\",\n    \"\
      baseBranch\": \"main\",\n    \"targets\": {\n      \"defaultRole\": \"integration\"\
      ,\n      \"roles\": {\n        \"integration\": { \"branch\": \"main\" },\n\
      \        \"release\": { \"branch\": \"main\" },\n        \"maintenance\": {\
      \ \"pattern\": \"release/*\" }\n      }\n    },\n    \"freshness\": {\n    \
      \  \"validation\": \"branch-head\",\n      \"reconcile\": \"rebase\",\n    \
      \  \"checkpoints\": {\n        \"build\": \"require\",\n        \"verify\":\
      \ \"require\",\n        \"ship\": \"require\"\n      }\n   "
  - heading: Branch Role Defaults And Freshness Policy
    body: '

      `git.targets` and `git.freshness` are the canonical config surfaces for branch

      targeting and checkpoint policy.


      `git.targets` stays intentionally small:


      - `defaultRole` selects the role used when the work does not specify one

      - `roles.{role}.branch` sets a concrete default branch such as `main` or `develop`

      - `roles.{role}.pattern` allows constrained families such as `release/*`


      Pattern-based defaults are templates, not autonomous selectors. `sw-design`

      may resolve a `roles.{role}.pattern` e'
  - heading: Work-Artifact Publication Mode
    body: "\n`git.workArtifacts` is the canonical config surface for optional auditable\
      \ work\nartifacts. It is optional; when omitted, those artifacts remain clone-local.\n\
      \nSupported shape:\n\n- `mode`: `clone-local` or `tracked`\n- `trackedRoot`:\
      \ repo-relative path required when `mode = tracked`\n\nSemantics:\n\n- `clone-local`\
      \ resolves `workArtifactsRoot = {repoStateRoot}/work` and keeps\n  optional\
      \ auditable work artifacts under clone-local Specwright state. They do\n  not\
      \ become tracked project files by default.\n-"
  - heading: Logical Roots And Selected Work
    body: '

      Git operations that participate in the Specwright workflow use the same logical

      roots as `protocols/context.md` and `protocols/state.md`:


      | Root | Resolution | Purpose |

      |---|---|---|

      | `projectRoot` | `git rev-parse --show-toplevel` | checkout path and command
      cwd |

      | `projectArtifactsRoot` | `{projectRoot}/.specwright` | tracked config and
      anchor docs |

      | `repoStateRoot` | `git rev-parse --git-common-dir` + `/specwright` | shared
      runtime work records |

      | `worktreeStateRoot` | `git rev-parse '
  - heading: Branch Ownership Rules
    body: "\nTop-level Git workflow operations apply only when all of the following\
      \ are\ntrue:\n\n1. the current session exists and `session.json.mode == \"top-level\"\
      `\n2. the session is attached to the selected work\n3. the selected work's `workflow.json.attachment.worktreeId`\
      \ matches the\n   current session's `worktreeId`\n4. no other live top-level\
      \ session claims that work\n\nIf any check fails, STOP with explicit adopt/takeover\
      \ guidance. Do not allow\ntwo top-level worktrees to mutate or ship the same\
      \ work silentl"
  - heading: Branch Lifecycle
    body: '

      If the selected work already records `targetRef`, branch setup uses that

      concrete target before falling back to `git.targets` defaults or the

      `baseBranch` compatibility alias.


      **Create** (at build start):


      ```bash

      TARGET_REMOTE="{resolved target remote}"

      TARGET_BRANCH="{resolved target branch}"

      git fetch "$TARGET_REMOTE"

      git checkout "$TARGET_BRANCH"

      git pull --ff-only "$TARGET_REMOTE" "$TARGET_BRANCH"

      git checkout -b {config.git.branchPrefix}{work-or-unit-id}

      ```


      If the branch already exists'
  - heading: Lifecycle Freshness Checkpoints
    body: "\nLifecycle skills consume the shared freshness contract from\n`protocols/git-freshness.md`;\
      \ this protocol defines when each stage performs the\ncheck and which target\
      \ it uses.\n\n- `sw-build` consumes the `build` checkpoint after branch setup,\
      \ using the\n  selected work's recorded target before any fallback defaults.\n\
      - `sw-verify` consumes the `verify` checkpoint before gate execution.\n- `sw-ship`\
      \ consumes the `ship` checkpoint during shipping pre-flight, before\n  push\
      \ or PR creation.\n\nFor `branch-he"
  - heading: 'Strategy: Branch + PR Targets'
    body: '

      Read `config.git.strategy`:


      | Strategy | Branch from | PR targets | Merge style |

      |---|---|---|---|

      | `trunk-based` | base branch | base branch | squash (default) |

      | `github-flow` | base branch | base branch | merge or squash |

      | `gitflow` | `develop` | `develop` (feature), `main` (release) | merge |

      | `custom` | ask user | ask user | ask user |


      For `custom` strategy: prompt the user for operations that are not derivable

      from config.


      `sw-init` and `sw-guard` seed or migrate `git.targets` an'
  - heading: Staging Rules
    body: '

      Always stage specific files by path:


      ```bash

      git add src/foo.ts core/protocols/git.md

      ```


      Never use:


      - `git add -A`

      - `git add .`

      - `git add --all`

      '
  - heading: Blocked Operations
    body: '

      Never run these commands:


      - `git worktree prune`

      - `git worktree remove --force`

      - `git checkout .`

      - `git restore .`


      These are destructive to worktree safety or working state.

      '
  - heading: Commit Format
    body: '

      Read `config.git.commitFormat`.


      **conventional** (default):


      ```text

      {type}({scope}): {description}

      ```


      Types: `feat`, `fix`, `refactor`, `docs`, `test`, `chore`, `ci`.


      **freeform:** no enforced structure.


      **custom:** use `config.git.commitTemplate`.


      Always use a heredoc for the commit message:


      ```bash

      git commit -m "$(cat <<''EOF''

      feat(scope): description


      Co-Authored-By: Claude <noreply@anthropic.com>

      EOF

      )"

      ```

      '
  - heading: Commit Recovery
    body: '

      If `git commit` fails and the output shows formatter-like rewrites, re-stage

      only the affected paths and retry once. If the second attempt fails, stop and

      show the error.

      '
  - heading: Push
    body: '

      Only the attached top-level owner of a work may push its workflow branch:


      ```bash

      git push -u origin {branch}

      ```


      If the session branch does not match the selected work''s recorded branch,

      STOP and surface the mismatch before any push.

      '
  - heading: PR Creation
    body: '

      PR creation is allowed only when all of the following are true:


      1. the selected work''s `workflow.json.status` is `shipping`

      2. the current session is `top-level`

      3. the current session is attached to that work

      4. the work''s recorded attachment still points at this worktree

      5. the current branch matches the selected work''s recorded branch


      If any prerequisite fails, STOP with:


      > "PR creation requires the attached work to be in shipping state and owned
      by this top-level worktree. Run /sw-verify'
  - heading: Cleanup
    body: '

      After merge, if `config.git.cleanupBranch` is true:


      - delete the local feature branch with `git branch -d`

      - delete the remote branch only if it still exists

      - prune stale remote refs

      - sync the base branch with `--ff-only`


      Never delete branches referenced by live sessions or subordinate worktrees.


      For sync-oriented cleanup flows such as `sw-sync`:


      - keep `git branch -d` as the default delete path

      - allow `git branch -D` only for branches flagged `[gone]`

      - require an explicit second confir'
