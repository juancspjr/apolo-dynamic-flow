- type: markdown
  path: .specwright/skills/sw-doctor/SKILL.md
  title: SKILL
  docstring: "---\nname: sw-doctor\ndescription: >-\n  Specwright health check. Validates\
    \ shared config, anchor docs, workflow and\n  session state, commands, gates,\
    \ and hooks. May backfill shipped PR metadata\n  when it can prove the mapping\
    \ safely.\nargument-hint: \"\"\nallowed-tools:\n  - read\n  - write\n  - bash\n\
    \  - glob\n  - grep\n---\n\n# Specwright Doctor\n\n## Goal\n\nValidate that a\
    \ Specwright installation is coherent across the tracked\nproject-artifact root,\
    \ shared repo-state root, and per-worktree session model,\nthen print actionable\
    \ repair hints using the same runtime-root and ownership\nvocabulary the adapters\
    \ expose.\n\n## Inputs\n\n- `{projectArtifactsRoot}/config.json`\n- `{projectArtifactsRoot}/CONSTITUTION.md`\
    \ and `{projectArtifactsRoot}/CHARTER.md`\n- `{worktreeStateRoot}/session.json`\
    \ when present\n- `{repoStateRoot}/work/*/workflow.json`\n- `{workArtifactsRoot}/{workId}/approvals.md`\
    \ and `{workDir}/review-packet.md`\n  when present\n- gate skill files, hook config,\
    \ and configured commands\n\n## Outputs\n\n- PASS"
  sections:
  - heading: Specwright Doctor
    body: ''
  - heading: Goal
    body: '

      Validate that a Specwright installation is coherent across the tracked

      project-artifact root, shared repo-state root, and per-worktree session model,

      then print actionable repair hints using the same runtime-root and ownership

      vocabulary the adapters expose.

      '
  - heading: Inputs
    body: "\n- `{projectArtifactsRoot}/config.json`\n- `{projectArtifactsRoot}/CONSTITUTION.md`\
      \ and `{projectArtifactsRoot}/CHARTER.md`\n- `{worktreeStateRoot}/session.json`\
      \ when present\n- `{repoStateRoot}/work/*/workflow.json`\n- `{workArtifactsRoot}/{workId}/approvals.md`\
      \ and `{workDir}/review-packet.md`\n  when present\n- gate skill files, hook\
      \ config, and configured commands\n"
  - heading: Outputs
    body: "\n- PASS/WARN/FAIL health table\n- Optional backfill of `prNumber` and\
      \ `prMergedAt` on the owning work's\n  `workflow.json`\n"
  - heading: Constraints
    body: "\n**Pre-condition (LOW freedom):**\n- If neither the shared layout nor\
      \ the legacy fallback can be resolved, stop\n  immediately and tell the user\
      \ to run `/sw-init`.\n- Always report layout status first: `shared/session`,\
      \ `legacy fallback`, or\n  `missing`.\n- When layout resolves, describe the\
      \ active runtime mode explicitly:\n  `project-visible` runtime roots under `.specwright-local/`\
      \ are the preferred\n  interactive default; `git-admin` roots under `.git/specwright/`\
      \ are\n  compatibility mode.\n\n**Check"
  - heading: Protocol References
    body: '

      - `.specwright/protocols/context.md` -- logical-root loading

      - `.specwright/protocols/state.md` -- per-work workflow format and lock handling

      '
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |---|---|

      | shared config missing | fail that check and continue |

      | workflow parse error | fail the state check and identify the owning work |

      | all checks pass | print the table and say all checks passed |

      | hooks absent | INFO: no hooks configured |

      '
