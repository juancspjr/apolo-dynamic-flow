- type: python
  path: scripts/python/score_evidence.py
  title: score_evidence
  docstring: "score_evidence.py — Evaluador de calidad y suficiencia de evidence packs.\n\
    \nGAP 2: Calidad y suficiencia de evidencia.\n\nRecibe un EVIDENCE-PACK.yaml +\
    \ 02-VERDAD.yaml (objetivo) y produce\nEVIDENCE-SCORE.yaml con métricas deterministas:\n\
    \n  - coverage_score:    % de archivos mencionados en VERDAD que están en el pack\n\
    \  - freshness_score:   % de archivos con git-mtime < 24h (relevancia temporal)\n\
    \  - depth_score:       proporción de evidencia con contenido vs solo rutas\n\
    \  - conflict_risk:     detecta si hay 2+ archivos con funciones del mismo nombre\n\
    \  - missing_critical:  lista archivos que VERDAD referencia pero no están en\
    \ pack\n  - redundancy_score:  % de items duplicados (mismo hash)\n  - schema_validity:\
    \   % de items que pasaron schema-validation\n\nDecisiones automáticas:\n  - Si\
    \ coverage_score < 0.7 -> recommendation: \"re-collect with expanded scope\"\n\
    \  - Si missing_critical no está vacío -> recommendation: \"block before agent\"\
    \n  - Si freshness_score < 0.3 -> recommendation: \"evidence may b"
  examples:
  - "python3 score_evidence.py \\\\\n    --evidence plan/active/<FLOW>/evidence/EVIDENCE-PACK.yaml\
    \ \\\\\n    --verdad plan/active/<FLOW>/02-VERDAD.yaml \\\\\n    --code-index\
    \ .opencode/apolo-dynamic/CODE-INDEX.yaml \\\\\n    --output plan/active/<FLOW>/evidence/EVIDENCE-SCORE.yaml"
