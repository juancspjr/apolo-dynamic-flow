- type: python
  path: scripts/python/force_quality_gates.py
  title: force_quality_gates
  docstring: "force_quality_gates.py — Gates que OBLIGAN al agente a actuar con calidad\
    \ (v3.2.0).\n\nRESPONDE a la intencion del usuario:\n  \"obligado hacer las cosas\
    \ con calidad a actuar\"\n  \"determinismo para obligar al agente decir la verdad\
    \ actuar con todos los\n   pasos sin descanso\"\n\nA diferencia de post_script_gates.py\
    \ (que valida outputs YAML), estos gates\nvalidan el COMPORTAMIENTO del agente:\n\
    \n  1. COMPLETITUD: el agente no puede saltarse pasos del ciclo\n  2. VERACIDAD:\
    \ el agente no puede declarar \"done\" si los tests fallan\n  3. EVIDENCIA: el\
    \ agente no puede avanzar sin evidence pack valido\n  4. NO_SILENT_FAIL: el agente\
    \ debe reportar errores, no ocultarlos\n  5. TESTS_PASS: el agente no puede declarar\
    \ success si tests fallan\n  6. SCAFFOLD_USED: el agente debe implementar usando\
    \ el scaffold generado\n  7. NO_REGRESSION: el agente no puede romper tests existentes\n\
    \nSi un gate falla, el sistema BLOQUEA al agente (no puede avanzar de fase)\n\
    hasta que cumpla.\n\nCLI:\n  # Verificar todos los gates para un "
