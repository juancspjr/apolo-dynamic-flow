- type: python
  path: scripts/python/mp_prioritizer.py
  title: mp_prioritizer
  docstring: "mp_prioritizer.py — Priorizacion dinamica de MPs basada en telemetria\
    \ (v3.4.0).\n\nCierra el GAP: \"Priorizacion dinamica de MPs: reordenar cola basado\
    \ en telemetria\"\n\nReordena la cola de unidades (MPs) del plan basandose en:\n\
    \  1. Impacto predicho (de IMPACT-PREDICTION.yaml)\n  2. Riesgo operativo (de\
    \ PLAN.yaml)\n  3. Tasa de exito historica (de cross_flow_learning)\n  4. Dependencias\
    \ topologicas\n  5. Evidencia de urgencia (de telemetry de flows anteriores)\n\
    \nCLI:\n  # Reordenar plan basado en telemetria\n  python3 mp_prioritizer.py reprioritize\
    \ --flowid X --repo-root .\n\n  # Ver prioridad calculada de cada unidad\n  python3\
    \ mp_prioritizer.py scores --flowid X --repo-root .\n\n  # Ver siguiente unidad\
    \ recomendada\n  python3 mp_prioritizer.py next --flowid X --repo-root ."
