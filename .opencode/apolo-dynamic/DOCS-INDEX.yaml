- type: python
  path: scripts/python/integration_validator.py
  title: integration_validator
  docstring: "integration_validator.py — Valida handoffs entre scripts (v3.5.0).\n\
    \nRESPONDE a tu pregunta: \"integraciones que no se solapen, no se dañen entre\
    \ si\"\n\nValida que el output de cada script tiene la estructura que el siguiente\
    \ script\nespera como input. Detecta:\n  - Contratos rotos (script A produce X,\
    \ script B espera Y)\n  - Campos faltantes en handoffs\n  - Tipos incorrectos\
    \ (lista vs dict vs string)\n  - Schemas inconsistentes\n\nCada handoff se define\
    \ como:\n  {\n    \"from\": \"collect_evidence.py\",\n    \"to\": \"score_evidence.py\"\
    ,\n    \"output_field\": \"items\",        # campo que A produce\n    \"input_expectation\"\
    : \"list\",     # tipo que B espera\n    \"min_length\": 1,                 #\
    \ validacion opcional\n    \"description\": \"evidence items → score_evidence\
    \ input\"\n  }\n\nCLI:\n  python3 integration_validator.py validate --repo-root\
    \ .\n  python3 integration_validator.py validate --repo-root . --json\n  python3\
    \ integration_validator.py handoffs --repo-root ."
