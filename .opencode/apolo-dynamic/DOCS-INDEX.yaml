- type: markdown
  path: .specwright/skills/sw-research/SKILL.md
  title: SKILL
  docstring: "---\nname: sw-research\ndescription: >-\n  Deep outward-facing research.\
    \ Investigates external documentation, APIs,\n  industry patterns, and best practices.\
    \ Produces validated research briefs.\nargument-hint: \"[topic or question to\
    \ research]\"\nallowed-tools:\n  - read\n  - write\n  - glob\n  - grep\n  - Task\n\
    ---\n\n# Specwright Research\n\n## Goal\n\nProduce validated, referenced research\
    \ briefs as input to the design phase.\nFocus is outward — external docs, APIs,\
    \ SDKs, industry patterns. Output is\nfacts and evidence, never design opinions.\
    \ Operates fully autonomously —\nbriefs are consumed by sw-design (which has its\
    \ own gate).\n\n## Inputs\n\n- Research topic(s) from argument or conversation\
    \ context\n- `{projectArtifactsRoot}/research/` — existing briefs (for deepening\
    \ or refresh)\n- `{projectArtifactsRoot}/CHARTER.md` — technology vision (for\
    \ relevance filtering)\n\n## Outputs\n\n- `{projectArtifactsRoot}/research/{topic-id}-{YYYYMMDD}.md`\
    \ per `.specwright/protocols/research.md`\n\n## Constraints\n\n**Stage bound"
  sections:
  - heading: Specwright Research
    body: ''
  - heading: Goal
    body: '

      Produce validated, referenced research briefs as input to the design phase.

      Focus is outward — external docs, APIs, SDKs, industry patterns. Output is

      facts and evidence, never design opinions. Operates fully autonomously —

      briefs are consumed by sw-design (which has its own gate).

      '
  - heading: Inputs
    body: '

      - Research topic(s) from argument or conversation context

      - `{projectArtifactsRoot}/research/` — existing briefs (for deepening or refresh)

      - `{projectArtifactsRoot}/CHARTER.md` — technology vision (for relevance filtering)

      '
  - heading: Outputs
    body: '

      - `{projectArtifactsRoot}/research/{topic-id}-{YYYYMMDD}.md` per `.specwright/protocols/research.md`

      '
  - heading: Constraints
    body: "\n**Stage boundary (LOW freedom):**\nReads and researches. NEVER writes\
      \ code, branches, mutates workflow state,\nor produces design artifacts. No\
      \ `currentWork`, no lock. Can run anytime.\nIt is not a core workflow stage\
      \ and never claims top-level work ownership.\n\n**Triage (MEDIUM freedom):**\n\
      - Break request into 1-5 tracks. Derive tracks from the argument + existing\
      \ gaps.\n  Apply `.specwright/protocols/decision.md` DISAMBIGUATION if topic\
      \ is ambiguous.\n- Assign output shape per track (API contracts,"
  - heading: Protocol References
    body: '

      - `.specwright/protocols/decision.md` -- autonomous decision framework (DISAMBIGUATION,
      auto-approval)

      - `.specwright/protocols/research.md` — brief format, staleness, lifecycle

      - `.specwright/protocols/delegation.md` — agent delegation

      '
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |-----------|--------|

      | No topic | Infer from conversation context. If undetermined, STOP. |

      | Researcher returns no findings | Note as "no results" for that track |

      | Source cannot be fetched | Mark UNFETCHED; do not fabricate |

      | All tracks LOW confidence | Persist with prominent warning. Consumer decides.
      |

      | Research directory at cap | Log warning, list briefs by date |

      | Compaction | Re-run from scratch |

      '
