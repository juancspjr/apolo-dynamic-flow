- type: python
  path: scripts/python/health_check.py
  title: health_check
  docstring: "health_check.py — Implementa apolo.health.check() + hot reload.\n\n\
    Verifica en tiempo real qué MCPs/tools del registry están vivos y, si una\ntool\
    \ cambió de estado (degraded -> active o viceversa), re-absorbe y actualiza\n\
    el TOOL-REGISTRY.yaml en caliente.\n\nDiferencia con absorb_mcp.py (que solo descubre\
    \ y registra):\neste script VERIFICA salud en runtime y actualiza estados.\n\n\
    Tipos de health check:\n  1. file-exists: para scripts Python (test -f)\n  2.\
    \ mcp-ping: para MCPs (intenta listar herramientas via opencode)\n  3. command-exit:\
    \ para plugins TS (tsc --noEmit)\n  4. callable: para funciones internas (la llama\
    \ y verifica respuesta)\n\nHot reload:\n  - Si una tool que estaba \"degraded\"\
    \ ahora responde -> status: \"active\"\n  - Si una tool que estaba \"active\"\
    \ dejó de responder -> status: \"degraded\"\n  - Si aparecen nuevas tools (archivo\
    \ nuevo en scripts/python/) -> las absorbe\n  - Si desaparece una tool -> la marca\
    \ \"disabled\"\n\nUso:\n  python3 health_check.py --repo-root /path [--fix] [--flowid\
    \ APOLO-"
  examples:
  - "python3 health_check.py --repo-root /path [--fix] [--flowid APOLO-...]\n  python3\
    \ health_check.py --repo-root /path --json"
