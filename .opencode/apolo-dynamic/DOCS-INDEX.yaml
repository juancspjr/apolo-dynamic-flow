  - heading: 1. Que es este plugin
    body: '

      `apolo-dynamic-flow` es un plugin TypeScript para OpenCode que **reemplaza a
      `apolo-flow-guardian.ts`**. Orquesta agentes con:


      - **State machine explicita** con transiciones legales y gates por fase (no
      "planificacion libre").

      - **Loop dinamico con circuit breaker adaptativo** — cada fase tiene `max` iteraciones;
      al agotarse, escala o bloquea (sin loops infinitos).

      - **Recoleccion determinista de evidencia** — scripts Python (no el agente)
      capturan archivos, git diff, simbolos, endpoints, DB q'
  - heading: Problemas que resuelve (vs. plugin viejo)
    body: '

      | Problema | apolo-flow-guardian.ts | apolo-dynamic-flow |

      |---|---|---|

      | Planes estaticos | Si, no se adaptaban | Planes dinamicos con versionado y
      adaptative gates |

      | Evidencia manual | El agente decidia que capturar | Scripts Python deterministas
      con hash chain |

      | Tests post-cambio | El agente decidia cuando correrlos | Automaticos tras
      cada micro-cambio + rollback |

      | Tools hardcodeadas | Solo las 8 del plugin viejo | Absorcion automatica de
      MCPs, skills, plugins, scripts |

      | Planes tras'
  - heading: 2. Prerrequisitos
    body: ''
  - heading: Versiones minimas
    body: '

      | Componente | Version minima | Verificar | Instalar |

      |---|---|---|---|

      | **Node.js** | 18.0.0 | `node --version` | `sudo apt install -y nodejs` |

      | **npm** | 9.0.0 | `npm --version` | `sudo apt install -y npm` |

      | **Python 3** | 3.10 | `python3 --version` | `sudo apt install -y python3`
      |

      | **PyYAML** | 6.0 | `python3 -c "import yaml; print(yaml.__version__)"` | `pip3
      install --user pyyaml` |

      | **jsonschema** | 4.0 | `python3 -c "import jsonschema; print(jsonschema.__version__)"`
      | `pip3 inst'
  - heading: Dependencias opcionales (recomendadas)
    body: '

      Estas herramientas activan analizadores especificos. Sin ellas, el sistema degrada
      gracefulmente con regex fallback.


      | Herramienta | Para que | Instalar |

      |---|---|---|

      | **bandit** | Analisis de seguridad Python | `pip3 install --user bandit` |

      | **radon** | Complejidad ciclomatica Python | `pip3 install --user radon` |

      | **coverage** + **pytest** | Coverage de tests Python | `pip3 install --user
      coverage pytest` |

      | **safety** | CVE scan Python | `pip3 install --user safety` |

      | **pip-audit*'
