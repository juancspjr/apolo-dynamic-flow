  path: .specwright/skills/sw-learn/SKILL.md
  title: SKILL
  docstring: "---\nname: sw-learn\ndescription: >-\n  Captures patterns and learnings\
    \ from the current work unit. Reviews\n  build failures, gate findings, and architecture\
    \ decisions. Applies\n  objective promotion criteria autonomously — patterns.md\
    \ is the artifact.\nargument-hint: \"\"\nallowed-tools:\n  - read\n  - write\n\
    \  - edit\n  - bash\n  - glob\n  - grep\n---\n\n# Specwright Learn\n\n## Goal\n\
    \nExtract reusable knowledge from the current work unit. Build failures,\ngate\
    \ findings, and architecture decisions contain valuable patterns.\nSurface them,\
    \ let the user curate, and promote the best ones so future\nwork benefits.\n\n\
    ## Inputs\n\n- `{worktreeStateRoot}/session.json` -- selected work for this worktree\n\
    - `{repoStateRoot}/work/{selectedWork.id}/workflow.json` -- current work unit\
    \ (should be shipped)\n- `{workDir}/evidence/` -- gate evidence files\n- `{workDir}/implementation-rationale.md`\
    \ -- curated build-time reasoning when present\n- `{workDir}/review-packet.md`\
    \ -- reviewer-facing audit synthesis when present\n- `{work"
  sections:
  - heading: Specwright Learn
    body: ''
  - heading: Goal
    body: '

      Extract reusable knowledge from the current work unit. Build failures,

      gate findings, and architecture decisions contain valuable patterns.

      Surface them, let the user curate, and promote the best ones so future

      work benefits.

      '
  - heading: Inputs
    body: '

      - `{worktreeStateRoot}/session.json` -- selected work for this worktree

      - `{repoStateRoot}/work/{selectedWork.id}/workflow.json` -- current work unit
      (should be shipped)

      - `{workDir}/evidence/` -- gate evidence files

      - `{workDir}/implementation-rationale.md` -- curated build-time reasoning when
      present

      - `{workDir}/review-packet.md` -- reviewer-facing audit synthesis when present

      - `{workDir}/plan.md` -- architecture decisions

      - `{workArtifactsRoot}/{selectedWork.id}/approvals.md` -- approval l'
  - heading: Outputs
    body: "\n- Learnings presented to user in categories\n- User-approved patterns\
      \ promoted to one of:\n  - `{projectArtifactsRoot}/CONSTITUTION.md` (new practice\
      \ rule)\n  - Auto-memory MEMORY.md (compact pattern entry, loaded every session)\n\
      \  - `{projectArtifactsRoot}/patterns.md` (reusable pattern library)\n- `{projectArtifactsRoot}/learnings/{work-id}.json`\
      \ -- written when any finding is promoted OR when gateCalibration data is available.\
      \ When only calibration is present (no promoted findings), write with an"
  - heading: Constraints
    body: "\n**Stage boundary (LOW freedom):**\n- Follow `.specwright/protocols/stage-boundary.md`.\n\
      - You capture learnings and promote patterns. You NEVER start new work units,\
      \ run builds, or create PRs.\n- It is not a core workflow stage and never claims\
      \ top-level work ownership.\n- After learnings are captured, STOP and present\
      \ the handoff:\n  - If more work units pending: \"Run `/sw-build` to start the\
      \ next unit.\"\n  - If no more units: \"All work units complete. Learnings captured.\"\
      \n\n**Discovery (HIGH freedom"
  - heading: Protocol References
    body: '

      - `.specwright/protocols/stage-boundary.md` -- scope, termination, and handoff

      - `.specwright/protocols/decision.md` -- autonomous decision framework (CURATION
      heuristics)

      - `.specwright/protocols/context.md` -- anchor doc loading

      - `.specwright/protocols/state.md` -- workflow state reading and cleanup transition

      - `.specwright/protocols/insights.md` -- session pattern enrichment

      - `.specwright/protocols/learning-lifecycle.md` -- promotion targets and auto-memory
      format

      - `.specwright/protocols'
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |-----------|--------|

      | No completed work unit | "Nothing to learn from. Complete a build cycle first."
      |

      | No evidence files | Skip evidence scanning, focus on git log and plan |

      | User dismisses all learnings | Calibration data still written (mandatory).
      Findings array empty. |

      | Insights unavailable/stale | Silently skip enrichment per `.specwright/protocols/insights.md`
      |

      | Auto-memory unavailable | Silently fall back to patterns.md only |

      '
