    \nCrea scaffolds de proyecto completos para:\n  - Next.js (React + TypeScript)\n\
    \  - Go API (chi router + testify)\n  - Python CLI (Click + pytest)\n  - React\
    \ Native (mobile)\n  - Rust CLI (clap)\n  - Java Spring Boot API\n  - PHP Laravel\
