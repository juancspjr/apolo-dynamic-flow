- type: python
  path: scripts/python/scaffold_v3.py
  title: scaffold_v3
  docstring: "scaffold_v3.py — Scaffold mejorado con auto-seleccion de U-NN y archivos\
    \ concretos (v3.1.0).\n\nCierra 2 GAPs del INTEGRATION-VERDICT.md:\n\n  GAP #5.1:\
    \ \"Seleccion de U-NN para scaffold_impl — el agente decide cual\n           \
    \  unidad implementar primero. El sistema no prioriza automaticamente\n      \
    \       basandose en impacto/criticidad.\"\n\n  Scaffold concreto: \"El YAML producido\
    \ por scaffold_impl.py es abstracto\n             (descripcion de la unidad, no\
    \ andamio accionable). No contiene\n             files_to_create, files_to_modify,\
    \ ni commands.\"\n\nMejoras sobre scaffold_impl.py:\n\n  1. AUTO-SELECT U-NN:\
    \ Si no se pasa --unit-id, escoge automaticamente la\n     siguiente unidad del\
    \ topological_sort segun estrategia configurable:\n       - topological_first\
    \ (default): primera unidad sin dependencias pendientes\n       - highest_impact:\
    \ unidad con mas afectados en IMPACT-PREDICTION\n       - lowest_risk: unidad\
    \ con riesgooperativo = \"bajo\"\n\n  2. FILES_TO_CREATE CONCRETOS: Ademas de\
    \ files_to_touch "
