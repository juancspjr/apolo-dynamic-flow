- type: markdown
  path: .specwright/skills/sw-verify/SKILL.md
  title: SKILL
  docstring: "---\nname: sw-verify\ndescription: >-\n  Orchestrates quality gates\
    \ for the current work unit. Runs enabled gates\n  in dependency order, produces\
    \ an aggregate evidence report with gate handoff.\nargument-hint: '[--gate=<name>]\
    \ [--accept-mutant {id} --reason \"{prose}\"]'\nallowed-tools:\n  - read\n  -\
    \ write\n  - bash\n  - glob\n  - grep\n  - Task\n---\n\n# Specwright Verify\n\n\
    ## Goal\n\nRun quality gates against the work unit. Continue through all gates\n\
    regardless of failures and present the report at handoff\nper `.specwright/protocols/decision.md`.\n\
    \n## Inputs\n\n- `{worktreeStateRoot}/session.json` -- selected work\n- `{repoStateRoot}/work/{selectedWork.id}/workflow.json`\
    \ -- work state and gate results\n- `{projectArtifactsRoot}/config.json` -- gate\
    \ configuration\n- `{workDir}/spec.md` -- for spec compliance gate\n- `{workDir}/implementation-rationale.md`\
    \ -- curated build rationale when present\n- `{workArtifactsRoot}/{selectedWork.id}/integration-criteria.md`\
    \ -- behavioral IC list when present\n- Gate skill fi"
  sections:
  - heading: Specwright Verify
    body: ''
  - heading: Goal
    body: '

      Run quality gates against the work unit. Continue through all gates

      regardless of failures and present the report at handoff

      per `.specwright/protocols/decision.md`.

      '
  - heading: Inputs
    body: '

      - `{worktreeStateRoot}/session.json` -- selected work

      - `{repoStateRoot}/work/{selectedWork.id}/workflow.json` -- work state and gate
      results

      - `{projectArtifactsRoot}/config.json` -- gate configuration

      - `{workDir}/spec.md` -- for spec compliance gate

      - `{workDir}/implementation-rationale.md` -- curated build rationale when present

      - `{workArtifactsRoot}/{selectedWork.id}/integration-criteria.md` -- behavioral
      IC list when present

      - Gate skill files in `skills/gate-*/SKILL.md`

      '
  - heading: Outputs
    body: '

      - `{repoStateRoot}/work/{selectedWork.id}/units/{selectedWork.unitId}/stage-report.md`
      -- verify handoff digest

      - Evidence files in `{workDir}/evidence/`, one per gate

      - `{workDir}/review-packet.md` -- reviewer synthesis from approvals, rationale,
      proof, and gate outcomes

      - Selected work''s `workflow.json` updated with gate results; status `verifying`

      - Aggregate report presented at gate handoff

      '
  - heading: Constraints
    body: '

      **Stage boundary (LOW freedom):**

      Follow `.specwright/protocols/stage-boundary.md`. Run quality gates and show
      findings. NEVER fix

      code, create PRs, or ship. After gate handoff, STOP.


      **Ownership check (LOW freedom):**

      Resolve the selected work from the current worktree session. If another live

      top-level worktree owns that work, STOP with explicit `/sw-adopt` guidance and

      do not rely on generic adopt/takeover behavior.


      **Assumption re-validation (LOW freedom) — before gate execution:**

      Scan t'
  - heading: Protocol References
    body: '

      - `.specwright/protocols/stage-boundary.md` -- stage boundary

      - `.specwright/protocols/decision.md` -- autonomous decision framework and gate
      handoff

      - `.specwright/protocols/state.md` -- workflow state

      - `.specwright/protocols/git-freshness.md` -- pre-gate freshness checkpoint

      - `.specwright/protocols/git-reconcile.md` -- lifecycle-owned branch reconcile

      - `.specwright/protocols/approvals.md` -- approval lineage validation

      - `.specwright/protocols/review-packet.md` -- packet synthesis

      - `.spec'
  - heading: Failure Modes
    body: '

      | Condition | Action |

      |-----------|--------|

      | No active work unit | STOP: "Run /sw-design, /sw-plan, and /sw-build first."
      |

      | Selected work owned by another live top-level worktree | STOP with explicit
      `/sw-adopt` guidance |

      | Verify freshness reconcile under branch-head `require` + `rebase` or `merge`
      fails | STOP with the reconcile failure and rerun `/sw-verify` after fixing
      the blocked worktree state. |

      | Verify freshness checkpoint is blocked under branch-head `require` + `manual`
      | STOP'
