- type: python
  path: scripts/python/agent_decision_loop.py
  title: agent_decision_loop
  docstring: "agent_decision_loop.py — Loop sobre decisiones del agente (v3.2.0).\n\
    \nRESPONDE a la intencion del usuario:\n  \"se busca que el agente haga loop sobre\
    \ esas decisiones y escoja entre\n   ellas excelentes decisiones\"\n\nEl agente\
    \ propone N opciones de decision. El sistema las evalua automaticamente\ncon criterios\
    \ objetivos (impacto, riesgo, alineacion con goal, evidencia) y\nescoge la mejor.\
    \ Si ninguna es excelente (score < threshold), el sistema\nobliga al agente a\
    \ proponer mas opciones.\n\nFlujo:\n  1. Agente propone opciones (via archivo\
    \ YAML o stdin)\n  2. Sistema evalua cada opcion con 5 criterios:\n     - Impacto\
    \ esperado (0-1)\n     - Riesgo (0-1, invertido)\n     - Alineacion con goal (0-1)\n\
    \     - Evidencia de soporte (0-1)\n     - Factibilidad (0-1)\n  3. Sistema calcula\
    \ score ponderado\n  4. Si score >= threshold (default 0.7) → aceptar\n  5. Si\
    \ score < threshold → obligar al agente a proponer mas opciones\n\nCLI:\n  # Agente\
    \ propone opciones (via archivo)\n  python3 agent_decision_loop.py decide \\\n\
    \  "
