  path: .specwright/protocols/review-packet.md
  title: review-packet
  docstring: "# Review Packet Protocol\n\nDefine the canonical reviewer-facing audit\
    \ artifact for one work unit.\n\n## Purpose\n\n`review-packet.md` is the durable\
    \ synthesis surface that explains:\n\n- what the agent changed\n- why the agent\
    \ implemented it this way\n- which approvals were in force\n- where spec conformance\
    \ was proven\n- which gate findings still need attention\n\nIt exists so reviewers\
    \ do not need raw transcripts or every gate report open at\nonce to understand\
    \ an agent-authored change.\n\n## File Location\n\n- Unit-level audit artifact:\
    \ `{workDir}/review-packet.md`\n- The packet lives with auditable work artifacts,\
    \ not in runtime-only\n  `workflow.json` state.\n\n## Required Inputs\n\n`sw-verify`\
    \ assembles the packet from existing durable artifacts:\n\n- `{workArtifactsRoot}/{workId}/approvals.md`\n\
    - `{workDir}/implementation-rationale.md`\n- `{workDir}/evidence/*.md`\n- `{workDir}/evidence/spec-compliance.md`\n\
    - `{workDir}/spec.md`\n- `{workArtifactsRoot}/{workId}/integration-criteria.md`\
    \ when behavioral ICs\n  a"
  sections:
  - heading: Review Packet Protocol
    body: '

      Define the canonical reviewer-facing audit artifact for one work unit.

      '
  - heading: Purpose
    body: '

      `review-packet.md` is the durable synthesis surface that explains:


      - what the agent changed

      - why the agent implemented it this way

      - which approvals were in force

      - where spec conformance was proven

      - which gate findings still need attention


      It exists so reviewers do not need raw transcripts or every gate report open
      at

      once to understand an agent-authored change.

      '
  - heading: File Location
    body: "\n- Unit-level audit artifact: `{workDir}/review-packet.md`\n- The packet\
      \ lives with auditable work artifacts, not in runtime-only\n  `workflow.json`\
      \ state.\n"
  - heading: Required Inputs
    body: "\n`sw-verify` assembles the packet from existing durable artifacts:\n\n\
      - `{workArtifactsRoot}/{workId}/approvals.md`\n- `{workDir}/implementation-rationale.md`\n\
      - `{workDir}/evidence/*.md`\n- `{workDir}/evidence/spec-compliance.md`\n- `{workDir}/spec.md`\n\
      - `{workArtifactsRoot}/{workId}/integration-criteria.md` when behavioral ICs\n\
      \  are relevant\n\nThe packet synthesizes those sources. It does not create\
      \ a second source of\ntruth for gate execution or approval state.\n"
  - heading: Closeout Digest Reuse
    body: '

      `review-packet.md` may feed a closeout digest when a lifecycle surface needs
      a

      human-readable summary and no fresher stage report is available. That closeout

      digest is derived from the review-packet structure; it must not become a second
      free-form summary surface with bespoke wording that drifts from the packet.

      '
  - heading: Canonical Structure
    body: '

      ```markdown'
  - heading: Review Packet
    body: ''
  - heading: Approval Lineage
    body: '{design and current unit approval status, including stale or missing lineage}

      '
  - heading: What Changed
    body: '{changed files, blast radius, and concise reviewer-oriented diff summary}

      '
  - heading: Why The Agent Implemented It This Way
    body: '{digest derived from implementation-rationale.md}

      '
  - heading: Spec Conformance
    body: '{AC / IC proof summary sourced from gate-spec''s compliance matrix}

      '
  - heading: Gate Summary
    body: '{gate verdicts with evidence references}

      '
  - heading: Remaining Attention
    body: '{WARNs, manual review items, or explicit "none"}

      ```

      '
  - heading: Section Rules
    body: ''
  - heading: Approval Lineage
    body: "\n- Report both `design` and current `unit-spec` lineage when available.\n\
      - Distinguish `APPROVED`, `STALE`, `SUPERSEDED`, and missing approval clearly.\n\
      - When lineage is not current, use the compact reason vocabulary from\n  `protocols/approvals.md`\
      \ (`missing-entry`, `artifact-set-changed`,\n  `missing-lineage`, `expired`,\
      \ `superseded`) instead of dumping hashes into\n  the reviewer-facing summary.\n\
      - Include the human approval source reference when present.\n- Never imply approval\
      \ truth comes from `w"
  - heading: What Changed
    body: '

      - Summarize the implementation blast radius for reviewers.

      - Focus on files, behavior, and interfaces that changed.

      - Do not dump raw git diff or transcript excerpts.

      '
  - heading: Why The Agent Implemented It This Way
    body: "\n- Digest the curated task entries from `implementation-rationale.md`.\n\
      - Preserve key choices, deviations, and execution path (`executor` vs\n  `build-fixer`)\
      \ where they matter to review.\n- This section is rationale, not chat history\
      \ or shell history.\n"
  - heading: Spec Conformance
    body: "\n- `gate-spec` remains the canonical AC / IC proof surface.\n- The packet\
      \ may summarize or excerpt the matrix, but it must not replace or\n  contradict\
      \ gate-spec's evidence.\n- Missing proof in gate-spec remains a gate problem,\
      \ not something the packet\n  may silently fill in.\n"
  - heading: Gate Summary
    body: '

      - Summarize final gate verdicts and point to the underlying evidence files.

      - Do not rerun gates or recreate gate logic here.

      - Gate evidence remains the detailed source of truth.

      '
  - heading: Remaining Attention
    body: "\n- Include only residual WARNs, blocked manual review items, or explicit\
      \ absence\n  of remaining attention.\n- Do not repeat PASS-only noise in this\
      \ section.\n"
  - heading: Publication-Mode Constraint
    body: "\n`review-packet.md` must stay reviewer-usable in both work-artifact modes:\n\
      \n- `tracked`: may link directly to tracked audit artifacts and evidence files\n\
      - `clone-local`: must not depend on local-only file links for reviewer\n  comprehension\n\
      \nWhen `workArtifacts.mode = clone-local`, the packet itself or the downstream\
      \ PR\nbody must inline the approval, rationale, conformance, and attention summaries\n\
      needed by a remote reviewer.\n"
  - heading: Non-Goals
    body: '

      The review packet is not:


      - a transcript archive

      - a second gate engine

      - a replacement for per-gate evidence files

      - a runtime-state mirror

      '
  - heading: Producer / Consumer Responsibilities
    body: "\n- `sw-build` produces the rationale artifact that the packet digests.\n\
      - `sw-verify` assembles `review-packet.md` after gate execution.\n- `sw-ship`\
      \ derives the reviewer-facing PR body from `review-packet.md`,\n  adapting tracked\
      \ links versus clone-local inline summaries from the packet's\n  publication-mode\
      \ contract.\n- `sw-review` uses the packet, approvals, and evidence as its primary\
      \ reply\n  context when the associated work is available, falling back to diff-only\n\
      \  reasoning only when no work ma"
