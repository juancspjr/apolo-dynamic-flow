- type: python
  path: scripts/python/generate_plan.py
  title: generate_plan
  docstring: "generate_plan.py — Generador de planes dinámicos con 3 modos (v2.2.1).\n\
    \nMODOS DE DERIVACIÓN:\n\n  1. deterministic-python (default): El script genera\
    \ TODO el plan automáticamente\n     desde evidence + verdad. El agente no interviene.\
    \ Ideal para cambios mecánicos,\n     fixes, refactors bien definidos. Cero variabilidad.\n\
    \n  2. hybrid: El script genera el plan base, pero el agente puede:\n     - Ajustar\
    \ unidades (añadir, quitar, modificar)\n     - Cambiar prioridades\n     - Añadir\
    \ contexto cualitativo\n     - Marcar unidades como \"needs-human-judgment\"\n\
    \     Ideal para casos donde el determinismo no captura todo (UX, decisiones de\
    \ diseño).\n\n  3. manual: El agente escribe el plan completo. El script solo:\n\
    \     - Valida contra el schema\n     - Calcula topological_sort\n     - Añade\
    \ adaptative_gates default\n     - Registra en rewrite_history\n     Ideal para\
    \ elementos artísticos, decisiones subjetivas, investigación.\n\nLee:\n  - EVIDENCE-PACK.yaml\
    \ (evidence items)\n  - 02-VERDAD.yaml (verdad artifact c"
  examples:
  - "python3 generate_plan.py \\\n    --flowid APOLO-20260620-MI \\\n    --evidence\
    \ /path/EVIDENCE-PACK.yaml \\\n    --verdad /path/02-VERDAD.yaml \\\n    --output\
    \ /path/03-PLAN-INDICE-DYNAMIC.yaml \\\n    --method deterministic-python | hybrid\
    \ | manual \\\n    [--parent-version 1] \\\n    [--partition-hints '[\"split U-02\"\
    ]']"
