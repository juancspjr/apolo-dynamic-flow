  path: .specwright/protocols/backlog.md
  title: backlog
  docstring: "# Backlog Protocol\n\nA unified tracking target for tech debt, debug\
    \ findings, deferred assumptions,\naudit items, and patterns not yet promoted.\
    \ Skills write backlog items consistently\nregardless of the user's chosen target.\n\
    \n## Configuration\n\nRead from `config.json` before writing any backlog item:\n\
    \n```json\n\"backlog\": {\n  \"type\": \"markdown\",      // \"markdown\" or \"\
    github-issues\"\n  \"label\": \"specwright-backlog\"  // used only for github-issues\n\
    }\n```\n\nIf `backlog` is absent from `config.json`, default to `markdown`.\n\n\
    ## Write Targets\n\n### markdown\n\nWrites to `{projectArtifactsRoot}/BACKLOG.md`.\
    \ Creates the file if it doesn't exist.\n\n### github-issues\n\nCreates a GitHub\
    \ Issue via `gh` CLI:\n\n```\ngh issue create --title \"{BL-n} {title}\" --body\
    \ \"{detail}\" --label \"{backlog.label}\"\n```\n\n**Fallback:** Before writing,\
    \ check:\n1. `gh` is on PATH (`which gh`)\n2. Auth is active (`gh auth status`)\n\
    \nIf either check fails: emit one warning (\"GitHub Issues unavailable — writing\
    \ to\n`{projectArtifactsRoot}/"
  sections:
  - heading: Backlog Protocol
    body: '

      A unified tracking target for tech debt, debug findings, deferred assumptions,

      audit items, and patterns not yet promoted. Skills write backlog items consistently

      regardless of the user''s chosen target.

      '
  - heading: Configuration
    body: "\nRead from `config.json` before writing any backlog item:\n\n```json\n\
      \"backlog\": {\n  \"type\": \"markdown\",      // \"markdown\" or \"github-issues\"\
      \n  \"label\": \"specwright-backlog\"  // used only for github-issues\n}\n```\n\
      \nIf `backlog` is absent from `config.json`, default to `markdown`.\n"
  - heading: Write Targets
    body: ''
  - heading: markdown
    body: '

      Writes to `{projectArtifactsRoot}/BACKLOG.md`. Creates the file if it doesn''t
      exist.

      '
  - heading: github-issues
    body: '

      Creates a GitHub Issue via `gh` CLI:


      ```

      gh issue create --title "{BL-n} {title}" --body "{detail}" --label "{backlog.label}"

      ```


      **Fallback:** Before writing, check:

      1. `gh` is on PATH (`which gh`)

      2. Auth is active (`gh auth status`)


      If either check fails: emit one warning ("GitHub Issues unavailable — writing
      to

      `{projectArtifactsRoot}/BACKLOG.md` instead"), then write to markdown. Never
      silently drop items.

      '
  - heading: ID Generation
    body: '

      IDs are `BL-{n}` where `n` is a zero-padded three-digit integer (BL-001, BL-002,
      …).


      **For markdown target:** Read `{projectArtifactsRoot}/BACKLOG.md`, find the
      highest existing

      `BL-{n}` ID, increment by 1. If BACKLOG.md is missing or has no IDs, start at
      BL-001.


      **For github-issues target:** List open issues with the backlog label (`gh issue
      list

      --label "{backlog.label}" --json title --jq ''.[].title''`), parse each title
      for

      the BL-{n} prefix, find the highest n, increment. If none found, st'
  - heading: BACKLOG.md Format
    body: '

      ```markdown'
  - heading: Specwright Backlog
    body: ''
  - heading: Open
    body: ''
  - heading: 'BL-001 [debug] Root cause: N+1 query in user listing'
    body: 'Added: 2026-03-04 | Source: sw-debug | Work: debug-n1-query

      Fix: Add eager loading for user.roles relation


      ---

      '
  - heading: BL-002 [defer] Parallel build support
    body: 'Added: 2026-03-04 | Source: sw-design | Work: sw-effectiveness


      ---

      '
  - heading: Resolved
    body: ''
  - heading: BL-003 [debt] gofmt not running in pre-commit hooks
    body: 'Added: 2026-02-20 | Source: sw-audit | Work: ci-guardrails

      Resolved: 2026-03-01 | Resolution: Added pre-commit hook in .claude/settings.json


      ---

      ```

      '
  - heading: Tag Vocabulary
    body: '

      | Tag | When to use |

      |-----|-------------|

      | `debug` | Root causes identified by sw-debug but not fixed |

      | `defer` | Assumptions or decisions deferred from sw-design |

      | `debt` | Technical debt found during sw-audit or build |

      | `finding` | Audit findings exported for action tracking |

      | `pattern` | Learnings tracked for later promotion by sw-learn |

      '
  - heading: Item Format
    body: '

      ```'
  - heading: BL-{n} [{tag}] {title}
    body: 'Added: {YYYY-MM-DD} | Source: {skill-name} | Work: {work-id}

      {optional one-line detail}

      ```


      Fields:

      - `{title}` — concise, actionable noun phrase (e.g., "Fix N+1 query in user
      listing")

      - `{skill-name}` — the skill that created the item (e.g., `sw-debug`, `sw-design`)

      - `{work-id}` — the active `currentWork.id` when the item was created

      '
  - heading: Resolution
    body: '

      **Markdown:** Move the entry from `## Open` to `## Resolved`. Add:

      ```

      Resolved: {YYYY-MM-DD} | Resolution: {one-line description}

      ```


      **GitHub Issues:** Close the issue (`gh issue close {number} --comment "{resolution}"`).

      '
