- type: python
  path: scripts/python/lsp_integration.py
  title: lsp_integration
  docstring: "lsp_integration.py — Integración con LSP para análisis semántico (v2.5.0).\n\
    \nUsa Language Server Protocol para:\n  - go-to-definition: encontrar dónde se\
    \ define un símbolo\n  - find-references: encontrar todos los lugares que usan\
    \ un símbolo\n  - get-hover: obtener documentación de un símbolo\n  - get_diagnostics:\
    \ obtener errores/warnings de un archivo\n\nLSPs soportados:\n  TypeScript: typescript-language-server\n\
    \  Python: pylsp o pyright\n  Go: gopls\n  Rust: rust-analyzer\n  Java: jdtls\n\
    \  C++: clangd\n  PHP: intelephense\n\nSi un LSP no está disponible, degrada a\
    \ regex-based analysis.\n\nUso:\n  python3 lsp_integration.py --repo-root . --symbol\
    \ \"init\" --action find-references\n  python3 lsp_integration.py --repo-root\
    \ . --file plugin/index.ts --action diagnostics\n  python3 lsp_integration.py\
    \ --repo-root . --output LSP-ANALYSIS.yaml"
  examples:
  - "python3 lsp_integration.py --repo-root . --symbol \"init\" --action find-references\n\
    \  python3 lsp_integration.py --repo-root . --file plugin/index.ts --action diagnostics\n\
    \  python3 lsp_integration.py --repo-root . --output LSP-ANALYSIS.yaml"
