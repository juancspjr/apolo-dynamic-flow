postscriptgates: V1
version: 1
schema_version: 2.9.0
generated_at: '2026-06-22T02:01:57Z'
enabled: true
gates:
- script: collect_evidence.py
  enabled: true
  require:
  - path: items
    type: list
    min_length: 1
    description: Al menos 1 item de evidencia
  - path: hash_chain
    type: string
    min_length: 64
    description: SHA-256 hash chain
  on_fail: block
  description: Evidence pack debe tener al menos 1 item con hash chain válido
- script: score_evidence.py
  enabled: true
  require:
  - path: score
    type: number
    min: 0.0
    max: 1.0
    description: Score entre 0 y 1
  - path: metrics
    type: dict
    description: Métricas calculadas
  on_fail: warn
  description: Score debe estar entre 0 y 1 con métricas
- script: generate_plan.py
  enabled: true
  require:
  - path: unidades
    type: list
    min_length: 1
    description: Al menos 1 unidad de trabajo
  - path: topological_sort
    type: list
    description: Orden topológico de unidades
  on_fail: block
  description: Plan debe tener al menos 1 unidad con orden topológico
- script: predict_impact.py
  enabled: true
  require:
  - path: predictions
    type: list
    description: Lista de predicciones de impacto
  on_fail: warn
  description: Predict impact debe producir predicciones (puede ser vacío si no hay
    afectados)
- script: scaffold_impl.py
  enabled: true
  require:
  - path: files_to_create
    type: list
    description: Lista de archivos a crear
  - path: files_to_modify
    type: list
    description: Lista de archivos a modificar
  on_fail: warn
  description: Scaffold debe especificar files_to_create y files_to_modify (warn si
    vacío = scaffold abstracto)
- script: index_codebase.py
  enabled: true
  require:
  - path: files
    type: list
    min_length: 1
    description: Al menos 1 archivo indexado
  on_fail: block
  description: Code index debe tener al menos 1 archivo
- script: code_quality.py
  enabled: true
  require:
  - path: total_files
    type: number
    min: 0
    description: Total de archivos analizados
  on_fail: warn
  description: Code quality debe reportar total_files
- script: test_coverage.py
  enabled: true
  require:
  - path: coverage_percentage
    type: number
    min: 0
    max: 100
    description: Coverage 0-100%
  on_fail: warn
  description: Test coverage debe reportar coverage_percentage
- script: vulnerability_scanner.py
  enabled: true
  require:
  - path: total_findings
    type: number
    min: 0
    description: Total de vulnerabilidades
  - path: tools_used
    type: list
    description: Herramientas utilizadas
  on_fail: warn
  description: Vulnerability scanner debe reportar total_findings y tools_used
- script: code_smells.py
  enabled: true
  require:
  - path: summary
    type: dict
    description: Resumen de smells
  on_fail: warn
  description: Code smells debe producir summary dict
- script: full_audit.py
  enabled: true
  require:
  - path: summary
    type: dict
    description: Resumen del audit
  - path: summary.final_score
    type: number
    min: 0
    max: 100
    description: Score final 0-100
  - path: summary.grade
    type: string
    min_length: 1
    description: Grade A-F
  on_fail: warn
  description: Full audit debe producir summary con final_score y grade

