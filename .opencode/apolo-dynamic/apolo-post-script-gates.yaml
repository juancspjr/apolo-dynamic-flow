    type: number
    min: 0
    max: 100
    description: Score final 0-100
  - path: summary.grade
    type: string
    min_length: 1
    description: Grade A-F
  on_fail: warn
  description: Full audit debe producir summary con final_score y grade
- script: scaffold_v3.py
  version_added: 3.1.0
  enabled: true
  require:
  - path: files_to_create
    type: list
    min_length: 1
    description: Al menos 1 archivo concreto a crear (v3.1.0)
  - path: commands
    type: list
    min_length: 1
    description: Al menos 1 command accionable (v3.1.0)
