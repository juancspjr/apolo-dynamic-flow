  on_fail: warn
  description: Code quality debe reportar total_files
- script: test_coverage.py
  enabled: true
  require:
  - path: coverage_percentage
    type: number
    min: 0
    max: 100
    description: Coverage 0-100%
  on_fail: warn
  description: Test coverage debe reportar coverage_percentage
- script: vulnerability_scanner.py
  enabled: true
  require:
  - path: total_findings
    type: number
    min: 0
    description: Total de vulnerabilidades
  - path: tools_used
    type: list
    description: Herramientas utilizadas
  on_fail: warn
  description: Vulnerability scanner debe reportar total_findings y tools_used
- script: code_smells.py
  enabled: true
