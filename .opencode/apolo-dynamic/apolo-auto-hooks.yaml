autohooks: V1
version: 3
schema_version: 3.2.0
generated_at: '2026-06-22T05:09:08Z'
enabled: true
triggers:
- name: phase-complete:init
  enabled: true
  run:
  - script: health_check.py
    args:
    - --repo-root
    - .
    timeout: 30
  condition: null
  description: Después de init, ejecutar health check del entorno
- name: phase-complete:plan-indice
  enabled: true
  run:
  - script: cross_language_analyzer.py
    args:
    - --repo-root
    - .
    - --code-index
    - .opencode/apolo-dynamic/CODE-INDEX.yaml
    timeout: 60
  - script: summarize_functions.py
    args:
    - --repo-root
    - .
    - --code-index
    - .opencode/apolo-dynamic/CODE-INDEX.yaml
    timeout: 60
  condition: code_index_exists
  description: Después de indexar codebase, análisis cross-language + resúmenes
- name: evidence:collected
  enabled: true
  run:
  - script: secret_scanner.py
    args:
    - --scan-stdin
    timeout: 30
    stdin_from: evidence_files
  condition: items >= 1
  description: Después de recolectar evidencia, escanear secretos en archivos
- name: phase-complete:verdad
  enabled: true
  run:
  - script: code_quality.py
    args:
    - --repo-root
    - .
    timeout: 120
  - script: vulnerability_scanner.py
    args:
    - --repo-root
    - .
    timeout: 120
  condition: null
  description: Después de fase verdad, análisis de calidad + vulnerabilidades
- name: plan:generated
  enabled: true
  run: []
  condition: null
  description: Placeholder — generate_plan no requiere hooks automáticos
- name: scaffold:produced
  enabled: true
  run:
  - script: code_smells.py
    args:
    - --repo-root
    - .
    - --code-index
    - .opencode/apolo-dynamic/CODE-INDEX.yaml
    timeout: 60
  condition: scaffold_concrete
  description: Después de producir scaffold, verificar code smells
- name: phase-complete:reanclaje
  enabled: true
  run:
  - script: test_coverage.py
    args:
    - --repo-root
    - .
    - --code-index
    - .opencode/apolo-dynamic/CODE-INDEX.yaml
    timeout: 120
  condition: null
  description: Después de reanclaje, medir coverage
- name: test:failed
  enabled: true
  run:
  - script: self_healing.py
    args:
    - --repo-root
    - .
    timeout: 60
  condition: consecutive_failures >= 3
  description: Después de 3 fallos consecutivos, ejecutar self-healing
- name: block:detected
  enabled: false
  run: []
  condition: null
